<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣寧宮後台 | 專業級全功能維護系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { 't-red': '#8B0000', 't-gold': '#D4AF37', 't-blue': '#0F172A' } } }
        }
    </script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; color: #334155; overflow: hidden; }
        
        /* 側邊欄：強制一行一個按鈕 */
        .sidebar-container { background: #0F172A; width: 320px; height: 100vh; position: sticky; top: 0; display: flex; flex-direction: column; z-index: 100; }
        .nav-wrapper { flex: 1; display: flex; flex-direction: column; padding: 20px 0; overflow-y: auto; }
        
        .nav-link-btn { 
            display: flex;
            align-items: center;
            width: 100%;
            padding: 18px 30px;
            color: #94A3B8;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            text-align: left;
            font-weight: 700;
        }
        .nav-link-btn:hover { background: rgba(255, 255, 255, 0.05); color: #FFFFFF; }
        .nav-link-btn.active { 
            background: rgba(255, 255, 255, 0.1); 
            color: #FFFFFF; 
            border-left: 4px solid #EAB308; 
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.2);
        }
        .nav-link-btn i { width: 30px; font-size: 20px; opacity: 0.6; }

        /* 主面板內容 */
        .main-content { flex: 1; height: 100vh; overflow-y: auto; padding: 40px; }
        .admin-section { display: none; animation: fadeInUp 0.5s ease; }
        .admin-section.active { display: block; }

        /* 生辰卡片美化 */
        .lunar-card {
            background: linear-gradient(135deg, #FFFFFF 0%, #F1F5F9 100%);
            border: 1px solid #E2E8F0;
            border-left: 5px solid #3B82F6;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 表格滾動優化 */
        .table-scroll { border-radius: 24px; overflow: hidden; border: 1px solid #E2E8F0; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <aside class="sidebar-container shadow-2xl">
        <div class="p-10 text-center border-b border-white/5">
            <div class="w-16 h-16 bg-yellow-500 text-slate-900 rounded-2xl flex items-center justify-center text-3xl font-black mx-auto mb-4 shadow-xl">廣</div>
            <h2 class="text-xl font-black tracking-widest text-white font-serif">廣寧宮管理</h2>
            <p class="text-[10px] mt-2 text-yellow-500 opacity-60 tracking-[0.2em] font-bold uppercase">System v4.0 Professional</p>
        </div>
        
        <nav class="nav-wrapper">
            <button onclick="showSection('orders')" id="menu-orders" class="nav-link-btn">
                <i class="fas fa-file-invoice-dollar"></i> 財務核帳報表
            </button>
            <button onclick="showSection('news')" id="menu-news" class="nav-link-btn">
                <i class="fas fa-bullhorn"></i> 最新消息管理
            </button>
            <button onclick="showSection('products')" id="menu-products" class="nav-link-btn">
                <i class="fas fa-box-open"></i> 文創商品管理
            </button>
            <button onclick="showSection('services')" id="menu-services" class="nav-link-btn">
                <i class="fas fa-tags"></i> 祈福項目設定
            </button>
            <button onclick="showSection('videos')" id="menu-videos" class="nav-link-btn">
                <i class="fas fa-play-circle"></i> 影音作品管理
            </button>
            <button onclick="showSection('photos')" id="menu-photos" class="nav-link-btn">
                <i class="fas fa-images"></i> 照片花絮維護
            </button>
        </nav>

        <div class="p-8 border-t border-white/5">
            <button onclick="logoutSequence()" class="w-full bg-red-500/10 hover:bg-red-600 text-red-500 hover:text-white py-4 rounded-2xl text-xs font-black transition-all flex items-center justify-center gap-3 border border-red-500/20 group">
                <i class="fas fa-sign-out-alt group-hover:translate-x-1 transition"></i> 安全登出系統
            </button>
        </div>
    </aside>

    <main class="main-content">
        
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 id="title-text" class="text-4xl font-black text-slate-800 tracking-tighter">財務核帳報表</h1>
                <p class="text-slate-400 font-bold mt-2 text-sm uppercase tracking-widest" id="clock-display"></p>
            </div>
            <div class="flex gap-4">
                <div class="bg-white px-6 py-3 rounded-2xl border shadow-sm flex items-center gap-3">
                    <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
                    <span class="text-xs font-black text-slate-500 uppercase tracking-widest">資料庫已同步</span>
                </div>
            </div>
        </div>

        <section id="section-orders" class="admin-section active">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 mb-8 flex flex-wrap gap-6 items-end">
                <div class="flex-1 min-w-[300px]">
                    <label class="text-xs font-black text-slate-400 block mb-3 uppercase tracking-widest ml-1">搜尋信眾姓名或電話</label>
                    <input type="text" id="filter-search" oninput="applyFilters()" class="w-full border-2 border-slate-100 p-4 rounded-2xl text-sm outline-none focus:border-yellow-500 bg-slate-50 transition-all font-bold" placeholder="輸入關鍵字直接過濾...">
                </div>
                <div class="flex gap-4">
                    <div>
                        <label class="text-xs font-black text-slate-400 block mb-3 uppercase tracking-widest ml-1">開始日期</label>
                        <input type="date" id="filter-start" class="border-2 border-slate-100 p-4 rounded-2xl text-sm bg-slate-50 outline-none font-bold">
                    </div>
                    <div>
                        <label class="text-xs font-black text-slate-400 block mb-3 uppercase tracking-widest ml-1">結束日期</label>
                        <input type="date" id="filter-end" class="border-2 border-slate-100 p-4 rounded-2xl text-sm bg-slate-50 outline-none font-bold">
                    </div>
                </div>
                <button onclick="exportToExcel()" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-black text-sm hover:bg-green-700 transition shadow-lg flex items-center gap-2">
                    <i class="fas fa-file-excel"></i> 匯出 Excel
                </button>
            </div>

            <div class="table-scroll">
                <table class="w-full text-left text-sm border-collapse">
                    <thead class="bg-slate-50/80 font-black text-slate-500 uppercase tracking-widest border-b">
                        <tr>
                            <th class="p-6">日期</th>
                            <th class="p-6">分類</th>
                            <th class="p-6">信眾及生辰(農曆)資訊</th>
                            <th class="p-6">項目</th>
                            <th class="p-6 text-right">金額</th>
                            <th class="p-6 text-center">狀態</th>
                            <th class="p-6 text-right">管理</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list-body" class="divide-y divide-slate-100 bg-white">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="section-news" class="admin-section">
            <div class="bg-white p-10 rounded-[3rem] border border-slate-200 mb-10 max-w-4xl shadow-xl">
                <input type="hidden" id="news-id-hidden">
                <h3 id="news-form-label" class="font-black text-slate-400 mb-6 text-xs uppercase tracking-[0.3em]">發布最新公告</h3>
                <div class="space-y-6">
                    <input type="text" id="news-title-input" placeholder="公告標題" class="w-full border-2 border-slate-50 p-5 rounded-3xl outline-none focus:border-blue-200 bg-slate-50 font-bold text-lg shadow-inner">
                    <textarea id="news-content-input" placeholder="輸入詳細內容..." class="w-full border-2 border-slate-50 p-5 rounded-3xl h-60 outline-none focus:border-blue-200 bg-slate-50 leading-relaxed shadow-inner"></textarea>
                    <div class="flex gap-4">
                        <button onclick="processNewsSave()" id="news-save-btn" class="flex-1 bg-blue-600 text-white py-5 rounded-3xl font-black shadow-2xl hover:bg-blue-700 transition">確認發布</button>
                        <button onclick="resetNewsForm()" id="news-cancel-btn" class="hidden px-12 bg-slate-200 py-5 rounded-3xl font-black text-slate-600">取消編輯</button>
                    </div>
                </div>
            </div>
            <div id="admin-news-list-display" class="space-y-4 max-w-4xl"></div>
        </section>

        <section id="section-products" class="admin-section">
            <div class="bg-white p-10 rounded-[3rem] border mb-12 shadow-xl max-w-2xl">
                <input type="hidden" id="prod-id-hidden">
                <div class="grid grid-cols-2 gap-6 mb-6">
                    <input type="text" id="prod-name-input" placeholder="商品名稱" class="border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-bold">
                    <input type="number" id="prod-price-input" placeholder="金額" class="border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-bold">
                </div>
                <input type="file" id="prod-file-input" class="w-full border-2 border-dashed border-slate-200 p-8 rounded-2xl mb-6 bg-slate-50/50">
                <button onclick="processProductUpload()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black shadow-2xl hover:bg-black transition text-lg">
                    上架/更新商品資料
                </button>
            </div>
            <div id="admin-product-grid-display" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

        <section id="section-services" class="admin-section">
            <div class="bg-white p-10 rounded-[3rem] border max-w-md shadow-xl mb-10">
                <div class="space-y-6">
                    <input type="text" id="serv-name-input" placeholder="項目名稱 (如：光明燈)" class="w-full border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-bold">
                    <input type="number" id="serv-price-input" placeholder="價格" class="w-full border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-bold">
                    <button onclick="saveServiceSetting()" class="w-full bg-yellow-600 text-white py-5 rounded-3xl font-black shadow-lg">儲存祈福項目</button>
                </div>
            </div>
            <div id="admin-services-list-display" class="grid gap-4 max-w-2xl"></div>
        </section>

        <section id="section-videos" class="admin-section">
            <div class="bg-white p-10 rounded-[3rem] border max-w-xl shadow-xl mb-10">
                <div class="space-y-6">
                    <input type="text" id="video-title-input" placeholder="影片名稱" class="w-full border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-bold">
                    <input type="text" id="video-ytid-input" placeholder="YouTube ID (例如: vK_X27uF_zM)" class="w-full border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-bold">
                    <button onclick="saveVideoLink()" class="w-full bg-red-600 text-white py-5 rounded-3xl font-black shadow-lg">新增影片連結</button>
                </div>
            </div>
            <div id="admin-video-list-display" class="space-y-4 max-w-3xl"></div>
        </section>

        <section id="section-photos" class="admin-section">
            <div class="bg-white p-10 rounded-[3rem] border max-w-xl shadow-xl mb-10">
                <input type="text" id="photo-title-input" placeholder="照片主題" class="w-full border-2 border-slate-50 p-5 rounded-2xl mb-6 bg-slate-50 font-bold">
                <input type="file" id="photo-file-input" class="w-full border-2 border-dashed p-10 rounded-2xl mb-6 bg-slate-50">
                <div id="photo-progress-area" class="hidden w-full bg-slate-100 h-4 rounded-full mb-6 overflow-hidden shadow-inner">
                    <div id="photo-progress-bar" class="bg-blue-600 h-full w-0 transition-all duration-500 shadow-lg"></div>
                </div>
                <button onclick="startPhotoUpload()" id="photo-upload-btn" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black shadow-2xl">開始上傳活動照片</button>
            </div>
            <div id="admin-photo-grid-display" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </section>

    </main>

    <script>
        // --- [1] Firebase 核心初始化 ---
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); 
        const storage = firebase.storage();
        const auth = firebase.auth();
        let globalOrdersData = [];

        // --- [2] 權限與連線監控 ---
        auth.onAuthStateChanged(user => {
            if (!user) {
                console.log("當前為未登入狀態");
                // window.location.replace("login.html");
            } else {
                const savedTab = localStorage.getItem('current_admin_tab') || 'orders';
                showSection(savedTab);
            }
        });

        // 徹底登出邏輯 (修復)
        function logoutSequence() {
            if (confirm("🚨 確定要登出系統並清除此裝置的所有存取權限嗎？")) {
                auth.signOut().then(() => {
                    localStorage.clear();
                    sessionStorage.clear();
                    window.location.replace("login.html");
                }).catch(err => alert("登出失敗：" + err.message));
            }
        }

        // --- [3] UI 面板切換 ---
        function showSection(id) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('section-' + id).classList.add('active');
            document.getElementById('menu-' + id).classList.add('active');
            
            localStorage.setItem('current_admin_tab', id);
            
            const titles = {
                'orders': '財務核帳報表', 'news': '最新消息公告管理', 'products': '文創商品管理',
                'services': '祈福項目設定', 'videos': '影音紀實作品管理', 'photos': '活動花絮維護'
            };
            document.getElementById('title-text').innerText = titles[id];
        }

        // --- [4] [關鍵修復：穩定農曆解析邏輯] ---
        function performLunarParse(orderDoc) {
            // A. 先看是否有資料庫已經存好的農曆欄位
            if (orderDoc.lunarBirthday && orderDoc.lunarBirthday !== "未轉換") return orderDoc.lunarBirthday;
            
            // B. 抓取國曆資訊 (相容舊版 birthday 與新版 solarBirthday)
            let solarDateRaw = orderDoc.solarBirthday || orderDoc.birthday;
            
            if (!solarDateRaw) return "無生日資訊";

            try {
                let year, month, day;
                
                // 如果是字串格式 (例如: 1998-11-06)
                if (typeof solarDateRaw === 'string') {
                    const cleanDateParts = solarDateRaw.match(/\d+/g); // 強制提取所有數字
                    if (!cleanDateParts || cleanDateParts.length < 3) return "日期格式解析失敗";
                    year = parseInt(cleanDateParts[0]);
                    month = parseInt(cleanDateParts[1]);
                    day = parseInt(cleanDateParts[2]);
                } 
                // 如果是 Firebase Timestamp
                else if (solarDateRaw.toDate) {
                    const dObj = solarDateRaw.toDate();
                    year = dObj.getFullYear(); month = dObj.getMonth() + 1; day = dObj.getDate();
                } else {
                    return "不支援的資料類型";
                }

                // 執行 Lunar-javascript 轉換
                const solar = Solar.fromYmd(year, month, day);
                const lunar = solar.getLunar();
                
                return `${lunar.getYearInGanZhi()}年(${lunar.getYearZodiac()}) ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`;
            } catch (e) {
                console.error("農曆轉換發生死角:", e);
                return "轉換異常";
            }
        }

        // --- [5] 訂單報表：渲染與篩選 ---
        db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
            globalOrdersData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            applyFilters();
        });

        function applyFilters() {
            const kw = document.getElementById('filter-search').value.toLowerCase();
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;

            let filtered = globalOrdersData.filter(o => {
                const matchName = (o.name || "").includes(kw);
                const matchPhone = (o.phone || "").includes(kw);
                let matchDate = true;
                if (start && o.createdAt) matchDate = o.createdAt.toDate() >= new Date(start);
                if (end && o.createdAt) {
                    let e = new Date(end); e.setHours(23, 59, 59);
                    matchDate = matchDate && o.createdAt.toDate() <= e;
                }
                return (matchName || matchPhone) && matchDate;
            });

            let html = "";
            filtered.forEach(o => {
                const isPaid = o.status === '已查帳';
                const lunarResult = performLunarParse(o);

                html += `
                <tr class="hover:bg-blue-50/20 transition-colors">
                    <td class="p-6 text-slate-400 font-mono text-[11px] leading-tight">
                        ${o.createdAt ? o.createdAt.toDate().toLocaleString('zh-TW') : '-'}
                    </td>
                    <td class="p-6">
                        <span class="px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${o.category === '捐獻' ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-blue-50 text-blue-600 border border-blue-100'}">
                            ${o.category || '點燈'}
                        </span>
                    </td>
                    <td class="p-6">
                        <div class="font-black text-slate-800 text-base mb-1">${o.name || '未名大德'}</div>
                        <div class="text-xs text-slate-400 font-mono mb-3"><i class="fas fa-phone-alt mr-2 opacity-50"></i>${o.phone || '無'}</div>
                        <div class="lunar-card p-4 rounded-2xl shadow-sm text-[11px] leading-relaxed">
                            <p class="text-blue-700 font-black mb-1">⛩️ 農曆：${lunarResult}</p>
                            <p class="text-slate-500 font-bold italic opacity-70">📅 國曆：${o.solarBirthday || o.birthday || '未提供'}</p>
                            <p class="text-slate-500 font-bold">⏰ 時辰：${o.birthHour || '吉時'}</p>
                        </div>
                    </td>
                    <td class="p-6 text-slate-600 font-black text-sm">${o.item || '油香'}</td>
                    <td class="p-6 text-right font-black text-2xl text-slate-900 tracking-tighter">$${o.amount || 0}</td>
                    <td class="p-6 text-center">
                        <button onclick="toggleCheckStatus('${o.id}', '${o.status}')" class="px-6 py-2 rounded-full text-[10px] font-black border-2 transition-all ${isPaid ? 'bg-green-600 text-white border-green-600 shadow-md' : 'bg-white text-yellow-600 border-yellow-200 hover:bg-yellow-50'}">
                            ${o.status || '待核帳'}
                        </button>
                    </td>
                    <td class="p-6 text-right">
                        <button onclick="deleteDocument('orders', '${o.id}')" class="text-slate-200 hover:text-red-500 transition text-2xl px-4"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
            });
            document.getElementById('orders-list-body').innerHTML = html || '<tr><td colspan="7" class="p-32 text-center text-slate-300 italic font-black text-xl">目前沒有查到任何資料...</td></tr>';
        }

        async function toggleCheckStatus(id, current) {
            const nextStatus = (current === '已查帳') ? '待查帳' : '已查帳';
            await db.collection("orders").doc(id).update({ status: nextStatus });
        }

        function exportToExcel() {
            const data = globalOrdersData.map(o => ({
                "登記時間": o.createdAt ? o.createdAt.toDate().toLocaleString() : "-",
                "分類": o.category,
                "姓名": o.name,
                "電話": o.phone,
                "國曆": o.solarBirthday || o.birthday || "無",
                "農曆生辰": performLunarParse(o),
                "出生時辰": o.birthHour || "吉時",
                "祈福項目": o.item,
                "金額": o.amount,
                "狀態": o.status || "待核帳"
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "廣寧宮財務");
            XLSX.writeFile(wb, `廣寧宮核帳報表_${new Date().toLocaleDateString()}.xlsx`);
        }

        // --- [6] 其他模組 CRUD 邏輯 (公告/商品/照片) ---
        
        // 公告
        async function processNewsSave() {
            const id = document.getElementById('news-id-hidden').value;
            const t = document.getElementById('news-title-input').value;
            const c = document.getElementById('news-content-input').value;
            if(!t || !c) return alert("內容不可空白");
            const data = { title: t, content: c, updatedAt: new Date() };
            if (id) await db.collection("news").doc(id).update(data);
            else await db.collection("news").add({ ...data, createdAt: new Date() });
            resetNewsForm();
        }
        function editNewsData(id, t, c) {
            document.getElementById('news-id-hidden').value = id;
            document.getElementById('news-title-input').value = t;
            document.getElementById('news-content-input').value = c;
            document.getElementById('news-form-box').classList.add('edit-mode');
            document.getElementById('news-cancel-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function resetNewsForm() {
            document.getElementById('news-id-hidden').value = "";
            document.getElementById('news-title-input').value = "";
            document.getElementById('news-content-input').value = "";
            document.getElementById('news-form-box').classList.remove('edit-mode');
            document.getElementById('news-cancel-btn').classList.add('hidden');
        }
        db.collection("news").orderBy("createdAt", "desc").onSnapshot(snap => {
            let h = "";
            snap.forEach(doc => {
                const n = doc.data();
                const safeC = (n.content || "").replace(/\n/g, '\\n').replace(/'/g, "\\'");
                h += `<div class="bg-white p-6 border rounded-[2rem] flex justify-between shadow-md items-center">
                        <div class="font-black text-slate-800">${n.title}</div>
                        <div class="flex gap-4">
                            <button onclick="editNewsData('${doc.id}','${n.title}','${safeC}')" class="text-blue-500 font-black text-xs px-4 py-2 hover:bg-blue-50 rounded-xl transition">編輯</button>
                            <button onclick="deleteDocument('news','${doc.id}')" class="text-red-400 font-black text-xs px-4 py-2 hover:bg-red-50 rounded-xl transition">刪除</button>
                        </div>
                    </div>`;
            });
            document.getElementById('admin-news-list-display').innerHTML = h;
        });

        // 商品
        async function processProductUpload() {
            const f = document.getElementById('prod-file-input').files[0];
            const name = document.getElementById('prod-name-input').value;
            const price = parseInt(document.getElementById('prod-price-input').value);
            let url = ""; if(f){ const r = storage.ref(`products/${Date.now()}_${f.name}`); await r.put(f); url = await r.getDownloadURL(); }
            const data = { name, price, updatedAt: new Date() };
            if(url) data.url = url;
            await db.collection("products").add({ ...data, createdAt: new Date() });
            location.reload();
        }
        db.collection("products").onSnapshot(snap => {
            let h = "";
            snap.forEach(doc => {
                const p = doc.data();
                h += `<div class="bg-white p-5 rounded-[2.5rem] border shadow-xl text-center">
                        <img src="${p.url}" class="h-40 w-full object-cover rounded-3xl mb-4 border shadow-inner">
                        <div class="font-black text-slate-800">${p.name}</div>
                        <div class="text-red-600 font-black text-xl mt-1">$${p.price}</div>
                        <button onclick="deleteDocument('products','${doc.id}')" class="mt-4 text-slate-300 hover:text-red-500 font-black text-[10px]">下架移除</button>
                    </div>`;
            });
            document.getElementById('admin-product-grid-display').innerHTML = h;
        });

        // 照片牆
        async function startPhotoUpload() {
            const file = document.getElementById('photo-file-input').files[0];
            const title = document.getElementById('photo-title-input').value;
            if(!file || !title) return alert("請完整輸入");
            const btn = document.getElementById('photo-upload-btn');
            const prog = document.getElementById('photo-progress-area');
            const bar = document.getElementById('photo-progress-bar');
            btn.disabled = true; prog.classList.remove('hidden');
            const path = `gallery/${Date.now()}_${file.name}`;
            const task = storage.ref(path).put(file);
            task.on('state_changed', s => { bar.style.width = (s.bytesTransferred / s.totalBytes) * 100 + '%'; }, null, async () => {
                const url = await task.snapshot.ref.getDownloadURL();
                await db.collection("photos").add({ title, url, path, createdAt: new Date() });
                location.reload();
            });
        }
        db.collection("photos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let h = "";
            snap.forEach(doc => {
                h += `<div class="relative group shadow-2xl"><img src="${doc.data().url}" class="h-48 w-full object-cover rounded-[2rem] border-4 border-white shadow-lg"><button onclick="deleteDocument('photos', '${doc.id}')" class="absolute top-3 right-3 bg-red-600 text-white w-8 h-8 rounded-full shadow-2xl opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center">×</button></div>`;
            });
            document.getElementById('admin-photo-grid-display').innerHTML = h;
        });

        // 祈福與影音
        async function saveServiceSetting() { const n = document.getElementById('serv-name-input').value; const p = parseInt(document.getElementById('serv-price-input').value); await db.collection("services").add({ name: n, price: p, createdAt: new Date() }); location.reload(); }
        db.collection("services").onSnapshot(snap => { let h = ""; snap.forEach(doc => { h += `<div class="bg-white p-6 rounded-3xl border flex justify-between items-center shadow-lg font-black tracking-widest text-slate-700">🏮 ${doc.data().name} <span class="text-red-500 ml-6">$${doc.data().price}</span> <button onclick="deleteDocument('services','${doc.id}')" class="text-red-400 text-xs px-4 py-2">刪除</button></div>`; }); document.getElementById('admin-services-list-display').innerHTML = h; });

        async function saveVideoLink() { const t = document.getElementById('video-title-input').value; const y = document.getElementById('video-ytid-input').value; await db.collection("videos").add({ title: t, ytid: y, createdAt: new Date() }); location.reload(); }
        db.collection("videos").onSnapshot(snap => { let h = ""; snap.forEach(doc => { h += `<div class="bg-white p-6 rounded-3xl border flex justify-between items-center shadow-lg font-black tracking-widest text-slate-700">🎥 ${doc.data().title} <button onclick="deleteDocument('videos','${doc.id}')" class="text-red-400 text-xs px-4 py-2">刪除</button></div>`; }); document.getElementById('admin-video-list-display').innerHTML = h; });

        // 通用刪除
        async function deleteDocument(coll, id) { if (confirm("🚨 警告：資料刪除後無法恢復，確定要從雲端移除嗎？")) await db.collection(coll).doc(id).delete(); }

        // 時間顯示
        setInterval(() => { document.getElementById('clock-display').innerText = new Date().toLocaleString('zh-TW', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' }); }, 1000);
    </script>
</body>
</html>
