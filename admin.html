<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>廣寧宮後台 | 財務與宮務全功能管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .admin-panel { display: none; } .admin-panel.active { display: block; }
        .nav-btn.active { @apply bg-slate-800 border-l-4 border-yellow-500 text-white font-bold; }
        .edit-mode { @apply ring-4 ring-orange-400 bg-orange-50 transition-all; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-slate-900 text-slate-400 h-screen sticky top-0 flex flex-col z-50">
        <div class="p-8 text-center border-b border-slate-800"><h2 class="text-xl font-bold text-yellow-500">廣寧宮後台管理</h2></div>
        <nav class="mt-4 flex-1 space-y-1 overflow-y-auto">
            <button onclick="showPanel('orders')" id="btn-orders" class="nav-btn w-full text-left px-8 py-4 flex items-center hover:bg-slate-800 transition"><i class="fas fa-file-invoice-dollar mr-3"></i> 財務核帳報表</button>
            <button onclick="showPanel('photos')" id="btn-photos" class="nav-btn w-full text-left px-8 py-4 flex items-center hover:bg-slate-800 transition"><i class="fas fa-camera mr-3"></i> 活動照片管理</button>
            <button onclick="showPanel('videos')" id="btn-videos" class="nav-btn w-full text-left px-8 py-4 flex items-center hover:bg-slate-800 transition"><i class="fas fa-play mr-3"></i> 影音作品管理</button>
            <button onclick="showPanel('services')" id="btn-services" class="nav-btn w-full text-left px-8 py-4 flex items-center hover:bg-slate-800 transition"><i class="fas fa-tags mr-3"></i> 祈福項目設定</button>
            <button onclick="showPanel('news')" id="btn-news" class="nav-btn w-full text-left px-8 py-4 flex items-center hover:bg-slate-800 transition"><i class="fas fa-bullhorn mr-3"></i> 最新公告消息</button>
        </nav>
        <button onclick="firebase.auth().signOut()" class="p-6 border-t border-slate-800 text-xs">登出管理員</button>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <h2 id="main-title" class="text-3xl font-black mb-8 text-slate-800">管理看板</h2>

        <section id="panel-orders" class="admin-panel">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border mb-6 grid grid-cols-1 md:grid-cols-6 gap-4 items-end">
                <div class="md:col-span-1"><label class="text-[10px] font-bold text-slate-400 block mb-1">姓名或電話</label><input type="text" id="o-search" class="w-full border p-2 rounded-xl text-sm" placeholder="關鍵字..."></div>
                <div class="md:col-span-1"><label class="text-[10px] font-bold text-slate-400 block mb-1">起始日期</label><input type="date" id="o-start" class="w-full border p-2 rounded-xl text-sm"></div>
                <div class="md:col-span-1"><label class="text-[10px] font-bold text-slate-400 block mb-1">結束日期</label><input type="date" id="o-end" class="w-full border p-2 rounded-xl text-sm"></div>
                <button onclick="renderOrders()" class="bg-blue-600 text-white py-2 rounded-xl font-bold shadow-lg text-sm transition hover:bg-blue-700"><i class="fas fa-search mr-2"></i>搜尋篩選</button>
                <button onclick="exportExcel()" class="bg-green-600 text-white py-2 rounded-xl font-bold shadow-lg text-sm transition hover:bg-green-700"><i class="fas fa-download mr-2"></i>匯出 EXCEL</button>
            </div>
            <div class="bg-white rounded-[2rem] border overflow-hidden shadow-sm"><table class="w-full text-left text-sm"><thead class="bg-slate-50 font-bold text-slate-400 uppercase"><tr><th class="p-6">日期</th><th class="p-6">類別</th><th class="p-6">信眾/電話</th><th class="p-6">項目</th><th class="p-6 text-right">金額</th><th class="p-6">狀態</th><th class="p-6 text-right">操作</th></tr></thead><tbody id="order-rows" class="divide-y"></tbody></table></div>
        </section>

        <section id="panel-photos" class="admin-panel">
            <div class="bg-white p-8 rounded-[2.5rem] border mb-8 max-w-xl">
                <input type="text" id="p-title" placeholder="活動標題" class="w-full border p-3 rounded-xl mb-4">
                <input type="file" id="p-file" accept="image/*" class="mb-4 text-xs">
                <div id="p-prog-container" class="hidden w-full bg-slate-100 h-2 rounded-full mb-4 overflow-hidden"><div id="p-bar" class="bg-blue-600 h-full w-0"></div></div>
                <button onclick="uploadPhoto()" id="p-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold shadow-xl">開始上傳</button>
            </div>
            <div id="admin-photo-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="panel-videos" class="admin-panel">
            <div id="v-form" class="bg-white p-8 rounded-[2.5rem] border mb-8 max-w-xl transition-all">
                <input type="hidden" id="v-id"><input type="text" id="v-title" placeholder="影片名稱" class="w-full border p-3 rounded-xl mb-4"><input type="text" id="v-ytid" placeholder="YouTube ID (等號後的代碼)" class="w-full border p-3 rounded-xl mb-6">
                <div class="flex gap-2"><button onclick="saveVideo()" id="v-btn" class="flex-1 bg-red-600 text-white py-4 rounded-xl font-bold shadow-lg">確認儲存影音</button><button onclick="clearVideoForm()" id="v-cancel" class="hidden px-6 bg-slate-100 rounded-xl font-bold">取消</button></div>
            </div>
            <div id="admin-video-list" class="space-y-4 max-w-2xl"></div>
        </section>
        
        </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const storage = firebase.storage();
        let orders = [];

        firebase.auth().onAuthStateChanged(u => { if(!u) window.location.href="login.html"; else showPanel(localStorage.getItem('admin_tab')||'orders'); });

        function showPanel(id){
            document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('panel-'+id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
            localStorage.setItem('admin_tab', id);
        }

        // --- 財務核帳邏輯 (含日期範圍) ---
        db.collection("orders").orderBy("createdAt","desc").onSnapshot(snap => { orders = snap.docs.map(d=>({id:d.id, ...d.data()})); renderOrders(); });
        function renderOrders(){
            const s = document.getElementById('o-search').value.toLowerCase();
            const start = document.getElementById('o-start').value;
            const end = document.getElementById('o-end').value;
            let filtered = orders.filter(o => {
                const matchSearch = o.name.includes(s) || o.phone.includes(s);
                let matchDate = true;
                if(start && o.createdAt) matchDate = o.createdAt.toDate() >= new Date(start);
                if(end && o.createdAt) { let dEnd = new Date(end); dEnd.setHours(23,59,59); matchDate = matchDate && o.createdAt.toDate() <= dEnd; }
                return matchSearch && matchDate;
            });
            let html = ""; filtered.forEach(o => {
                const c = o.status==='已查帳';
                html += `<tr><td class="p-6 text-slate-400 font-mono text-xs">${o.createdAt?o.createdAt.toDate().toLocaleDateString():'-'}</td><td class="p-6 font-bold ${o.category==='捐獻'?'text-red-600':'text-blue-600'}">${o.category}</td><td class="p-6"><b>${o.name}</b><br><small>${o.phone}</small></td><td class="p-6 text-slate-500">${o.item}</td><td class="p-6 text-right font-black">$${o.amount}</td><td class="p-6 text-center"><button onclick="toggleCheck('${o.id}','${o.status}')" class="px-4 py-1 rounded-full text-[10px] font-bold ${c?'bg-green-100 text-green-600 border border-green-200':'bg-yellow-50 text-yellow-600 border border-yellow-200'}">${o.status||'待查帳'}</button></td><td class="p-6 text-right"><button onclick="deleteDoc('orders','${o.id}')" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button></td></tr>`;
            });
            document.getElementById('order-rows').innerHTML = html;
        }
        async function toggleCheck(id,s){ await db.collection("orders").doc(id).update({status: s==='已查帳'?'待查帳':'已查帳'}); }

        // --- 照片上傳修復 ---
        async function uploadPhoto(){
            const f = document.getElementById('p-file').files[0]; const t = document.getElementById('p-title').value;
            if(!f || !t) return alert("請填寫標題並選取照片");
            document.getElementById('p-prog-container').classList.remove('hidden');
            const path = `gallery/${Date.now()}_${f.name}`;
            const task = storage.ref(path).put(f);
            task.on('state_changed', s => { 
                const progress = (s.bytesTransferred / s.totalBytes) * 100;
                document.getElementById('p-bar').style.width = progress + '%';
            }, null, async () => {
                const url = await task.snapshot.ref.getDownloadURL();
                await db.collection("photos").add({title:t, url, path, createdAt: new Date()});
                alert("上傳成功"); location.reload();
            });
        }
        db.collection("photos").orderBy("createdAt","desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { const p = doc.data(); html += `<div class="relative bg-white p-2 rounded-2xl border shadow-sm"><img src="${p.url}" class="h-32 w-full object-cover rounded-xl"><button onclick="deleteDocWithFile('photos','${doc.id}','${p.path}')" class="absolute top-4 right-4 bg-red-600 text-white w-6 h-6 rounded-full text-xs shadow-xl">×</button></div>`; });
            document.getElementById('admin-photo-grid').innerHTML = html;
        });

        // --- 影音管理修復 ---
        async function saveVideo(){
            const id = document.getElementById('v-id').value;
            const t = document.getElementById('v-title').value;
            const ytid = document.getElementById('v-ytid').value;
            if(!t || !ytid) return alert("資訊不完整");
            if(id) await db.collection("videos").doc(id).update({title:t, ytid});
            else await db.collection("videos").add({title:t, ytid, createdAt: new Date()});
            alert("成功"); location.reload();
        }
        db.collection("videos").orderBy("createdAt","desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { const v = doc.data(); html += `<div class="bg-white p-5 rounded-2xl border flex justify-between shadow-sm items-center"><div><b class="text-lg">${v.title}</b><br><small class="text-slate-400">YouTube ID: ${v.ytid}</small></div><div class="flex gap-4"><button onclick="editVideo('${doc.id}','${v.title}','${v.ytid}')" class="text-blue-500 font-bold">編輯</button><button onclick="deleteDoc('videos','${doc.id}')" class="text-red-400 font-bold">刪除</button></div></div>`; });
            document.getElementById('admin-video-list').innerHTML = html;
        });

        function editVideo(id,t,y){ document.getElementById('v-id').value=id; document.getElementById('v-title').value=t; document.getElementById('v-ytid').value=y; document.getElementById('v-form').classList.add('edit-mode'); document.getElementById('v-cancel').classList.remove('hidden'); }

        // Excel 導出邏輯略 (同前版穩定版本)
        async function deleteDoc(c, id){ if(confirm("確定刪除？")) await db.collection(c).doc(id).delete(); }
        async function deleteDocWithFile(c, id, p){ if(confirm("將同步刪除圖檔，確定嗎？")) { if(p) try { await storage.ref(p).delete(); } catch(e) {} await db.collection(c).doc(id).delete(); } }
    </script>
</body>
</html>
