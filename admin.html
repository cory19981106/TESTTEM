<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣寧宮後台 | 專業維護系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 't-blue': '#0F172A', 't-gold': '#EAB308', 't-red': '#8B0000', 't-slate': '#1E293B' },
                    borderRadius: { '4xl': '2rem', '5xl': '3rem' }
                } 
            }
        }
    </script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; color: #1E293B; }
        .invisible { opacity: 0; pointer-events: none; }
        
        /* 響應式側邊欄 */
        .sidebar-panel { 
            width: 320px; background: #0F172A; height: 100vh; position: fixed; 
            left: -320px; top: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200; box-shadow: 15px 0 45px rgba(0,0,0,0.3); 
        }
        @media (min-width: 1024px) {
            .sidebar-panel { position: sticky; left: 0; }
            .mobile-header { display: none; }
        }
        .sidebar-open { left: 0 !important; }

        .main-stage { flex: 1; min-height: 100vh; overflow-y: auto; padding: 1.25rem; }
        @media (min-width: 1024px) { .main-stage { padding: 60px; } }

        .view-pane { display: none; }
        .view-pane.active { display: block; animation: paneEnter 0.6s ease; }
        @keyframes paneEnter { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .table-res { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 2rem; background: white; border: 1px solid #E2E8F0; }
        
        .admin-nav-btn {
            display: block; width: 100%; text-align: left; padding: 22px 35px;
            color: #94A3B8; font-weight: 800; border-left: 5px solid transparent;
            transition: all 0.3s; font-size: 15px;
        }
        .admin-nav-btn.active { background: rgba(255,255,255,0.1); color: #FFFFFF; border-left-color: #EAB308; }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; backdrop-filter: blur(4px); }
        .shuwun-card { background: #FFF; border-left: 5px solid #3B82F6; padding: 12px; border-radius: 1.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex flex-col lg:flex-row invisible">

    <header class="mobile-header bg-t-blue text-white p-5 flex justify-between items-center sticky top-0 z-[160] shadow-xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-yellow-500 text-slate-900 rounded-xl flex items-center justify-center font-black text-xl">廣</div>
            <span class="font-serif font-black tracking-widest text-lg">廣寧宮管理</span>
        </div>
        <button onclick="toggleMenu()" class="text-2xl p-2"><i class="fas fa-bars"></i></button>
    </header>

    <div id="overlay" onclick="toggleMenu()"></div>

    <aside id="sidebar" class="sidebar-panel flex flex-col">
        <div class="p-12 text-center border-b border-white/5 hidden lg:block">
            <div class="w-20 h-20 bg-gradient-to-br from-yellow-400 to-yellow-600 text-slate-900 rounded-[1.5rem] flex items-center justify-center text-4xl font-black mx-auto mb-5 shadow-2xl">廣</div>
            <h2 class="text-white text-2xl font-black tracking-[0.2em] font-serif">廣寧宮管理</h2>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-5">
            <button onclick="activateSection('orders')" id="menu-orders" class="admin-nav-btn active">
                <i class="fas fa-file-invoice-dollar w-8"></i> 財務核帳報表
            </button>
            <button onclick="activateSection('news')" id="menu-news" class="admin-nav-btn">
                <i class="fas fa-bullhorn w-8"></i> 最新消息管理
            </button>
            <button onclick="activateSection('products')" id="menu-products" class="admin-nav-btn">
                <i class="fas fa-box-open w-8"></i> 文創商品管理
            </button>
            <button onclick="activateSection('services')" id="menu-services" class="admin-nav-btn">
                <i class="fas fa-tags w-8"></i> 祈福項目設定
            </button>
            <button onclick="activateSection('videos')" id="menu-videos" class="admin-nav-btn">
                <i class="fas fa-play-circle w-8"></i> 影音作品管理
            </button>
            <button onclick="activateSection('photos')" id="menu-photos" class="admin-nav-btn">
                <i class="fas fa-images w-8"></i> 照片花絮管理
            </button>
        </nav>

        <div class="p-8 border-t border-white/5">
            <button onclick="finalLogout()" class="w-full bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white py-5 rounded-3xl text-sm font-black transition-all border border-red-600/20 group flex items-center justify-center gap-4">
                <i class="fas fa-power-off"></i> 登出系統
            </button>
        </div>
    </aside>

    <main class="main-stage">
        
        <div class="flex flex-col lg:flex-row lg:justify-between lg:items-end mb-10 gap-4">
            <div>
                <h1 id="view-title" class="text-3xl lg:text-5xl font-black text-slate-800 tracking-tighter">財務核帳報表</h1>
                <p id="live-clock" class="text-slate-400 font-bold mt-2 text-xs uppercase tracking-widest"></p>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-white px-5 py-3 rounded-2xl border shadow-sm flex items-center gap-3">
                    <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-[10px] font-black text-slate-500">系統連線正常</span>
                </div>
            </div>
        </div>

        <section id="view-orders" class="view-pane active">
            <div class="bg-white p-6 lg:p-10 rounded-[2.5rem] shadow-sm border border-slate-200 mb-8 flex flex-col lg:flex-row gap-5 items-end">
                <div class="w-full lg:flex-1">
                    <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase ml-1">關鍵字搜尋</label>
                    <input type="text" id="filter-kw" oninput="fetchAndRender()" class="w-full border-2 border-slate-100 p-4 rounded-2xl text-sm font-bold bg-slate-50" placeholder="姓名/電話/項目...">
                </div>
                <div class="flex gap-3 w-full lg:w-auto">
                    <button onclick="fetchAndRender()" class="flex-1 lg:flex-none bg-slate-800 text-white px-8 py-4 rounded-2xl font-black text-sm">搜尋</button>
                    <button onclick="exportToExcel()" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-black text-sm"><i class="fas fa-file-excel"></i></button>
                </div>
            </div>

            <div class="table-res shadow-xl">
                <table class="w-full text-left text-xs lg:text-sm border-collapse min-w-[950px]">
                    <thead>
                        <tr class="bg-slate-50 border-b-2">
                            <th class="p-6 text-slate-400 uppercase">日期</th>
                            <th class="p-6 text-slate-400 uppercase">類別</th>
                            <th class="p-6 text-slate-400 uppercase">信眾資訊</th>
                            <th class="p-6 text-slate-400 uppercase">項目</th>
                            <th class="p-6 text-right text-slate-400 uppercase">金額</th>
                            <th class="p-6 text-center text-slate-400 uppercase">狀態</th>
                            <th class="p-6 text-right text-slate-400 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list-body" class="divide-y divide-slate-100 font-bold text-slate-700"></tbody>
                </table>
            </div>
        </section>

        <section id="view-news" class="view-pane">
            <div class="bg-white p-6 lg:p-12 rounded-[3rem] border shadow-xl mb-10 max-w-4xl">
                <input type="hidden" id="n-edit-id">
                <div class="space-y-5">
                    <input type="text" id="n-title-in" placeholder="請輸入標題" class="w-full border-2 p-5 rounded-2xl bg-slate-50 font-black text-lg focus:border-blue-400 transition outline-none">
                    <textarea id="n-content-in" placeholder="消息詳細內容..." class="w-full border-2 p-5 rounded-2xl h-48 bg-slate-50 font-bold focus:border-blue-400 transition outline-none"></textarea>
                    <div class="flex gap-4">
                        <button onclick="submitNews()" class="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-black shadow-lg">確認發布</button>
                        <button onclick="resetNewsForm()" id="n-cancel-btn" class="hidden px-10 bg-slate-200 py-5 rounded-2xl font-black text-slate-500">取消</button>
                    </div>
                </div>
            </div>
            <div id="news-list-render" class="space-y-4 max-w-4xl"></div>
        </section>

        <section id="view-products" class="view-pane">
            <div class="bg-white p-8 rounded-[3rem] border shadow-xl mb-10 max-w-xl">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    <input type="text" id="p-name-in" placeholder="商品名稱" class="w-full border-2 p-4 rounded-2xl bg-slate-50 font-black">
                    <input type="number" id="p-price-in" placeholder="建議售價" class="w-full border-2 p-4 rounded-2xl bg-slate-50 font-black">
                </div>
                <input type="file" id="p-file-in" class="w-full border-2 border-dashed p-10 rounded-2xl mb-6 bg-slate-50 text-xs font-bold text-slate-400">
                <button onclick="uploadProduct()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl">執行上架</button>
            </div>
            <div id="product-render-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-5"></div>
        </section>

        <section id="view-services" class="view-pane">
            <div class="bg-white p-8 rounded-3xl border shadow-xl max-w-md mb-10">
                <div class="space-y-4">
                    <input type="text" id="s-name-in" placeholder="項目名稱" class="w-full border-2 p-4 rounded-2xl bg-slate-50 font-black text-lg">
                    <input type="number" id="s-price-in" placeholder="設定價格" class="w-full border-2 p-4 rounded-2xl bg-slate-50 font-black text-lg">
                    <button onclick="saveService()" class="w-full bg-yellow-600 text-white py-4 rounded-2xl font-black shadow-lg">更新祈福清單</button>
                </div>
            </div>
            <div id="services-render-box" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 max-w-5xl"></div>
        </section>

        <section id="view-videos" class="view-pane">
            <div class="bg-white p-8 rounded-3xl border shadow-xl max-w-xl mb-10">
                <div class="space-y-4">
                    <input type="text" id="v-title-in" placeholder="影片標題主題" class="w-full border-2 p-4 rounded-2xl bg-slate-50 font-black">
                    <input type="text" id="v-ytid-in" placeholder="YouTube 影片 ID" class="w-full border-2 p-4 rounded-2xl bg-slate-50 font-black">
                    <button onclick="saveVideo()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black shadow-lg">新增影音紀錄</button>
                </div>
            </div>
            <div id="video-render-box" class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-5xl"></div>
        </section>

        <section id="view-photos" class="view-pane">
            <div class="bg-white p-8 rounded-3xl border shadow-xl max-w-xl mb-10">
                <input type="text" id="ph-title-in" placeholder="照片描述主題" class="w-full border-2 p-4 rounded-2xl mb-4 bg-slate-50 font-black">
                <input type="file" id="ph-file-in" class="w-full border-2 border-dashed p-10 rounded-2xl mb-4 bg-slate-50 text-xs">
                <div id="ph-prog-box" class="hidden w-full bg-slate-100 h-3 rounded-full mb-4 overflow-hidden"><div id="ph-prog-bar" class="bg-blue-600 h-full w-0 transition-all"></div></div>
                <button onclick="uploadPhoto()" id="ph-upload-btn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black shadow-xl">開始上傳照片</button>
            </div>
            <div id="photo-render-grid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4"></div>
        </section>

    </main>

    <script>
        // --- 1. Firebase 初始化 ---
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const storage = firebase.storage(); const auth = firebase.auth();
        let ordersMasterData = [];

        // --- 2. 安全性與跳轉 ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.body.classList.remove('invisible');
                activateSection(localStorage.getItem('last_active_section') || 'orders');
            } else {
                window.location.replace("login.html");
            }
        });

        // --- 3. 手機版選單切換 ---
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('sidebar-open');
            overlay.style.display = sidebar.classList.contains('sidebar-open') ? 'block' : 'none';
        }

        function activateSection(id) {
            document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.admin-nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + id)?.classList.add('active');
            document.getElementById('menu-' + id)?.classList.add('active');
            localStorage.setItem('last_active_section', id);
            if (window.innerWidth < 1024) {
                document.getElementById('sidebar').classList.remove('sidebar-open');
                document.getElementById('overlay').style.display = 'none';
            }
            const titles = {'orders':'財務核帳報表','news':'最新消息管理','products':'文創商品管理','services':'祈福項目設定','videos':'影音作品管理','photos':'照片花絮管理'};
            document.getElementById('view-title').innerText = titles[id] || "管理系統";
        }

        // --- 4. 農曆轉換功能 ---
        function forceConvertLunar(data) {
            let raw = data.solarBirthday || data.birthday;
            if (!raw) return "未填寫";
            try {
                let y, m, d;
                if (typeof raw === 'string') {
                    const nums = raw.match(/\d+/g);
                    y = parseInt(nums[0]); m = parseInt(nums[1]); d = parseInt(nums[2]);
                } else if (raw.toDate) {
                    const dt = raw.toDate(); y = dt.getFullYear(); m = dt.getMonth() + 1; d = dt.getDate();
                } else return "無法解析";
                const lunar = Solar.fromYmd(y, m, d).getLunar();
                return `${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`;
            } catch (e) { return "轉換失敗"; }
        }

        // --- 5. 核心 CRUD 功能 ---

        // 財務核帳
        db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
            ordersMasterData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            fetchAndRender();
        });

        function fetchAndRender() {
            const kw = document.getElementById('filter-kw').value.toLowerCase();
            let html = "";
            ordersMasterData.filter(o => (o.name||"").includes(kw) || (o.phone||"").includes(kw) || (o.item||"").includes(kw)).forEach(o => {
                const isPaid = o.status === '已查帳';
                html += `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-6 text-slate-400 font-mono text-[10px] leading-tight">${o.createdAt ? o.createdAt.toDate().toLocaleString() : '-'}</td>
                    <td class="p-6">
                        <span class="px-2 py-1 rounded-lg text-[10px] ${o.category==='捐獻'?'bg-red-50 text-red-600':'bg-blue-50 text-blue-600'}">${o.category || '點燈'}</span>
                    </td>
                    <td class="p-6">
                        <div class="text-sm font-black text-slate-800">${o.name || '未名'}</div>
                        <div class="shuwun-card text-[10px] mt-2">
                            <p class="opacity-40 italic">國曆：${o.solarBirthday || o.birthday || '-'}</p>
                            <p class="text-blue-500">農曆：${forceConvertLunar(o)}</p>
                        </div>
                    </td>
                    <td class="p-6 text-xs text-slate-500">${o.item || '一般功德'}</td>
                    <td class="p-6 text-right font-black text-lg text-slate-900 italic">$${o.amount || 0}</td>
                    <td class="p-6 text-center">
                        <button onclick="updateStatus('${o.id}','${o.status}')" class="px-4 py-1.5 rounded-full text-[10px] font-black border-2 ${isPaid ? 'bg-green-600 text-white border-green-600' : 'bg-white text-yellow-600 border-yellow-200'}">${o.status || '待核'}</button>
                    </td>
                    <td class="p-6 text-right"><button onclick="deleteDoc('orders','${o.id}')" class="text-slate-200 hover:text-red-500 text-lg"><i class="fas fa-trash-alt"></i></button></td>
                </tr>`;
            });
            document.getElementById('orders-list-body').innerHTML = html;
        }

        async function updateStatus(id, curr) { await db.collection("orders").doc(id).update({ status: curr === '已查帳' ? '待查帳' : '已查帳' }); }

        // 最新消息
        async function submitNews() {
            const id = document.getElementById('n-edit-id').value;
            const t = document.getElementById('n-title-in').value, c = document.getElementById('n-content-in').value;
            if(!t || !c) return alert("請填寫內容");
            const payload = { title: t, content: c, updatedAt: new Date() };
            if(id) await db.collection("news").doc(id).update(payload);
            else await db.collection("news").add({ ...payload, createdAt: new Date() });
            resetNewsForm();
        }

        function resetNewsForm() {
            document.getElementById('n-edit-id').value = ""; document.getElementById('n-title-in').value = ""; document.getElementById('n-content-in').value = "";
            document.getElementById('n-cancel-btn').classList.add('hidden');
        }

        db.collection("news").orderBy("createdAt", "desc").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => {
                const n = doc.data(); h += `<div class="bg-white p-6 border rounded-3xl flex justify-between items-center shadow-md">
                    <div class="font-black text-slate-800">${n.title}</div>
                    <div class="flex gap-2">
                        <button onclick="editNews('${doc.id}','${n.title}','${n.content.replace(/\n/g,'\\n')}')" class="text-blue-500 text-xs font-black px-3 py-1 hover:bg-blue-50 rounded-lg">編輯</button>
                        <button onclick="deleteDoc('news','${doc.id}')" class="text-red-400 text-xs font-black px-3 py-1 hover:bg-red-50 rounded-lg">刪除</button>
                    </div>
                </div>`;
            });
            document.getElementById('news-list-render').innerHTML = h;
        });

        function editNews(id, t, c) {
            document.getElementById('n-edit-id').value = id; document.getElementById('n-title-in').value = t; document.getElementById('n-content-in').value = c;
            document.getElementById('n-cancel-btn').classList.remove('hidden'); window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 商品與服務
        async function uploadProduct() {
            const f = document.getElementById('p-file-in').files[0], n = document.getElementById('p-name-in').value, p = parseInt(document.getElementById('p-price-in').value);
            if(!f || !n || isNaN(p)) return alert("資料不齊");
            const ref = storage.ref(`products/${Date.now()}_${f.name}`); await ref.put(f);
            const url = await ref.getDownloadURL();
            await db.collection("products").add({ name: n, price: p, url, createdAt: new Date() });
            location.reload();
        }

        db.collection("products").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => {
                const p = doc.data(); h += `<div class="bg-white p-4 rounded-3xl border shadow-lg text-center">
                    <img src="${p.url}" class="w-full h-24 object-cover rounded-xl mb-3 shadow-inner">
                    <div class="font-black text-[10px] mb-1 truncate">${p.name}</div>
                    <div class="text-red-600 font-black text-sm mb-2">$${p.price}</div>
                    <button onclick="deleteDoc('products','${doc.id}')" class="text-[9px] text-slate-300 hover:text-red-500 uppercase font-black">移除</button>
                </div>`;
            });
            document.getElementById('product-render-grid').innerHTML = h;
        });

        async function saveService() {
            const n = document.getElementById('s-name-in').value, p = parseInt(document.getElementById('s-price-in').value);
            await db.collection("services").add({ name: n, price: p, createdAt: new Date() }); location.reload();
        }

        db.collection("services").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => {
                const s = doc.data(); h += `<div class="bg-white p-5 rounded-2xl border flex justify-between items-center shadow-md font-black text-slate-700">
                    <span class="text-sm">🏮 ${s.name} <span class="text-red-500 ml-3">$${s.price}</span></span>
                    <button onclick="deleteDoc('services','${doc.id}')" class="text-red-300 hover:text-red-500 text-xs">刪除</button>
                </div>`;
            });
            document.getElementById('services-render-box').innerHTML = h;
        });

        // 影音與照片完整回歸
        async function saveVideo() {
            const t = document.getElementById('v-title-in').value, y = document.getElementById('v-ytid-in').value;
            if(!t || !y) return alert("請填寫完整");
            await db.collection("videos").add({ title: t, ytid: y, createdAt: new Date() }); location.reload();
        }

        db.collection("videos").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => {
                const v = doc.data(); h += `<div class="bg-white p-5 rounded-2xl border flex justify-between items-center shadow-md font-black text-slate-700">
                    <span class="text-sm truncate mr-4">🎥 ${v.title}</span>
                    <button onclick="deleteDoc('videos','${doc.id}')" class="text-red-300 hover:text-red-500 text-xs shrink-0">刪除紀錄</button>
                </div>`;
            });
            document.getElementById('video-render-box').innerHTML = h;
        });

        async function uploadPhoto() {
            const f = document.getElementById('ph-file-in').files[0], t = document.getElementById('ph-title-in').value;
            if(!f || !t) return alert("請選取照片與主題");
            const btn = document.getElementById('ph-upload-btn'), box = document.getElementById('ph-prog-box'), bar = document.getElementById('ph-prog-bar');
            btn.disabled = true; box.classList.remove('hidden');
            const task = storage.ref(`gallery/${Date.now()}_${f.name}`).put(f);
            task.on('state_changed', s => { bar.style.width = (s.bytesTransferred/s.totalBytes)*100+'%'; }, null, async () => {
                const url = await task.snapshot.ref.getDownloadURL();
                await db.collection("photos").add({ title: t, url, createdAt: new Date() }); location.reload();
            });
        }

        db.collection("photos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => {
                h += `<div class="relative group">
                    <img src="${doc.data().url}" class="h-32 w-full object-cover rounded-2xl border-2 border-white shadow-lg group-hover:scale-105 transition duration-500">
                    <button onclick="deleteDoc('photos','${doc.id}')" class="absolute top-2 right-2 bg-red-600 text-white w-6 h-6 rounded-full opacity-0 group-hover:opacity-100 transition shadow-lg text-xs">×</button>
                </div>`;
            });
            document.getElementById('photo-render-grid').innerHTML = h;
        });

        // 共通
        async function deleteDoc(coll, id) { if(confirm("🚨 警告：確定執行永久刪除？")) await db.collection(coll).doc(id).delete(); }
        function finalLogout() { if(confirm("確定登出？")) auth.signOut().then(() => window.location.replace("login.html")); }
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleString(); }, 1000);

        function exportToExcel() {
            const data = ordersMasterData.map(o => ({ "日期": o.createdAt?o.createdAt.toDate().toLocaleString():"-", "姓名": o.name, "電話": o.phone, "項目": o.item, "金額": o.amount, "狀態": o.status }));
            const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "財務報表");
            XLSX.writeFile(wb, `廣寧宮核帳_${new Date().toLocaleDateString()}.xlsx`);
        }
    </script>
</body>
</html>
