<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>廣寧宮管理後台 | ZJ影像系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    <style>
        .admin-panel { display: none; }
        .admin-panel.active { display: block; }
        .nav-btn.active { @apply bg-slate-800 border-l-4 border-t-gold text-white font-bold; }
    </style>
</head>
<body class="bg-slate-100 flex min-h-screen">

    <aside class="w-64 bg-slate-900 text-slate-400 h-screen sticky top-0 shadow-2xl flex flex-col">
        <div class="p-8 text-center border-b border-slate-800"><h2 class="text-xl font-bold text-yellow-500">廣寧宮管理</h2></div>
        <nav class="mt-4 flex-1">
            <button onclick="showPanel('orders')" id="btn-orders" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-list mr-3"></i> 訂單與核帳</button>
            <button onclick="showPanel('photos')" id="btn-photos" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-camera mr-3"></i> 照片管理</button>
            <button onclick="showPanel('videos')" id="btn-videos" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-video mr-3"></i> 影音管理</button>
            <button onclick="showPanel('services')" id="btn-services" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-tags mr-3"></i> 祈福項目</button>
            <button onclick="showPanel('news')" id="btn-news" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-bullhorn mr-3"></i> 公告消息</button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <h2 id="main-title" class="text-3xl font-black mb-8 text-slate-800">管理看板</h2>

        <section id="panel-orders" class="admin-panel active">
            <div class="bg-white p-6 rounded-2xl border mb-6 flex gap-4">
                <input type="text" id="o-search" onkeyup="fetchOrders()" class="flex-1 p-2 border rounded-xl" placeholder="搜尋信眾...">
                <select id="o-cat" onchange="fetchOrders()" class="p-2 border rounded-xl font-bold text-blue-600">
                    <option value="all">所有類別</option><option value="點燈">點燈</option><option value="捐獻">香油錢</option>
                </select>
            </div>
            <div class="bg-white rounded-3xl border overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b font-bold text-slate-400 uppercase">
                        <tr><th class="p-6">類別</th><th class="p-6">姓名/電話</th><th class="p-6">項目</th><th class="p-6">金額</th><th class="p-6">狀態</th><th class="p-6 text-right">操作</th></tr>
                    </thead>
                    <tbody id="admin-orders-body" class="divide-y"></tbody>
                </table>
            </div>
        </section>

        <section id="panel-photos" class="admin-panel">
            <div class="bg-white p-8 rounded-3xl border mb-8 max-w-xl">
                <input type="hidden" id="p-id">
                <input type="text" id="p-title" placeholder="照片活動名稱" class="w-full border p-3 rounded-xl mb-4">
                <div class="border-2 border-dashed border-slate-200 p-6 rounded-2xl text-center mb-4">
                    <input type="file" id="p-file" accept="image/*" class="hidden">
                    <label for="p-file" class="cursor-pointer text-blue-600 font-bold hover:underline">選取電腦照片</label>
                    <p id="p-filename" class="text-xs text-slate-400 mt-2">尚未選擇</p>
                </div>
                <div id="p-prog-area" class="hidden w-full bg-slate-100 h-2 rounded-full mb-4"><div id="p-bar" class="bg-blue-600 h-2 rounded-full" style="width:0%"></div></div>
                <button onclick="handlePhotoSave()" id="p-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">確認發布</button>
            </div>
            <div id="admin-photo-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70",
            authDomain: "testproject-fb870.firebaseapp.com",
            projectId: "testproject-fb870",
            storageBucket: "testproject-fb870.firebasestorage.app",
            messagingSenderId: "164908049871",
            appId: "1:164908049871:web:21e77c3bb591de85685eba"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // 介面與記憶切換
        function showPanel(id) {
            document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            localStorage.setItem('guangningActivePanel', id);
            if(id === 'orders') fetchOrders();
        }

        // 重新整理時自動跳轉回上次的分頁
        window.onload = () => { showPanel(localStorage.getItem('guangningActivePanel') || 'orders'); };

        // 照片上傳邏輯
        document.getElementById('p-file').onchange = e => { document.getElementById('p-filename').innerText = e.target.files[0]?.name; };

        async function handlePhotoSave() {
            const file = document.getElementById('p-file').files[0];
            const title = document.getElementById('p-title').value;
            if(!title) return alert("請填寫標題");

            const barArea = document.getElementById('p-prog-area');
            const bar = document.getElementById('p-bar');
            
            let downloadURL = "";
            if(file) {
                barArea.classList.remove('hidden');
                const ref = storage.ref(`gallery/${Date.now()}_${file.name}`);
                const task = ref.put(file);
                await new Promise((res, rej) => {
                    task.on('state_changed', s => bar.style.width = (s.bytesTransferred/s.totalBytes)*100+'%', rej, async () => { downloadURL = await task.snapshot.ref.getDownloadURL(); res(); });
                });
            }
            await db.collection("photos").add({ title, url: downloadURL, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert("成功發布");
            location.reload();
        }

        // 訂單核帳數據抓取
        async function fetchOrders() {
            const search = document.getElementById('o-search').value;
            const cat = document.getElementById('o-cat').value;
            const snap = await db.collection("orders").orderBy("createdAt", "desc").get();
            let html = "";
            snap.forEach(doc => {
                const o = doc.data();
                if(cat !== 'all' && o.category !== cat) return;
                if(search && !o.name.includes(search) && !o.phone.includes(search)) return;
                html += `<tr><td class="p-6 font-bold ${o.category==='點燈'?'text-blue-600':'text-red-600'}">${o.category}</td><td class="p-6 font-bold">${o.name}<br><small>${o.phone}</small></td><td class="p-6">${o.item}</td><td class="p-6">$${o.amount||'-'}</td><td class="p-6 text-yellow-600">${o.status}</td><td class="p-6 text-right"><button onclick="updateStatus('${doc.id}')" class="underline text-blue-600">核帳</button></td></tr>`;
            });
            document.getElementById('admin-orders-body').innerHTML = html;
        }

        async function updateStatus(id) { await db.collection("orders").doc(id).update({ status: "已完成" }); fetchOrders(); }

        // 即時顯示照片牆 (後台預覽)
        db.collection("photos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => { html += `<div class="bg-white p-2 rounded-xl border relative"><img src="${doc.data().url}" class="h-24 w-full object-cover rounded"><button onclick="deleteDoc('photos','${doc.id}')" class="absolute top-1 right-1 bg-red-500 text-white rounded-full w-5 h-5 text-xs">×</button></div>`; });
            document.getElementById('admin-photo-grid').innerHTML = html;
        });

        async function deleteDoc(col, id) { if(confirm("確定刪除？")) await db.collection(col).doc(id).delete(); }
    </script>
</body>
</html>
