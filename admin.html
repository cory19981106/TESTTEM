<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣寧宮管理後台 | 旗艦級全功能維護系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 't-blue': '#0F172A', 't-gold': '#EAB308', 't-red': '#8B0000' },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem', '5xl': '3rem' }
                } 
            }
        }
    </script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; color: #1E293B; overflow: hidden; }
        
        /* 側邊欄：解決一行兩個按鈕的問題，強制垂直排列 */
        .sidebar-fixed { 
            width: 320px; 
            background: #0F172A; 
            height: 100vh; 
            position: sticky; 
            top: 0; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            box-shadow: 10px 0 40px rgba(0,0,0,0.15); 
            z-index: 100;
        }

        .nav-scroller { 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            padding: 20px 0; 
        }

        /* 選單按鈕樣式：強制 Block */
        .nav-item-btn {
            display: block !important;
            width: 100% !important;
            text-align: left;
            padding: 20px 32px;
            color: #94A3B8;
            font-weight: 700;
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            margin-bottom: 4px;
        }
        .nav-item-btn:hover { background: rgba(255,255,255,0.05); color: #FFFFFF; }
        .nav-item-btn.active { 
            background: rgba(255,255,255,0.08); 
            color: #FFFFFF; 
            border-left: 4px solid #EAB308; 
            box-shadow: inset 8px 0 16px rgba(0,0,0,0.2);
        }
        .nav-item-btn i { margin-right: 15px; font-size: 1.2rem; opacity: 0.7; }

        /* 主顯示區域 */
        .main-workspace { flex: 1; height: 100vh; overflow-y: auto; padding: 50px; display: flex; flex-direction: column; }
        .content-section { display: none; }
        .content-section.active { display: block; animation: sectionFadeIn 0.5s ease-out; }

        /* 農曆生辰卡片 */
        .lunar-info-card {
            background: linear-gradient(135deg, #FFFFFF 0%, #F8FAFC 100%);
            border: 1px solid #E2E8F0;
            border-left: 6px solid #3B82F6;
            padding: 15px;
            border-radius: 18px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }

        @keyframes sectionFadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 捲動條美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
        
        /* 表格排版 */
        .admin-table { border-radius: 30px; overflow: hidden; border: 1px solid #E2E8F0; background: white; box-shadow: 0 20px 40px rgba(0,0,0,0.03); }
        .admin-table thead { background: #F8FAFC; border-bottom: 2px solid #F1F5F9; }
        .admin-table th { padding: 24px; font-weight: 900; color: #64748B; text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }
    </style>
</head>
<body class="flex">

    <aside class="sidebar-fixed">
        <div class="p-10 text-center border-b border-white/5">
            <div class="w-16 h-16 bg-gradient-to-br from-yellow-400 to-yellow-600 text-slate-900 rounded-2xl flex items-center justify-center text-3xl font-black mx-auto mb-4 shadow-2xl">廣</div>
            <h2 class="text-white text-xl font-black tracking-[0.2em]">廣寧宮管理</h2>
            <p class="text-[10px] mt-2 text-yellow-500/50 uppercase font-black tracking-widest">Backend Enterprise v4.5</p>
        </div>
        
        <nav class="nav-scroller">
            <button onclick="switchTab('orders')" id="tab-orders" class="nav-item-btn active">
                <i class="fas fa-file-invoice-dollar"></i> 財務核帳報表
            </button>
            <button onclick="switchTab('news')" id="tab-news" class="nav-item-btn">
                <i class="fas fa-bullhorn"></i> 最新消息管理
            </button>
            <button onclick="switchTab('products')" id="tab-products" class="nav-item-btn">
                <i class="fas fa-box-open"></i> 文創商品管理
            </button>
            <button onclick="switchTab('services')" id="tab-services" class="nav-item-btn">
                <i class="fas fa-tags"></i> 祈福項目設定
            </button>
            <button onclick="switchTab('videos')" id="tab-videos" class="nav-item-btn">
                <i class="fas fa-play-circle"></i> 影音作品管理
            </button>
            <button onclick="switchTab('photos')" id="tab-photos" class="nav-item-btn">
                <i class="fas fa-images"></i> 照片花絮管理
            </button>
        </nav>

        <div class="p-8 border-t border-white/5">
            <button onclick="secureLogout()" class="w-full bg-red-500/10 hover:bg-red-600 text-red-500 hover:text-white py-4 rounded-2xl text-xs font-black transition-all border border-red-500/20 group flex items-center justify-center gap-3">
                <i class="fas fa-power-off group-hover:scale-125 transition"></i> 徹底登出系統
            </button>
        </div>
    </aside>

    <main class="main-workspace">
        
        <div class="flex justify-between items-end mb-12">
            <div>
                <h1 id="workspace-title" class="text-4xl font-black text-slate-800 tracking-tighter">財務核帳報表</h1>
                <p id="current-time-box" class="text-slate-400 font-bold mt-2 text-sm uppercase tracking-widest"></p>
            </div>
            <div class="bg-white px-6 py-3 rounded-2xl border shadow-sm flex items-center gap-4">
                <span class="relative flex h-3 w-3"><span class="animate-ping absolute h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative h-3 w-3 rounded-full bg-green-500"></span></span>
                <span class="text-xs font-black text-slate-500 tracking-widest uppercase">Firebase 即時同步中</span>
            </div>
        </div>

        <section id="pane-orders" class="content-section active">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-200 mb-10 flex flex-wrap gap-6 items-end">
                <div class="flex-1 min-w-[300px]">
                    <label class="text-xs font-black text-slate-400 block mb-3 uppercase ml-1">關鍵字搜尋信眾 (姓名/電話)</label>
                    <input type="text" id="input-search" oninput="executeDataFilter()" class="w-full border-2 border-slate-100 p-4 rounded-2xl text-sm outline-none focus:border-blue-500 bg-slate-50 transition-all font-bold" placeholder="搜尋項目...">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-black text-slate-400 block mb-3 uppercase ml-1">起始日期</label>
                        <input type="date" id="input-start" class="border-2 border-slate-100 p-4 rounded-2xl text-sm bg-slate-50 font-bold">
                    </div>
                    <div>
                        <label class="text-xs font-black text-slate-400 block mb-3 uppercase ml-1">結束日期</label>
                        <input type="date" id="input-end" class="border-2 border-slate-100 p-4 rounded-2xl text-sm bg-slate-50 font-bold">
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="executeDataFilter()" class="bg-slate-800 text-white px-10 py-4 rounded-2xl font-black text-sm hover:bg-black transition shadow-lg">篩選</button>
                    <button onclick="downloadExcelReport()" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-black text-sm hover:bg-green-700 transition shadow-lg flex items-center gap-2">
                        <i class="fas fa-file-excel"></i> 匯出報表
                    </button>
                </div>
            </div>

            <div class="admin-table">
                <table class="w-full text-left text-sm border-collapse">
                    <thead>
                        <tr>
                            <th class="p-6">登記日期</th>
                            <th class="p-6">類別</th>
                            <th class="p-6">信眾與農曆生辰資訊</th>
                            <th class="p-6">祈福項目</th>
                            <th class="p-6 text-right">金額</th>
                            <th class="p-6 text-center">狀態</th>
                            <th class="p-6 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list-tbody" class="divide-y divide-slate-100 bg-white">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="pane-news" class="content-section">
            <div id="news-form-box" class="bg-white p-10 rounded-[3rem] border border-slate-200 mb-10 max-w-4xl shadow-xl transition-all">
                <input type="hidden" id="edit-news-id">
                <h3 id="news-label" class="font-black text-slate-400 mb-6 text-xs uppercase tracking-[0.3em]">發布最新消息</h3>
                <div class="space-y-6">
                    <input type="text" id="news-title-in" placeholder="公告標題" class="w-full border-2 border-slate-50 p-5 rounded-3xl outline-none focus:border-blue-200 bg-slate-50 font-black text-lg">
                    <textarea id="news-content-in" placeholder="輸入公告詳細內容..." class="w-full border-2 border-slate-50 p-5 rounded-3xl h-64 outline-none focus:border-blue-200 bg-slate-50 leading-relaxed font-bold"></textarea>
                    <div class="flex gap-4">
                        <button onclick="saveNewsEntry()" id="news-save-btn" class="flex-1 bg-blue-600 text-white py-5 rounded-3xl font-black shadow-2xl hover:bg-blue-700 transition">發布並存檔</button>
                        <button onclick="clearNewsForm()" id="news-cancel-btn" class="hidden px-12 bg-slate-200 py-5 rounded-3xl font-black text-slate-600">取消編輯</button>
                    </div>
                </div>
            </div>
            <div id="news-list-render" class="space-y-4 max-w-4xl"></div>
        </section>

        <section id="pane-products" class="content-section">
            <div class="bg-white p-10 rounded-[3rem] border mb-12 shadow-xl max-w-3xl">
                <div class="grid grid-cols-2 gap-8 mb-8">
                    <div>
                        <label class="text-xs font-black text-slate-400 ml-2 mb-2 block uppercase">商品名稱</label>
                        <input type="text" id="prod-name-in" placeholder="例如：開運紅包袋" class="w-full border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-bold">
                    </div>
                    <div>
                        <label class="text-xs font-black text-slate-400 ml-2 mb-2 block uppercase">商品售價</label>
                        <input type="number" id="prod-price-in" placeholder="金額" class="w-full border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-bold">
                    </div>
                </div>
                <label class="text-xs font-black text-slate-400 ml-2 mb-2 block uppercase">上傳產品照片</label>
                <input type="file" id="prod-file-in" class="w-full border-2 border-dashed border-slate-200 p-10 rounded-3xl mb-8 bg-slate-50/50">
                <button onclick="handleProductUpload()" class="w-full bg-slate-900 text-white py-6 rounded-3xl font-black shadow-2xl hover:bg-black transition text-lg">
                    確認上架商品
                </button>
            </div>
            <div id="product-grid-render" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

        <section id="pane-services" class="content-section">
            <div class="bg-white p-10 rounded-[3rem] border max-w-lg shadow-xl mb-12">
                <h3 class="font-black text-slate-400 mb-6 text-xs uppercase tracking-widest text-center">新增/修改祈福項目</h3>
                <div class="space-y-5">
                    <input type="text" id="serv-name-in" placeholder="項目名稱" class="w-full border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-bold">
                    <input type="number" id="serv-price-in" placeholder="設定金額" class="w-full border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-bold">
                    <button onclick="saveServiceItem()" class="w-full bg-yellow-600 text-white py-5 rounded-3xl font-black shadow-lg">儲存祈福設定</button>
                </div>
            </div>
            <div id="services-list-render" class="grid gap-4 max-w-2xl"></div>
        </section>

        <section id="pane-videos" class="content-section">
            <div class="bg-white p-10 rounded-[3rem] border max-w-xl shadow-xl mb-10">
                <div class="space-y-6">
                    <input type="text" id="vid-title-in" placeholder="影片名稱" class="w-full border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-bold">
                    <input type="text" id="vid-ytid-in" placeholder="YouTube ID (如：vK_X27uF_zM)" class="w-full border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-bold">
                    <button onclick="saveVideoItem()" class="w-full bg-red-600 text-white py-5 rounded-3xl font-black shadow-lg">新增影音紀錄</button>
                </div>
            </div>
            <div id="video-list-render" class="space-y-4 max-w-3xl"></div>
        </section>

        <section id="pane-photos" class="content-section">
            <div class="bg-white p-10 rounded-[3rem] border max-w-xl shadow-xl mb-10">
                <input type="text" id="ph-title-in" placeholder="照片描述主題" class="w-full border-2 border-slate-50 p-5 rounded-2xl mb-6 bg-slate-50 font-bold">
                <input type="file" id="ph-file-in" class="w-full border-2 border-dashed p-10 rounded-2xl mb-6 bg-slate-50">
                <div id="ph-prog-wrapper" class="hidden w-full bg-slate-100 h-4 rounded-full mb-6 overflow-hidden shadow-inner">
                    <div id="ph-prog-bar" class="bg-blue-600 h-full w-0 transition-all duration-500 shadow-lg"></div>
                </div>
                <button onclick="processPhotoUpload()" id="ph-upload-btn" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black shadow-2xl">開始上傳照片</button>
            </div>
            <div id="photo-grid-render" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </section>

    </main>

    <script>
        // --- 1. Firebase 初始化 ---
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); 
        const storage = firebase.storage();
        const auth = firebase.auth();
        let fullOrdersData = [];

        // --- 2. 登入安全性監控 ---
        auth.onAuthStateChanged(user => {
            if (!user) {
                console.warn("當前未登入，請導向登入頁面");
            } else {
                console.log("驗證通過，進入廣寧宮後台");
                const lastUsedTab = localStorage.getItem('active_admin_pane') || 'orders';
                switchTab(lastUsedTab);
            }
        });

        // 核心修正：徹底登出
        function secureLogout() {
            if (confirm("🚨 注意：您即將安全登出管理系統並銷毀此裝置的臨時授權。確定要登出嗎？")) {
                auth.signOut().then(() => {
                    localStorage.clear();
                    sessionStorage.clear();
                    window.location.replace("login.html");
                }).catch(err => alert("登出失敗：" + err.message));
            }
        }

        // --- 3. UI 選單控制 ---
        function switchTab(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item-btn').forEach(b => b.classList.remove('active'));
            
            const targetPane = document.getElementById('pane-' + id);
            if (targetPane) targetPane.classList.add('active');
            
            const targetBtn = document.getElementById('tab-' + id);
            if (targetBtn) targetBtn.classList.add('active');
            
            localStorage.setItem('active_admin_pane', id);
            
            const titleMap = {
                'orders': '財務核帳與點燈明細', 'news': '最新消息與消息公告管理', 'products': '廟方文創商品清單維護',
                'services': '祈福服務價格設定', 'videos': '宮廟影音紀實作品管理', 'photos': '活動花絮照片牆維護'
            };
            document.getElementById('workspace-title').innerText = titleMap[id] || "管理主面板";
        }

        // --- 4. [核心修復：終極穩定版農曆解析邏輯] ---
        function getLunarSafeAndStrict(order) {
            // A. 如果資料庫已經有精準的轉換結果，優先回傳
            if (order.lunarBirthday && order.lunarBirthday !== "未轉換") return order.lunarBirthday;
            
            // B. 抓取國曆欄位 (相容不同的變數名稱)
            let rawSolar = order.solarBirthday || order.birthday;
            
            if (!rawSolar) return "無生辰資訊";

            try {
                let y, m, d;
                
                // 情境 1: 格式為 "2026-04-15" (字串型)
                if (typeof rawSolar === 'string') {
                    // 使用正則強行提取數字
                    const parts = rawSolar.match(/\d+/g);
                    if (!parts || parts.length < 3) return "日期字串格式錯誤";
                    y = parseInt(parts[0]);
                    m = parseInt(parts[1]);
                    d = parseInt(parts[2]);
                } 
                // 情境 2: Firebase Timestamp 物件
                else if (rawSolar.toDate) {
                    const dt = rawSolar.toDate();
                    y = dt.getFullYear(); m = dt.getMonth() + 1; d = dt.getDate();
                } else {
                    return "格式不支援解析";
                }

                // 強制穩定計算
                const solar = Solar.fromYmd(y, m, d);
                const lunar = solar.getLunar();
                
                return `${lunar.getYearInGanZhi()}年(${lunar.getYearZodiac()}) ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`;
            } catch (e) {
                console.error("Lunar Parse Fatal Error:", e);
                return "解析失敗，請手動校核";
            }
        }

        // --- 5. 財務核帳邏輯 ---
        db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
            fullOrdersData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            executeDataFilter();
        });

        function executeDataFilter() {
            const kw = document.getElementById('input-search').value.toLowerCase();
            const start = document.getElementById('input-start').value;
            const end = document.getElementById('input-end').value;

            let filtered = fullOrdersData.filter(o => {
                const nMatch = (o.name || "").includes(kw);
                const pMatch = (o.phone || "").includes(kw);
                let dMatch = true;
                if (start && o.createdAt) dMatch = o.createdAt.toDate() >= new Date(start);
                if (end && o.createdAt) {
                    let endD = new Date(end); endD.setHours(23, 59, 59);
                    dMatch = dMatch && o.createdAt.toDate() <= endD;
                }
                return (nMatch || pMatch) && dMatch;
            });

            let html = "";
            filtered.forEach(o => {
                const checkDone = o.status === '已查帳';
                const lunarResult = getLunarSafeAndStrict(o); // 調用終極修復解析器

                html += `
                <tr class="border-b border-slate-50 transition hover:bg-slate-50/50">
                    <td class="p-6 text-slate-400 font-mono text-[10px] leading-tight">
                        ${o.createdAt ? o.createdAt.toDate().toLocaleString('zh-TW') : '-'}
                    </td>
                    <td class="p-6">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${o.category === '捐獻' ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-blue-50 text-blue-600 border border-blue-100'}">
                            ${o.category || '點燈'}
                        </span>
                    </td>
                    <td class="p-6 min-w-[250px]">
                        <div class="font-black text-slate-800 text-lg mb-1">${o.name || '信眾'}</div>
                        <div class="text-xs text-slate-400 font-mono mb-4"><i class="fas fa-phone-alt mr-2 opacity-50"></i>${o.phone || '無電話'}</div>
                        <div class="lunar-info-card leading-relaxed">
                            <p class="text-blue-700 font-black mb-1">⛩️ 農曆：${lunarResult}</p>
                            <p class="text-slate-500 font-bold italic opacity-70">📅 國曆：${o.solarBirthday || o.birthday || '未提供'}</p>
                            <p class="text-slate-500 font-bold">⏰ 時辰：${o.birthHour || '吉時'}</p>
                        </div>
                    </td>
                    <td class="p-6 text-slate-600 font-black text-sm">${o.item || '一般功德'}</td>
                    <td class="p-6 text-right font-black text-2xl text-slate-900 tracking-tighter">$${o.amount || 0}</td>
                    <td class="p-6 text-center">
                        <button onclick="changeDocStatus('${o.id}', '${o.status}')" class="px-6 py-2.5 rounded-full text-[11px] font-black border-2 transition-all ${checkDone ? 'bg-green-600 text-white border-green-600 shadow-md' : 'bg-white text-yellow-600 border-yellow-200 hover:bg-yellow-50'}">
                            ${o.status || '待核帳'}
                        </button>
                    </td>
                    <td class="p-6 text-right">
                        <button onclick="killDocument('orders', '${o.id}')" class="text-slate-200 hover:text-red-500 transition text-2xl px-4"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
            });
            document.getElementById('orders-list-tbody').innerHTML = html || '<tr><td colspan="7" class="p-40 text-center text-slate-300 italic font-black text-xl tracking-widest">目前此範圍下沒有任何資料紀錄</td></tr>';
        }

        async function changeDocStatus(id, curr) {
            const next = (curr === '已查帳') ? '待查帳' : '已查帳';
            await db.collection("orders").doc(id).update({ status: next });
        }

        function downloadExcelReport() {
            const excelData = globalOrdersData.map(o => ({
                "日期": o.createdAt ? o.createdAt.toDate().toLocaleString() : "-",
                "類別": o.category, "姓名": o.name, "電話": o.phone,
                "國曆生日": o.solarBirthday || o.birthday || "無",
                "農曆生辰解析": getLunarSafeAndStrict(o), // 匯出報表時同步強制計算
                "出生時辰": o.birthHour || "吉時",
                "祈福項目": o.item, "金額": o.amount, "狀態": o.status
            }));
            const worksheet = XLSX.utils.json_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "報表");
            XLSX.writeFile(workbook, `廣寧宮財務核帳報表_${new Date().toLocaleDateString()}.xlsx`);
        }

        // --- 6. 最新消息管理模組 ---
        async function saveNewsEntry() {
            const id = document.getElementById('edit-news-id').value;
            const t = document.getElementById('news-title-in').value;
            const c = document.getElementById('news-content-in').value;
            if(!t || !c) return alert("標題與內容皆為必填");
            const pack = { title: t, content: c, updatedAt: new Date() };
            if (id) await db.collection("news").doc(id).update(pack);
            else await db.collection("news").add({ ...pack, createdAt: new Date() });
            clearNewsForm();
        }

        function editNewsItem(id, t, c) {
            document.getElementById('edit-news-id').value = id;
            document.getElementById('news-title-in').value = t;
            document.getElementById('news-content-in').value = c;
            document.getElementById('news-form-box').classList.add('ring-8', 'ring-blue-100');
            document.getElementById('news-label').innerText = "📍 正在編輯消息";
            document.getElementById('news-cancel-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function clearNewsForm() {
            document.getElementById('edit-news-id').value = "";
            document.getElementById('news-title-in').value = "";
            document.getElementById('news-content-in').value = "";
            document.getElementById('news-form-box').classList.remove('ring-8', 'ring-blue-100');
            document.getElementById('news-cancel-btn').classList.add('hidden');
        }

        db.collection("news").orderBy("createdAt", "desc").onSnapshot(snap => {
            let h = "";
            snap.forEach(doc => {
                const data = doc.data();
                const safeContent = (data.content || "").replace(/\n/g, '\\n').replace(/'/g, "\\'");
                h += `
                <div class="bg-white p-6 border rounded-[2rem] flex justify-between items-center shadow-lg transition hover:shadow-xl">
                    <div class="font-black text-slate-800 text-lg">${data.title}</div>
                    <div class="flex gap-4">
                        <button onclick="editNewsItem('${doc.id}','${data.title}','${safeContent}')" class="text-blue-500 font-black text-xs uppercase px-4 py-2 hover:bg-blue-50 rounded-xl transition">編輯</button>
                        <button onclick="killDocument('news','${doc.id}')" class="text-red-400 font-black text-xs uppercase px-4 py-2 hover:bg-red-50 rounded-xl transition">刪除</button>
                    </div>
                </div>`;
            });
            document.getElementById('news-list-render').innerHTML = h;
        });

        // --- 7. 文創商品模組 ---
        async function handleProductUpload() {
            const file = document.getElementById('prod-file-in').files[0];
            const name = document.getElementById('prod-name-in').value;
            const price = parseInt(document.getElementById('prod-price-in').value);
            if(!name || isNaN(price)) return alert("請填寫正確資訊");
            let url = ""; 
            if (file) {
                const path = `products/${Date.now()}_${file.name}`;
                const ref = storage.ref(path);
                await ref.put(file);
                url = await ref.getDownloadURL();
            }
            await db.collection("products").add({ name, price, url, createdAt: new Date() });
            alert("商品已上架"); location.reload();
        }

        db.collection("products").orderBy("createdAt", "desc").onSnapshot(snap => {
            let h = "";
            snap.forEach(doc => {
                const p = doc.data();
                h += `
                <div class="bg-white p-5 rounded-[2.5rem] border shadow-xl text-center flex flex-col items-center">
                    <img src="${p.url}" class="h-44 w-full object-cover rounded-3xl mb-5 border shadow-inner">
                    <div class="font-black text-slate-800 text-sm mb-1">${p.name}</div>
                    <div class="text-red-600 font-black text-xl mb-4 tracking-tighter">$${p.price}</div>
                    <button onclick="killDocument('products','${doc.id}')" class="text-slate-300 hover:text-red-500 font-bold text-[10px] uppercase tracking-widest transition">移除商品</button>
                </div>`;
            });
            document.getElementById('product-grid-render').innerHTML = h;
        });

        // --- 8. 照片花絮模組 ---
        async function processPhotoUpload() {
            const f = document.getElementById('ph-file-in').files[0];
            const t = document.getElementById('ph-title-in').value;
            if(!f || !t) return alert("請選取照片並填寫說明");
            const btn = document.getElementById('ph-upload-btn');
            const wrap = document.getElementById('ph-prog-wrapper');
            const bar = document.getElementById('ph-prog-bar');
            btn.disabled = true; wrap.classList.remove('hidden');
            const path = `gallery/${Date.now()}_${f.name}`;
            const task = storage.ref(path).put(f);
            task.on('state_changed', s => { 
                bar.style.width = (s.bytesTransferred / s.totalBytes) * 100 + '%'; 
            }, null, async () => {
                const url = await task.snapshot.ref.getDownloadURL();
                await db.collection("photos").add({ title: t, url, path, createdAt: new Date() });
                location.reload();
            });
        }

        db.collection("photos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let h = "";
            snap.forEach(doc => {
                const p = doc.data();
                h += `
                <div class="relative group">
                    <img src="${p.url}" class="h-48 w-full object-cover rounded-[2rem] border-4 border-white shadow-2xl transition duration-500 group-hover:scale-105">
                    <button onclick="killDocument('photos', '${doc.id}')" class="absolute top-4 right-4 bg-red-600 text-white w-8 h-8 rounded-full shadow-2xl opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center">×</button>
                </div>`;
            });
            document.getElementById('photo-grid-render').innerHTML = h;
        });

        // --- 9. 祈福與影音 CRUD ---
        async function saveServiceItem() { 
            const n = document.getElementById('serv-name-in').value; 
            const p = parseInt(document.getElementById('serv-price-in').value); 
            await db.collection("services").add({ name: n, price: p, createdAt: new Date() }); location.reload(); 
        }
        db.collection("services").onSnapshot(snap => { 
            let h = ""; 
            snap.forEach(doc => { 
                h += `<div class="bg-white p-6 rounded-3xl border flex justify-between items-center shadow-xl font-black text-slate-700">🏮 ${doc.data().name} <span class="text-red-500 ml-6 font-black">$${doc.data().price}</span> <button onclick="killDocument('services','${doc.id}')" class="text-red-400 text-xs px-4 py-2 hover:bg-red-50 rounded-xl transition">刪除</button></div>`; 
            }); 
            document.getElementById('services-list-render').innerHTML = h; 
        });

        async function saveVideoItem() { 
            const t = document.getElementById('vid-title-in').value; 
            const y = document.getElementById('vid-ytid-in').value; 
            await db.collection("videos").add({ title: t, ytid: y, createdAt: new Date() }); location.reload(); 
        }
        db.collection("videos").onSnapshot(snap => { 
            let h = ""; 
            snap.forEach(doc => { 
                h += `<div class="bg-white p-6 rounded-3xl border flex justify-between items-center shadow-xl font-black text-slate-700">🎥 ${doc.data().title} <button onclick="killDocument('videos','${doc.id}')" class="text-red-400 text-xs px-4 py-2 hover:bg-red-50 rounded-xl transition">刪除</button></div>`; 
            }); 
            document.getElementById('video-list-render').innerHTML = h; 
        });

        // --- 10. 通用刪除與時鐘 ---
        async function killDocument(coll, id) { 
            if (confirm("🚨 警告：此動作將從資料庫永久移除該數據，不可復原。確定要執行嗎？")) {
                await db.collection(coll).doc(id).delete();
            }
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time-box').innerText = now.toLocaleString('zh-TW', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }, 1000);
    </script>
</body>
</html>
