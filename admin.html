<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>廣寧宮後台 | 影音與宮務管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    <style>
        .admin-panel { display: none; }
        .admin-panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn.active { background-color: #1e293b; border-left: 4px solid #D4AF37; color: white; }
    </style>
</head>
<body class="bg-slate-100 flex min-h-screen">

    <aside class="w-64 bg-slate-900 text-slate-400 sticky top-0 h-screen shadow-2xl flex flex-col">
        <div class="p-8 text-center border-b border-slate-800"><h2 class="text-xl font-bold text-yellow-500">廣寧宮管理</h2></div>
        <nav class="mt-4 flex-1 space-y-1">
            <button onclick="showPanel('orders')" id="btn-orders" class="nav-btn w-full text-left px-8 py-4 active"><i class="fas fa-list mr-3"></i> 訂單管理</button>
            <button onclick="showPanel('photos')" id="btn-photos" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-camera mr-3"></i> 照片管理</button>
            <button onclick="showPanel('videos')" id="btn-videos" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-video mr-3"></i> 影音管理</button>
            <button onclick="showPanel('services')" id="btn-services" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-tags mr-3"></i> 祈福項目</button>
            <button onclick="showPanel('news')" id="btn-news" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-bullhorn mr-3"></i> 最新消息</button>
        </nav>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <h2 id="main-title" class="text-3xl font-black mb-8 text-slate-800 tracking-tighter">管理看板</h2>

        <section id="panel-photos" class="admin-panel">
            <div class="bg-white p-8 rounded-3xl shadow-sm border mb-8 max-w-xl">
                <input type="text" id="p-title" placeholder="活動標題" class="w-full border p-3 rounded-xl mb-4 outline-none">
                <input type="file" id="p-file" accept="image/*" class="mb-4 text-sm">
                <div id="p-prog-area" class="hidden w-full bg-slate-100 h-2 rounded-full mb-4"><div id="p-bar" class="bg-blue-600 h-2 rounded-full transition-all" style="width:0%"></div></div>
                <button onclick="savePhoto()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">確認發布照片</button>
            </div>
            <div id="admin-photo-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="panel-videos" class="admin-panel">
            <div class="bg-white p-8 rounded-3xl shadow-sm border mb-8 max-w-xl">
                <input type="text" id="v-title" placeholder="影片名稱" class="w-full border p-3 rounded-xl mb-3 outline-none">
                <input type="text" id="v-ytid" placeholder="YouTube ID (例如: dQw4w9WgXcQ)" class="w-full border p-3 rounded-xl mb-4 outline-none">
                <button onclick="saveVideo()" class="w-full bg-red-600 text-white py-4 rounded-xl font-bold">發布影音作品</button>
            </div>
            <div id="admin-video-list" class="space-y-3 max-w-2xl"></div>
        </section>

        <section id="panel-services" class="admin-panel">
            <div class="bg-white p-8 rounded-3xl shadow-sm border mb-8 max-w-xl">
                <input type="text" id="s-name" placeholder="項目名稱 (例：光明燈)" class="w-full border p-3 rounded-xl mb-3 outline-none">
                <input type="number" id="s-price" placeholder="價格" class="w-full border p-3 rounded-xl mb-4 outline-none">
                <button onclick="saveService()" class="w-full bg-yellow-600 text-white py-4 rounded-xl font-bold">新增項目至前台</button>
            </div>
            <div id="admin-service-list" class="space-y-2 max-w-xl"></div>
        </section>

        <section id="panel-news" class="admin-panel">
            <div class="bg-white p-8 rounded-3xl shadow-sm border mb-8 max-w-xl">
                <input type="text" id="n-title" placeholder="消息標題" class="w-full border p-3 rounded-xl mb-3 outline-none">
                <textarea id="n-content" placeholder="內容..." class="w-full border p-3 rounded-xl h-32 mb-4 outline-none"></textarea>
                <button onclick="saveNews()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">發布公告</button>
            </div>
            <div id="admin-news-list" class="space-y-3 max-w-2xl"></div>
        </section>

        <section id="panel-orders" class="admin-panel active">
            <div class="bg-white rounded-3xl border overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b font-bold text-slate-400">
                        <tr><th class="p-6">類別</th><th class="p-6">信眾</th><th class="p-6">項目</th><th class="p-6 text-right">金額</th><th class="p-6 text-right">操作</th></tr>
                    </thead>
                    <tbody id="order-list" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70",
            authDomain: "testproject-fb870.firebaseapp.com",
            projectId: "testproject-fb870",
            storageBucket: "testproject-fb870.firebasestorage.app",
            messagingSenderId: "164908049871",
            appId: "1:164908049871:web:21e77c3bb591de85685eba"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        function showPanel(id) {
            document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            localStorage.setItem('guangningActive', id);
        }
        window.onload = () => { showPanel(localStorage.getItem('guangningActive') || 'orders'); };

        // 通用刪除
        async function deleteDoc(col, id) { if(confirm("確定刪除嗎？")) await db.collection(col).doc(id).delete(); }

        // 1. 照片上傳
        async function savePhoto() {
            const file = document.getElementById('p-file').files[0];
            const title = document.getElementById('p-title').value;
            if(!file || !title) return alert("請填寫標題並選擇檔案");
            const bar = document.getElementById('p-bar');
            document.getElementById('p-prog-area').classList.remove('hidden');
            const ref = storage.ref(`gallery/${Date.now()}_${file.name}`);
            const task = ref.put(file);
            task.on('state_changed', s => bar.style.width = (s.bytesTransferred/s.totalBytes)*100+'%', null, async () => {
                const url = await task.snapshot.ref.getDownloadURL();
                await db.collection("photos").add({ title, url, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                alert("已成功存入雲端"); location.reload();
            });
        }
        db.collection("photos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { html += `<div class="bg-white p-2 border rounded-xl relative"><img src="${doc.data().url}" class="h-24 w-full object-cover rounded"><button onclick="deleteDoc('photos','${doc.id}')" class="absolute top-1 right-1 bg-red-500 text-white w-5 h-5 rounded-full text-xs">×</button></div>`; });
            document.getElementById('admin-photo-grid').innerHTML = html;
        });

        // 2. 影音管理
        async function saveVideo() {
            const title = document.getElementById('v-title').value;
            const ytid = document.getElementById('v-ytid').value;
            if(!title || !ytid) return alert("請填寫影音資訊");
            await db.collection("videos").add({ title, ytid, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert("影片已發布");
        }
        db.collection("videos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { html += `<div class="p-4 bg-white border rounded-xl flex justify-between"><span>🎥 ${doc.data().title}</span><button onclick="deleteDoc('videos','${doc.id}')" class="text-red-500 text-xs">刪除</button></div>`; });
            document.getElementById('admin-video-list').innerHTML = html;
        });

        // 3. 祈福項目
        async function saveService() {
            const name = document.getElementById('s-name').value;
            const price = document.getElementById('s-price').value;
            if(!name || !price) return alert("請填寫完整資訊");
            await db.collection("services").add({ name, price: parseInt(price), createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert("項目已更新");
        }
        db.collection("services").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { html += `<div class="p-4 bg-white border rounded-xl flex justify-between"><span><b>${doc.data().name}</b> - $${doc.data().price}</span><button onclick="deleteDoc('services','${doc.id}')" class="text-red-500 text-xs">刪除</button></div>`; });
            document.getElementById('admin-service-list').innerHTML = html;
        });

        // 4. 最新消息
        async function saveNews() {
            const title = document.getElementById('n-title').value;
            const content = document.getElementById('n-content').value;
            await db.collection("news").add({ title, content, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert("公告已發布");
        }
        db.collection("news").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { html += `<div class="p-4 bg-white border rounded-xl flex justify-between"><span>📢 ${doc.data().title}</span><button onclick="deleteDoc('news','${doc.id}')" class="text-red-500 text-xs">刪除</button></div>`; });
            document.getElementById('admin-news-list').innerHTML = html;
        });

        // 5. 訂單核帳
        db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => {
                const o = doc.data();
                html += `<tr><td class="p-6 font-bold ${o.category==='捐獻'?'text-red-600':'text-blue-600'}">${o.category}</td><td class="p-6 font-bold">${o.name}<br><small>${o.phone}</small></td><td class="p-6">${o.item}</td><td class="p-6 text-right font-black">$${o.amount||'-'}</td><td class="p-6 text-right"><button onclick="deleteDoc('orders','${doc.id}')" class="text-slate-300">刪除</button></td></tr>`;
            });
            document.getElementById('order-list').innerHTML = html;
        });
    </script>
</body>
</html>
