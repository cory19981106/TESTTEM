<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>廣寧宮後台 | 財務與宮務管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .admin-panel { display: none; } .admin-panel.active { display: block; animation: fadeInUp 0.3s ease; }
        .nav-btn.active { @apply bg-slate-800 border-l-4 border-yellow-500 text-white font-bold; }
        .edit-mode { @apply border-4 border-orange-400 bg-orange-50; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex min-h-screen bg-slate-100">

    <aside class="w-64 bg-slate-900 text-slate-400 h-screen sticky top-0 flex flex-col z-50">
        <div class="p-8 text-center border-b border-slate-800"><h2 class="text-xl font-bold text-yellow-500 uppercase">廣寧宮管理</h2></div>
        <nav class="mt-4 flex-1 overflow-y-auto">
            <button onclick="showPanel('orders')" id="btn-orders" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-file-invoice-dollar mr-3"></i> 訂單核帳報表</button>
            <button onclick="showPanel('news')" id="btn-news" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-bullhorn mr-3"></i> 公告管理</button>
            <button onclick="showPanel('videos')" id="btn-videos" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-play mr-3"></i> 影音管理</button>
            <button onclick="showPanel('photos')" id="btn-photos" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-camera mr-3"></i> 照片管理</button>
            <button onclick="showPanel('services')" id="btn-services" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-tags mr-3"></i> 祈福項目</button>
        </nav>
        <button onclick="firebase.auth().signOut()" class="p-8 border-t border-slate-800 text-xs">登出系統</button>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <h2 id="main-title" class="text-3xl font-black mb-8 text-slate-800">管理看板</h2>

        <section id="panel-orders" class="admin-panel">
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm mb-6 grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div><label class="text-xs font-bold text-slate-400">搜尋姓名/電話</label><input type="text" id="o-search" oninput="renderOrders()" class="w-full border p-2 rounded-xl" placeholder="關鍵字..."></div>
                <div><label class="text-xs font-bold text-slate-400">年份</label><select id="o-year" onchange="renderOrders()" class="w-full border p-2 rounded-xl"><option value="all">所有年份</option><option value="2026" selected>2026</option><option value="2025">2025</option></select></div>
                <div><label class="text-xs font-bold text-slate-400">類別</label><select id="o-cat" onchange="renderOrders()" class="w-full border p-2 rounded-xl"><option value="all">所有類別</option><option value="點燈">點燈</option><option value="捐獻">香油錢</option></select></div>
                <button onclick="exportExcel()" class="bg-green-600 text-white py-2 rounded-xl font-bold"><i class="fas fa-download mr-2"></i>輸出報表</button>
            </div>
            <div class="bg-white rounded-3xl border overflow-hidden"><table class="w-full text-left text-sm"><thead class="bg-slate-50 font-bold"><tr><th class="p-6">類別</th><th class="p-6">信眾</th><th class="p-6">項目</th><th class="p-6 text-right">金額</th><th class="p-6">查帳</th><th class="p-6 text-right">操作</th></tr></thead><tbody id="order-rows" class="divide-y"></tbody></table></div>
        </section>

        <section id="panel-news" class="admin-panel">
            <div id="n-form" class="bg-white p-8 rounded-[2rem] border mb-8 max-w-xl">
                <input type="hidden" id="n-id"><input type="text" id="n-title" placeholder="公告標題" class="w-full border p-3 rounded-xl mb-4"><textarea id="n-content" placeholder="內容..." class="w-full border p-3 rounded-xl h-32 mb-4"></textarea>
                <div class="flex gap-2"><button onclick="saveNews()" id="n-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">確認發布</button><button onclick="clearNewsForm()" id="n-cancel" class="hidden px-6 bg-slate-200 py-3 rounded-xl">取消</button></div>
            </div>
            <div id="admin-news-list" class="space-y-4 max-w-2xl"></div>
        </section>

        <section id="panel-videos" class="admin-panel">
            <div id="v-form" class="bg-white p-8 rounded-[2rem] border mb-8 max-w-xl">
                <input type="hidden" id="v-id"><input type="text" id="v-title" placeholder="影片名稱" class="w-full border p-3 rounded-xl mb-4"><input type="text" id="v-ytid" placeholder="YouTube ID" class="w-full border p-3 rounded-xl mb-4">
                <div class="flex gap-2"><button onclick="saveVideo()" id="v-vbtn" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">確認發布</button><button onclick="clearVideoForm()" id="v-vcancel" class="hidden px-6 bg-slate-200 py-3 rounded-xl">取消</button></div>
            </div>
            <div id="admin-video-list" class="space-y-3 max-w-2xl"></div>
        </section>
        
        </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const storage = firebase.storage();
        let orders = [];

        firebase.auth().onAuthStateChanged(user => { if(!user) window.location.href="login.html"; else showPanel(localStorage.getItem('tab')||'orders'); });
        function showPanel(id){ document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('active')); document.getElementById('panel-'+id).classList.add('active'); localStorage.setItem('tab', id); }

        // --- 財務與訂單 ---
        db.collection("orders").orderBy("createdAt","desc").onSnapshot(snap => { orders = snap.docs.map(d=>({id:d.id, ...d.data()})); renderOrders(); });
        function renderOrders(){
            const s = document.getElementById('o-search').value.toLowerCase();
            const y = document.getElementById('o-year').value;
            const c = document.getElementById('o-cat').value;
            let filtered = orders.filter(o => (o.name.includes(s) || o.phone.includes(s)) && (y==='all' || o.year===y) && (c==='all' || o.category===c));
            let html = ""; filtered.forEach(o => {
                const checked = o.status === "已查帳";
                html += `<tr class="hover:bg-slate-50 transition"><td class="p-6 font-bold ${o.category==='捐獻'?'text-red-600':'text-blue-600'}">${o.category}</td><td class="p-6"><b>${o.name}</b><br><small>${o.phone}</small></td><td class="p-6">${o.item}</td><td class="p-6 text-right font-black">$${o.amount}</td><td class="p-6"><button onclick="toggleStatus('${o.id}','${o.status}')" class="px-4 py-1 rounded-full text-xs font-bold ${checked?'bg-green-100 text-green-600':'bg-yellow-100 text-yellow-600'}">${o.status||'待查帳'}</button></td><td class="p-6 text-right"><button onclick="deleteDoc('orders','${o.id}')" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button></td></tr>`;
            });
            document.getElementById('order-rows').innerHTML = html;
        }
        async function toggleStatus(id, s){ await db.collection("orders").doc(id).update({status: s==='已查帳'?'待查帳':'已查帳'}); }
        function exportExcel(){
            const ws = XLSX.utils.json_to_sheet(orders.map(o=>({"類別":o.category,"姓名":o.name,"電話":o.phone,"項目":o.item,"金額":o.amount,"狀態":o.status})));
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "報表");
            XLSX.writeFile(wb, `廣寧宮報表_${new Date().toLocaleDateString()}.xlsx`);
        }

        // --- 公告管理 (含編輯與正確刪除) ---
        async function saveNews(){
            const id = document.getElementById('n-id').value; const title = document.getElementById('n-title').value; const content = document.getElementById('n-content').value;
            const data = { title, content, updatedAt: new Date() };
            if(id) await db.collection("news").doc(id).update(data);
            else await db.collection("news").add({...data, createdAt: new Date()});
            clearNewsForm();
        }
        function editNews(id, t, c){ document.getElementById('n-id').value=id; document.getElementById('n-title').value=t; document.getElementById('n-content').value=c; document.getElementById('n-form').classList.add('edit-mode'); document.getElementById('n-cancel').classList.remove('hidden'); }
        function clearNewsForm(){ document.getElementById('n-id').value=""; document.getElementById('n-title').value=""; document.getElementById('n-content').value=""; document.getElementById('n-form').classList.remove('edit-mode'); document.getElementById('n-cancel').classList.add('hidden'); }
        db.collection("news").orderBy("createdAt","desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { const n = doc.data(); const id = doc.id; html += `<div class="bg-white p-4 rounded-xl border flex justify-between"><span>📢 <b>${n.title}</b></span><div class="flex gap-4"><button onclick="editNews('${id}','${n.title}',\`${n.content}\`)" class="text-blue-500 text-xs">編輯</button><button onclick="deleteDoc('news','${id}')" class="text-red-400 text-xs">刪除</button></div></div>`; });
            document.getElementById('admin-news-list').innerHTML = html;
        });

        // --- 影音管理 ---
        async function saveVideo(){
            const id = document.getElementById('v-id').value; const title = document.getElementById('v-title').value; const ytid = document.getElementById('v-ytid').value;
            if(id) await db.collection("videos").doc(id).update({title, ytid});
            else await db.collection("videos").add({title, ytid, createdAt: new Date()});
            clearVideoForm();
        }
        db.collection("videos").orderBy("createdAt","desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { const v = doc.data(); html += `<div class="bg-white p-4 rounded-xl border flex justify-between"><span>🎥 <b>${v.title}</b></span><button onclick="deleteDoc('videos','${doc.id}')" class="text-red-400 text-xs">刪除</button></div>`; });
            document.getElementById('admin-video-list').innerHTML = html;
        });

        async function deleteDoc(c, id){ if(confirm("確定刪除？")) await db.collection(c).doc(id).delete(); }
    </script>
</body>
</html>
