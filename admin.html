<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>廣寧宮管理後台 | ZJ影像專業維護</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    <style>
        .admin-panel { display: none; }
        .admin-panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn.active { background-color: #1e293b; border-left: 4px solid #D4AF37; color: white; font-weight: bold; }
        .edit-mode { background-color: #fff7ed; border: 2px solid #fb923c !important; }
    </style>
</head>
<body class="bg-slate-100 flex min-h-screen font-sans">

    <aside class="w-64 bg-slate-900 text-slate-400 h-screen sticky top-0 shadow-2xl flex flex-col z-50">
        <div class="p-8 text-center border-b border-slate-800">
            <h2 class="text-xl font-bold text-yellow-500 tracking-tighter">廣寧宮管理</h2>
            <p class="text-[10px] text-slate-500 mt-1 uppercase">ZJ AD FILM SYSTEM</p>
        </div>
        <nav class="mt-6 flex-1 space-y-1">
            <button onclick="showPanel('orders')" id="btn-orders" class="nav-btn w-full text-left px-8 py-4 flex items-center hover:bg-slate-800 transition"><i class="fas fa-list-check mr-3"></i> 訂單核帳</button>
            <button onclick="showPanel('news')" id="btn-news" class="nav-btn w-full text-left px-8 py-4 flex items-center hover:bg-slate-800 transition"><i class="fas fa-bullhorn mr-3"></i> 最新消息</button>
            <button onclick="showPanel('photos')" id="btn-photos" class="nav-btn w-full text-left px-8 py-4 flex items-center hover:bg-slate-800 transition"><i class="fas fa-camera mr-3"></i> 照片管理</button>
            <button onclick="showPanel('videos')" id="btn-videos" class="nav-btn w-full text-left px-8 py-4 flex items-center hover:bg-slate-800 transition"><i class="fas fa-video mr-3"></i> 影音紀錄</button>
            <button onclick="showPanel('services')" id="btn-services" class="nav-btn w-full text-left px-8 py-4 flex items-center hover:bg-slate-800 transition"><i class="fas fa-tags mr-3"></i> 項目設定</button>
        </nav>
        <button onclick="handleLogout()" class="p-8 text-xs text-slate-500 hover:text-white border-t border-slate-800">登出管理系統</button>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <h2 id="main-title" class="text-3xl font-black mb-8 text-slate-800">管理面板</h2>

        <section id="panel-news" class="admin-panel">
            <div id="news-form-container" class="bg-white p-8 rounded-[2.5rem] shadow-sm border mb-8 max-w-2xl">
                <input type="hidden" id="n-id">
                <div class="space-y-4">
                    <input type="text" id="n-title" placeholder="公告標題" class="w-full border p-3 rounded-xl outline-none">
                    <textarea id="n-content" placeholder="詳細內容..." class="w-full border p-3 rounded-xl h-32 outline-none"></textarea>
                    <div class="flex gap-2">
                        <button onclick="saveNews()" id="n-save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">確認發布</button>
                        <button onclick="clearNewsForm()" id="n-cancel-btn" class="hidden px-6 bg-slate-200 text-slate-600 py-3 rounded-xl font-bold">取消</button>
                    </div>
                </div>
            </div>
            <div id="admin-news-list" class="space-y-4 max-w-3xl"></div>
        </section>

        <section id="panel-photos" class="admin-panel">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border mb-8 max-w-xl">
                <input type="text" id="p-title" placeholder="活動照片描述" class="w-full border p-3 rounded-xl mb-4 outline-none">
                <div class="border-2 border-dashed border-slate-200 p-8 rounded-2xl text-center mb-4">
                    <input type="file" id="p-file" accept="image/*" class="hidden">
                    <label for="p-file" class="cursor-pointer text-blue-600 font-bold hover:underline">選取照片檔案</label>
                    <p id="p-filename" class="text-xs text-slate-400 mt-2">尚未選擇</p>
                </div>
                <div id="p-prog-container" class="hidden w-full bg-slate-100 h-2 rounded-full mb-4 overflow-hidden"><div id="p-bar" class="bg-blue-600 h-full transition-all" style="width:0%"></div></div>
                <button onclick="uploadPhoto()" id="p-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">開始上傳</button>
            </div>
            <div id="admin-photo-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="panel-orders" class="admin-panel">
            <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b text-slate-400 font-bold uppercase">
                        <tr><th class="p-6">類別</th><th class="p-6">信眾資訊</th><th class="p-6">細節</th><th class="p-6 text-right">金額</th><th class="p-6">狀態</th><th class="p-6 text-right">操作</th></tr>
                    </thead>
                    <tbody id="admin-orders-list" class="divide-y"></tbody>
                </table>
            </div>
        </section>

        </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70",
            authDomain: "testproject-fb870.firebaseapp.com",
            projectId: "testproject-fb870",
            storageBucket: "testproject-fb870.firebasestorage.app",
            messagingSenderId: "164908049871",
            appId: "1:164908049871:web:21e77c3bb591de85685eba"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        const auth = firebase.auth();

        // 身分驗證鎖
        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = "login.html";
            else { const tab = localStorage.getItem('activeTab') || 'orders'; showPanel(tab); }
        });

        function handleLogout() { auth.signOut(); }

        function showPanel(id) {
            document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            localStorage.setItem('activeTab', id);
        }

        // 核心同步邏輯 (以消息與照片為例)
        async function saveNews() {
            const id = document.getElementById('n-id').value;
            const title = document.getElementById('n-title').value;
            const content = document.getElementById('n-content').value;
            if(!title || !content) return;
            const data = { title, content, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
            if(id) await db.collection("news").doc(id).update(data);
            else { data.createdAt = firebase.firestore.FieldValue.serverTimestamp(); await db.collection("news").add(data); }
            clearNewsForm();
        }

        db.collection("news").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => {
                const n = doc.data();
                html += `<div class="bg-white p-6 rounded-3xl border flex justify-between items-center shadow-sm">
                    <div><h4 class="font-bold">${n.title}</h4><p class="text-xs text-slate-400">${n.content.substring(0,30)}...</p></div>
                    <div class="flex gap-4"><button onclick="editNews('${doc.id}','${n.title}', \`${n.content}\` )" class="text-blue-500 font-bold text-xs">編輯</button>
                    <button onclick="deleteDoc('news','${doc.id}')" class="text-red-400 font-bold text-xs">刪除</button></div>
                </div>`;
            });
            document.getElementById('admin-news-list').innerHTML = html;
        });

        // 照片管理
        document.getElementById('p-file').onchange = e => { document.getElementById('p-filename').innerText = e.target.files[0]?.name; };
        async function uploadPhoto() {
            const file = document.getElementById('p-file').files[0];
            const title = document.getElementById('p-title').value;
            if(!file || !title) return;
            const bar = document.getElementById('p-bar');
            document.getElementById('p-prog-container').classList.remove('hidden');
            const path = `gallery/${Date.now()}_${file.name}`;
            const task = storage.ref(path).put(file);
            task.on('state_changed', s => bar.style.width = (s.bytesTransferred/s.totalBytes)*100+'%', null, async () => {
                const url = await task.snapshot.ref.getDownloadURL();
                await db.collection("photos").add({ title, url, storagePath: path, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                location.reload();
            });
        }

        async function deleteDoc(col, id) { if(confirm("確定刪除？")) await db.collection(col).doc(id).delete(); }
    </script>
</body>
</html>
