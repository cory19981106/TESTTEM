<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>廣寧宮後台 | 全功能維護系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .admin-panel { display: none; } .admin-panel.active { display: block; }
        .nav-btn.active { @apply bg-slate-800 border-l-4 border-yellow-500 text-white font-bold; }
        .edit-mode { @apply ring-4 ring-orange-500 bg-orange-50; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-slate-900 text-slate-400 h-screen sticky top-0 flex flex-col z-50">
        <div class="p-8 text-center border-b border-slate-800"><h2 class="text-xl font-bold text-yellow-500 uppercase">廣寧宮管理</h2></div>
        <nav class="mt-4 flex-1 space-y-1 overflow-y-auto">
            <button onclick="showPanel('orders')" id="btn-orders" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-file-invoice-dollar mr-3"></i> 財務核帳報表</button>
            <button onclick="showPanel('news')" id="btn-news" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-bullhorn mr-3"></i> 最新消息編輯</button>
            <button onclick="showPanel('products')" id="btn-products" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-box-open mr-3"></i> 文創商品管理</button>
            <button onclick="showPanel('services')" id="btn-services" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-tags mr-3"></i> 祈福項目設定</button>
            <button onclick="showPanel('videos')" id="btn-videos" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-play mr-3"></i> 影音作品管理</button>
            <button onclick="showPanel('photos')" id="btn-photos" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-camera mr-3"></i> 照片花絮管理</button>
        </nav>
        <button onclick="firebase.auth().signOut()" class="p-6 border-t border-slate-800 text-xs">登出系統</button>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <h2 id="main-title" class="text-3xl font-black mb-8 text-slate-800 italic uppercase">管理看板</h2>

        <section id="panel-orders" class="admin-panel">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border mb-6 grid grid-cols-1 md:grid-cols-6 gap-4 items-end">
                <div class="md:col-span-1"><label class="text-xs font-bold text-slate-400 block mb-1">姓名/電話搜尋</label><input type="text" id="o-search" class="w-full border p-2 rounded-xl text-sm outline-none" placeholder="關鍵字..."></div>
                <div class="md:col-span-1"><label class="text-xs font-bold text-slate-400 block mb-1">起始日期</label><input type="date" id="o-start" class="w-full border p-2 rounded-xl text-sm"></div>
                <div class="md:col-span-1"><label class="text-xs font-bold text-slate-400 block mb-1">結束日期</label><input type="date" id="o-end" class="w-full border p-2 rounded-xl text-sm"></div>
                <button onclick="renderOrders()" class="bg-blue-600 text-white py-2 rounded-xl font-bold shadow-lg text-sm hover:bg-blue-700 transition"><i class="fas fa-search mr-2"></i>搜尋篩選</button>
                <button onclick="exportExcel()" class="bg-green-600 text-white py-2 rounded-xl font-bold shadow-lg text-sm hover:bg-green-700 transition"><i class="fas fa-download mr-2"></i>匯出 Excel</button>
            </div>
            <div class="bg-white rounded-3xl border overflow-hidden shadow-sm"><table class="w-full text-left text-sm"><thead class="bg-slate-50 font-bold text-slate-400 uppercase"><tr><th class="p-6">日期</th><th class="p-6">類別</th><th class="p-6">信眾資訊/生辰</th><th class="p-6">項目</th><th class="p-6 text-right">金額</th><th class="p-6 text-center">狀態</th><th class="p-6 text-right">操作</th></tr></thead><tbody id="order-rows" class="divide-y"></tbody></table></div>
        </section>

        <section id="panel-news" class="admin-panel">
            <div id="n-form-box" class="bg-white p-8 rounded-[2.5rem] border mb-8 max-w-xl transition-all shadow-sm">
                <input type="hidden" id="n-id"><h3 id="n-label" class="font-bold text-slate-400 mb-4 text-xs uppercase tracking-widest">發布最新公告</h3>
                <input type="text" id="n-title" placeholder="公告標題" class="w-full border p-3 rounded-xl mb-4 outline-none"><textarea id="n-content" placeholder="內容..." class="w-full border p-3 rounded-xl h-48 mb-4 outline-none"></textarea>
                <div class="flex gap-2"><button onclick="saveNews()" id="n-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg transition">確認存檔</button><button onclick="clearNewsForm()" id="n-cancel" class="hidden px-6 bg-slate-200 py-3 rounded-xl font-bold">取消編輯</button></div>
            </div>
            <div id="admin-news-list" class="space-y-3 max-w-3xl"></div>
        </section>

        <section id="panel-photos" class="admin-panel">
            <div class="bg-white p-8 rounded-[2.5rem] border mb-8 max-w-xl shadow-sm">
                <input type="text" id="p-title" placeholder="照片描述" class="w-full border p-3 rounded-xl mb-4"><input type="file" id="p-file" class="mb-4 text-xs">
                <div id="p-prog" class="hidden w-full bg-slate-100 h-2 rounded-full mb-4 overflow-hidden"><div id="p-bar" class="bg-blue-600 h-full w-0 transition-all duration-300"></div></div>
                <button onclick="uploadPhoto()" id="p-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold shadow-xl transition">開始上傳</button>
            </div>
            <div id="admin-photo-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="panel-services" class="admin-panel">
            <div id="s-form-box" class="bg-white p-8 rounded-[2.5rem] border mb-8 max-w-md shadow-sm">
                <input type="hidden" id="s-id"><input type="text" id="s-name" placeholder="項目名稱" class="w-full border p-3 rounded-xl mb-4 outline-none"><input type="number" id="s-price" placeholder="價格" class="w-full border p-3 rounded-xl mb-4 outline-none">
                <div class="flex gap-2"><button onclick="saveService()" id="s-btn" class="flex-1 bg-yellow-600 text-white py-3 rounded-xl font-bold shadow-lg transition">儲存項目</button><button onclick="clearServForm()" id="s-cancel" class="hidden px-6 bg-slate-200 py-3 rounded-xl font-bold">取消</button></div>
            </div>
            <div id="admin-serv-list" class="space-y-2 max-w-xl"></div>
        </section>

        <section id="panel-videos" class="admin-panel">
            <div id="v-form-box" class="bg-white p-8 rounded-[2.5rem] border mb-8 max-w-xl shadow-sm">
                <input type="hidden" id="v-id"><input type="text" id="v-title" placeholder="影片標題" class="w-full border p-3 rounded-xl mb-4 outline-none"><input type="text" id="v-ytid" placeholder="YouTube ID (如: dQw4w9WgXcQ)" class="w-full border p-3 rounded-xl mb-6 outline-none">
                <div class="flex gap-2"><button onclick="saveVideo()" id="v-btn" class="flex-1 bg-red-600 text-white py-4 rounded-xl font-bold shadow-lg transition">確認儲存</button><button onclick="clearVideoForm()" id="v-cancel" class="hidden px-6 bg-slate-200 py-4 rounded-xl font-bold">取消</button></div>
            </div>
            <div id="admin-video-list" class="space-y-4 max-w-2xl"></div>
        </section>

        <section id="panel-products" class="admin-panel">
            <div id="prod-form-box" class="bg-white p-8 rounded-[2.5rem] border mb-8 max-w-xl shadow-sm transition-all">
                <input type="hidden" id="prod-id"><input type="text" id="prod-name" placeholder="商品名稱" class="w-full border p-3 rounded-xl mb-4 outline-none"><input type="number" id="prod-price" placeholder="價格" class="w-full border p-3 rounded-xl mb-4 outline-none"><input type="file" id="prod-file" class="mb-4 text-xs">
                <div class="flex gap-2"><button onclick="saveProduct()" id="prod-btn" class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold shadow-lg transition">確認存檔</button><button onclick="clearProdForm()" id="prod-cancel" class="hidden px-6 bg-slate-100 py-3 rounded-xl font-bold">取消</button></div>
            </div>
            <div id="admin-prod-list" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const storage = firebase.storage();
        let orders = [];

        firebase.auth().onAuthStateChanged(u => { if(!u) window.location.href="login.html"; else showPanel(localStorage.getItem('tab_id')||'orders'); });

        function showPanel(id){
            document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('panel-'+id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
            localStorage.setItem('tab_id', id);
            const titles = {'orders':'財務核帳報表','news':'最新消息管理','products':'文創商品管理','services':'祈福項目設定','videos':'影音作品管理','photos':'照片管理'};
            document.getElementById('main-title').innerText = titles[id];
        }

        // --- 1. 財務邏輯 (顯示生辰 & Excel 整合) ---
        db.collection("orders").orderBy("createdAt","desc").onSnapshot(snap => { orders = snap.docs.map(d=>({id:d.id, ...d.data()})); renderOrders(); });
        function renderOrders(){
            const s = document.getElementById('o-search').value.toLowerCase();
            const start = document.getElementById('o-start').value;
            const end = document.getElementById('o-end').value;
            let filtered = orders.filter(o => {
                const ms = (o.name||"").includes(s) || (o.phone||"").includes(s);
                let md = true;
                if(start && o.createdAt) md = o.createdAt.toDate() >= new Date(start);
                if(end && o.createdAt) { let e = new Date(end); e.setHours(23,59,59); md = md && o.createdAt.toDate() <= e; }
                return ms && md;
            });
            let html = ""; filtered.forEach(o => {
                const c = o.status==='已查帳';
                const birth = o.birthday ? `<br><small class="text-blue-600 font-bold">生辰：${o.birthday} (${o.birthHour})</small>` : "";
                html += `<tr class="hover:bg-slate-50 transition"><td class="p-6 text-slate-400 font-mono text-xs">${o.createdAt?o.createdAt.toDate().toLocaleDateString():'-'}</td><td class="p-6 font-bold ${o.category==='捐獻'?'text-red-600':'text-blue-600'}">${o.category}</td><td class="p-6"><b>${o.name}</b><br><small>${o.phone}</small>${birth}</td><td class="p-6 text-slate-500">${o.item}</td><td class="p-6 text-right font-black text-lg">$${o.amount}</td><td class="p-6 text-center"><button onclick="toggleCheck('${o.id}','${o.status}')" class="px-4 py-1 rounded-full text-[10px] font-bold ${c?'bg-green-100 text-green-600 border-green-200':'bg-yellow-100 text-yellow-600 border border-yellow-200'}">${o.status||'待查帳'}</button></td><td class="p-6 text-right"><button onclick="deleteDoc('orders','${o.id}')" class="text-slate-200 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button></td></tr>`;
            });
            document.getElementById('order-rows').innerHTML = html || '<tr><td colspan="7" class="p-10 text-center text-slate-400">尚無符合條件的資料</td></tr>';
        }
        async function toggleCheck(id,s){ await db.collection("orders").doc(id).update({status: s==='已查帳'?'待查帳':'已查帳'}); }
        function exportExcel(){
            const data = orders.map(o=>({"日期":o.createdAt?o.createdAt.toDate().toLocaleString():"-","類別":o.category,"姓名":o.name,"電話":o.phone,"生日":o.birthday||"無","時辰":o.birthHour||"無","項目":o.item,"金額":o.amount,"狀態":o.status}));
            const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "報表");
            XLSX.writeFile(wb, `廣寧宮財務_${new Date().toLocaleDateString()}.xlsx`);
        }

        // --- 2. 最新消息 CRUD (含編輯) ---
        async function saveNews(){
            const id = document.getElementById('n-id').value; const t = document.getElementById('n-title').value; const c = document.getElementById('n-content').value;
            if(!t || !c) return alert("內容不可為空");
            if(id) await db.collection("news").doc(id).update({title:t, content:c, updatedAt: new Date()});
            else await db.collection("news").add({title:t, content:c, createdAt: new Date()});
            clearNewsForm();
        }
        function editNews(id,t,c){
            document.getElementById('n-id').value=id; document.getElementById('n-title').value=t; document.getElementById('n-content').value=c;
            document.getElementById('n-form-box').classList.add('edit-mode'); document.getElementById('n-label').innerText="⚠️ 正在編輯公告"; document.getElementById('n-cancel').classList.remove('hidden'); window.scrollTo({top:0, behavior:'smooth'});
        }
        function clearNewsForm(){
            document.getElementById('n-id').value=""; document.getElementById('n-title').value=""; document.getElementById('n-content').value="";
            document.getElementById('n-form-box').classList.remove('edit-mode'); document.getElementById('n-label').innerText="發布最新公告"; document.getElementById('n-cancel').classList.add('hidden');
        }
        db.collection("news").orderBy("createdAt","desc").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => { const n = doc.data(); const safeC = n.content.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n'); h += `<div class="bg-white p-5 border rounded-2xl flex justify-between shadow-sm items-center"><span>📢 <b>${n.title}</b></span><div class="flex gap-4"><button onclick="editNews('${doc.id}','${n.title}', \`${safeC}\` )" class="text-blue-500 font-bold text-xs uppercase">編輯</button><button onclick="deleteDoc('news','${doc.id}')" class="text-red-400 font-bold text-xs uppercase">刪除</button></div></div>`; });
            document.getElementById('admin-news-list').innerHTML = h;
        });

        // --- 3. 祈福項目 CRUD (含編輯) ---
        async function saveService(){
            const id = document.getElementById('s-id').value; const n = document.getElementById('s-name').value; const p = parseInt(document.getElementById('s-price').value);
            if(!n || !p) return alert("資料不全");
            if(id) await db.collection("services").doc(id).update({name:n, price:p});
            else await db.collection("services").add({name:n, price:p, createdAt: new Date()});
            clearServForm();
        }
        function editServ(id, n, p){
            document.getElementById('s-id').value=id; document.getElementById('s-name').value=n; document.getElementById('s-price').value=p;
            document.getElementById('s-form-box').classList.add('edit-mode'); document.getElementById('s-cancel').classList.remove('hidden'); window.scrollTo({top:0, behavior:'smooth'});
        }
        function clearServForm(){
            document.getElementById('s-id').value=""; document.getElementById('s-name').value=""; document.getElementById('s-price').value="";
            document.getElementById('s-form-box').classList.remove('edit-mode'); document.getElementById('s-cancel').classList.add('hidden');
        }
        db.collection("services").orderBy("createdAt","desc").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => { const s = doc.data(); h += `<div class="bg-white p-4 border rounded-xl flex justify-between shadow-sm items-center"><span>🏮 <b>${s.name}</b> ($${s.price})</span><div class="flex gap-4"><button onclick="editServ('${doc.id}','${s.name}',${s.price})" class="text-blue-500 font-bold text-xs">編輯</button><button onclick="deleteDoc('services','${doc.id}')" class="text-red-400 font-bold text-xs">刪除</button></div></div>`; });
            document.getElementById('admin-serv-list').innerHTML = h;
        });

        // --- 4. 影音管理 CRUD (含編輯) ---
        async function saveVideo(){
            const id = document.getElementById('v-id').value; const t = document.getElementById('v-title').value; const ytid = document.getElementById('v-ytid').value;
            if(!t || !ytid) return alert("資訊不完整");
            if(id) await db.collection("videos").doc(id).update({title:t, ytid});
            else await db.collection("videos").add({title:t, ytid, createdAt: new Date()});
            clearVideoForm();
        }
        function editVideo(id, t, y){
            document.getElementById('v-id').value=id; document.getElementById('v-title').value=t; document.getElementById('v-ytid').value=y;
            document.getElementById('v-form-box').classList.add('edit-mode'); document.getElementById('v-cancel').classList.remove('hidden'); window.scrollTo({top:0, behavior:'smooth'});
        }
        function clearVideoForm(){
            document.getElementById('v-id').value=""; document.getElementById('v-title').value=""; document.getElementById('v-ytid').value="";
            document.getElementById('v-form-box').classList.remove('edit-mode'); document.getElementById('v-cancel').classList.add('hidden');
        }
        db.collection("videos").orderBy("createdAt","desc").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => { const v = doc.data(); h += `<div class="bg-white p-4 border rounded-xl flex justify-between items-center shadow-sm"><div><b>🎥 ${v.title}</b><br><small class="text-slate-400">ID: ${v.ytid}</small></div><div class="flex gap-4"><button onclick="editVideo('${doc.id}','${v.title}','${v.ytid}')" class="text-blue-500 font-bold text-xs">編輯</button><button onclick="deleteDoc('videos','${doc.id}')" class="text-red-400 font-bold text-xs">刪除</button></div></div>`; });
            document.getElementById('admin-video-list').innerHTML = h;
        });

        // --- 5. 文創商品 CRUD (含編輯) ---
        async function saveProduct(){
            const id = document.getElementById('prod-id').value; const f = document.getElementById('prod-file').files[0];
            let url="", path=""; 
            if(f){ path=`products/${Date.now()}_${f.name}`; const r = storage.ref(path); await r.put(f); url=await r.getDownloadURL(); }
            const data = { name: document.getElementById('prod-name').value, price: parseInt(document.getElementById('prod-price').value), updatedAt: new Date() };
            if(url){ data.url=url; data.path=path; }
            if(id) await db.collection("products").doc(id).update(data); else await db.collection("products").add({...data, createdAt: new Date()});
            clearProdForm(); location.reload();
        }
        function editProd(id, n, p){
            document.getElementById('prod-id').value=id; document.getElementById('prod-name').value=n; document.getElementById('prod-price').value=p;
            document.getElementById('prod-form-box').classList.add('edit-mode'); document.getElementById('prod-cancel').classList.remove('hidden'); window.scrollTo({top:0, behavior:'smooth'});
        }
        function clearProdForm(){
            document.getElementById('prod-id').value=""; document.getElementById('prod-name').value=""; document.getElementById('prod-price').value="";
            document.getElementById('prod-form-box').classList.remove('edit-mode'); document.getElementById('prod-cancel').classList.add('hidden');
        }
        db.collection("products").orderBy("createdAt","desc").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => { const p = doc.data(); h += `<div class="bg-white p-4 rounded-3xl border shadow-sm text-center"><img src="${p.url}" class="h-32 w-full object-cover rounded-2xl mb-2"><b>${p.name}</b><div class="flex gap-2 mt-2"><button onclick="editProd('${doc.id}','${p.name}',${p.price})" class="text-blue-500 font-bold text-xs">編輯</button><button onclick="deleteDocWithFile('products','${doc.id}','${p.path}')" class="text-red-400 font-bold text-xs">刪除</button></div></div>`; });
            document.getElementById('admin-prod-list').innerHTML = h;
        });

        // --- 6. 照片管理 ---
        async function uploadPhoto(){
            const f = document.getElementById('p-file').files[0]; const t = document.getElementById('p-title').value;
            if(!f || !t) return alert("請選照片並輸入描述"); document.getElementById('p-prog').classList.remove('hidden');
            const path = `gallery/${Date.now()}_${f.name}`; const r = storage.ref(path); const task = r.put(f);
            task.on('state_changed', s => { let p = (s.bytesTransferred / s.totalBytes) * 100; document.getElementById('p-bar').style.width = p + '%'; }, null, async () => {
                const url = await task.snapshot.ref.getDownloadURL();
                await db.collection("photos").add({title:t, url, path, createdAt: new Date()});
                alert("上傳成功"); location.reload();
            });
        }
        db.collection("photos").orderBy("createdAt","desc").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => { const ph = doc.data(); h += `<div class="relative bg-white p-2 border rounded-2xl shadow-sm group"><img src="${ph.url}" class="h-32 w-full object-cover rounded-xl shadow-inner transition group-hover:opacity-75"><button onclick="deleteDocWithFile('photos','${doc.id}','${ph.path}')" class="absolute top-4 right-4 bg-red-600 text-white w-6 h-6 rounded-full text-xs shadow-xl transition opacity-0 group-hover:opacity-100">×</button></div>`; });
            document.getElementById('admin-photo-grid').innerHTML = h;
        });

        // --- 通用刪除邏輯 ---
        async function deleteDoc(c, id){ if(confirm("確定刪除此資料嗎？此動作無法復原。")) await db.collection(c).doc(id).delete(); }
        async function deleteDocWithFile(c, id, p){ if(confirm("將同步刪除雲端檔案，確定嗎？")) { if(p) try { await storage.ref(p).delete(); } catch(e) {} await db.collection(c).doc(id).delete(); } }
    </script>
</body>
</html>
