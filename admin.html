<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>廣寧宮後台 | 全方位宮務管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .admin-panel { display: none; } .admin-panel.active { display: block; }
        .nav-btn.active { @apply bg-[#1e293b] border-l-4 border-yellow-500 text-white font-bold; }
        .edit-mode { border: 4px solid #f97316 !important; background-color: #fff7ed; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-slate-900 text-slate-400 h-screen sticky top-0 flex flex-col z-50">
        <div class="p-8 text-center border-b border-slate-800"><h2 class="text-xl font-bold text-yellow-500">廣寧宮管理</h2></div>
        <nav class="mt-4 flex-1 overflow-y-auto space-y-1">
            <button onclick="showPanel('orders')" id="btn-orders" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-file-invoice mr-3"></i> 財務核帳報表</button>
            <button onclick="showPanel('products')" id="btn-products" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-store mr-3"></i> 文創商品管理</button>
            <button onclick="showPanel('services')" id="btn-services" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-tags mr-3"></i> 祈福項目設定</button>
            <button onclick="showPanel('news')" id="btn-news" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-bullhorn mr-3"></i> 最新消息</button>
            <button onclick="showPanel('photos')" id="btn-photos" class="nav-btn w-full text-left px-8 py-4"><i class="fas fa-camera mr-3"></i> 照片管理</button>
        </nav>
        <button onclick="firebase.auth().signOut()" class="p-8 border-t border-slate-800 text-xs">登出系統</button>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <h2 id="main-title" class="text-3xl font-black mb-8 text-slate-800">管理系統</h2>

        <section id="panel-orders" class="admin-panel active"></section>

        <section id="panel-products" class="admin-panel">
            <div id="product-form" class="bg-white p-8 rounded-[2rem] border mb-8 max-w-xl transition-all">
                <input type="hidden" id="prod-id">
                <input type="text" id="prod-name" placeholder="商品名稱" class="w-full border p-3 rounded-xl mb-4">
                <input type="number" id="prod-price" placeholder="價格" class="w-full border p-3 rounded-xl mb-4">
                <input type="file" id="prod-file" class="mb-4 text-xs">
                <div class="flex gap-2">
                    <button onclick="saveProduct()" id="prod-btn" class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold">確認發布</button>
                    <button onclick="clearProductForm()" id="prod-cancel" class="hidden px-6 bg-slate-200 rounded-xl font-bold">取消</button>
                </div>
            </div>
            <div id="admin-product-list" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="panel-services" class="admin-panel"></section>

    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const storage = firebase.storage();

        firebase.auth().onAuthStateChanged(user => { if(!user) window.location.href="login.html"; else showPanel(localStorage.getItem('tab')||'orders'); });

        function showPanel(id){ document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('active')); document.getElementById('panel-'+id).classList.add('active'); localStorage.setItem('tab', id); }

        // --- 文創商品 CRUD ---
        async function saveProduct() {
            const id = document.getElementById('prod-id').value;
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            const file = document.getElementById('prod-file').files[0];
            
            let url = ""; let path = "";
            if(file) {
                path = `products/${Date.now()}_${file.name}`;
                const ref = storage.ref(path);
                await ref.put(file);
                url = await ref.getDownloadURL();
            }

            const data = { name, price: parseInt(price), updatedAt: new Date() };
            if(url) { data.url = url; data.path = path; }

            if(id) await db.collection("products").doc(id).update(data);
            else await db.collection("products").add({...data, createdAt: new Date()});
            
            alert("成功"); location.reload();
        }

        db.collection("products").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => {
                const p = doc.data();
                html += `<div class="bg-white p-4 rounded-3xl border shadow-sm">
                    <img src="${p.url}" class="w-full h-32 object-cover rounded-2xl mb-4">
                    <b class="text-sm">${p.name}</b>
                    <div class="flex gap-2 mt-2">
                        <button onclick="editProduct('${doc.id}', '${p.name}', ${p.price})" class="text-blue-500 text-xs font-bold">編輯</button>
                        <button onclick="deleteDocWithFile('products', '${doc.id}', '${p.path}')" class="text-red-500 text-xs font-bold">刪除</button>
                    </div>
                </div>`;
            });
            document.getElementById('admin-product-list').innerHTML = html;
        });

        function editProduct(id, n, p) {
            document.getElementById('prod-id').value = id;
            document.getElementById('prod-name').value = n;
            document.getElementById('prod-price').value = p;
            document.getElementById('product-form').classList.add('edit-mode');
            document.getElementById('prod-cancel').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        async function deleteDocWithFile(col, id, path) { if(confirm("確定刪除？實體檔案也會消失。")) { if(path) try { await storage.ref(path).delete(); } catch(e) {} await db.collection(col).doc(id).delete(); } }
    </script>
</body>
</html>
