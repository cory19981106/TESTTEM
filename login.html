<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>廣寧宮管理系統 | 登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center">
        <div class="w-16 h-16 bg-[#8B0000] rounded-full flex items-center justify-center text-white font-black mx-auto mb-6 text-2xl shadow-lg">廣</div>
        <h2 class="text-2xl font-black text-slate-800 mb-8">管理身分驗證</h2>
        <input type="email" id="email" placeholder="帳號 (Email)" class="w-full border-2 border-slate-100 p-4 rounded-2xl mb-4 outline-none focus:border-blue-500 transition">
        <input type="password" id="password" placeholder="密碼" class="w-full border-2 border-slate-100 p-4 rounded-2xl mb-6 outline-none focus:border-blue-500 transition">
        <button onclick="handleLogin()" id="login-btn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl">進入系統</button>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        async function handleLogin() {
            const e = document.getElementById('email').value; const p = document.getElementById('password').value;
            const btn = document.getElementById('login-btn'); btn.disabled = true;
            try { await firebase.auth().signInWithEmailAndPassword(e, p); window.location.href = "admin.html"; } 
            catch (err) { alert("登入失敗"); btn.disabled = false; }
        }
    </script>
</body>
</html>
