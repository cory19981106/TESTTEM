<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員林廣寧宮 | 三山國王官方網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { 't-red': '#8B0000', 't-gold': '#D4AF37', 't-blue': '#0A2540' }, fontFamily: { 'serif': ['"Noto Serif TC"', 'serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'serif'; background-color: #FDFCF5; scroll-behavior: smooth; }
        .page-section { display: none; min-height: 80vh; }
        .page-section.active { display: block; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 公告彈窗樣式 */
        #news-modal { display: none; }
        #news-modal.active { display: flex; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity: 0; scale: 0.95; } to { opacity: 1; scale: 1; } }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white/95 sticky top-0 z-50 border-b border-t-gold/20 shadow-sm p-4 font-bold">
        <div class="container mx-auto flex justify-between items-center px-6">
            <div onclick="showPage('home')" class="flex items-center space-x-3 cursor-pointer">
                <div class="w-10 h-10 bg-t-red rounded-full flex items-center justify-center text-white font-black shadow-lg">廣</div>
                <h1 class="text-xl font-black text-t-blue tracking-tighter uppercase">員林廣寧宮</h1>
            </div>
            <ul class="hidden lg:flex space-x-6 text-sm">
                <li><a onclick="showPage('about')" class="cursor-pointer hover:text-t-gold">關於本宮</a></li>
                <li><a onclick="showPage('gallery')" class="cursor-pointer hover:text-t-gold">活動花絮</a></li>
                <li><a onclick="showPage('video')" class="cursor-pointer hover:text-t-gold">影音專區</a></li>
                <li><button onclick="showPage('bless')" class="bg-t-gold text-white px-5 py-2 rounded-full shadow-md">祈福報名</button></li>
                <li><button onclick="showPage('donate')" class="bg-t-red text-white px-5 py-2 rounded-full shadow-md">香油捐獻</button></li>
                <li><a onclick="showPage('contact')" class="cursor-pointer hover:text-t-gold">聯絡我們</a></li>
            </ul>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        
        <section id="home" class="page-section active">
            <div class="rounded-[3rem] overflow-hidden h-[50vh] bg-slate-900 relative shadow-2xl mb-12">
                <div class="absolute inset-0 bg-black/40 z-10 flex flex-col justify-center items-center text-white text-center p-6">
                    <h2 class="text-5xl md:text-6xl font-black mb-4 tracking-widest font-serif">三百年香火 · 守護員林</h2>
                    <p class="text-lg italic opacity-80">乾隆四年創立 · 員林中正路三山國王祖廟</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <div class="lg:col-span-1">
                    <h3 class="text-xl font-black text-t-blue mb-6 border-l-4 border-t-red pl-4 flex justify-between items-center">
                        最新公告 <i class="fas fa-bullhorn text-t-red text-sm"></i>
                    </h3>
                    <div id="home-news-list" class="space-y-3">
                        <div class="text-slate-400 animate-pulse text-sm">載入消息中...</div>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <h3 class="text-xl font-black text-t-blue mb-6 border-l-4 border-t-gold pl-4 flex justify-between items-center">
                        祈福項目 <i class="fas fa-tags text-t-gold text-sm"></i>
                    </h3>
                    <div id="display-services" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>
        </section>

        <section id="about" class="page-section max-w-4xl mx-auto py-10">
            <div class="flex justify-center space-x-4 mb-10">
                <button onclick="switchAbout('history')" id="tab-history" class="px-6 py-2 rounded-full bg-t-gold text-white font-bold">歷史沿革</button>
                <button onclick="switchAbout('deity')" id="tab-deity" class="px-6 py-2 rounded-full bg-white text-t-gold border border-t-gold font-bold">奉祀神祇</button>
            </div>
            <div id="about-history" class="about-box active bg-white p-10 rounded-[2.5rem] shadow-xl text-slate-700 leading-loose">
                <h2 class="text-2xl font-black mb-4 text-t-blue">三百年歷史 · 員林王爺宮</h2>
                <p>廣寧宮建於乾隆四年，見證員林從荒蕪到繁華...</p>
            </div>
            <div id="about-deity" class="about-box hidden grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-lg border-t-4 border-t-red"><b>主祀：三山國王</b><p class="text-sm mt-2 text-slate-500">保境安民、靈感無比。</p></div>
                <div class="bg-white p-6 rounded-3xl shadow-lg border-t-4 border-t-gold"><b>文昌帝君</b><p class="text-sm mt-2 text-slate-500">庇佑學子金榜題名。</p></div>
            </div>
        </section>

        <section id="gallery" class="page-section max-w-6xl mx-auto"><div id="display-photos" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></section>
        <section id="video" class="page-section max-w-6xl mx-auto"><div id="display-videos" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div></section>
        <section id="bless" class="page-section max-w-2xl mx-auto"></section>
        <section id="donate" class="page-section max-w-2xl mx-auto"></section>
        
        <section id="contact" class="page-section max-w-4xl mx-auto py-10">
            <div class="bg-white p-10 rounded-[3.5rem] shadow-2xl grid md:grid-cols-2 gap-10">
                <div>
                    <h3 class="text-xl font-black mb-6 border-b pb-2 text-t-red">宮廟資訊</h3>
                    <p class="mb-3"><i class="fas fa-map-marker-alt mr-3 text-t-gold"></i> 彰化縣員林市中正路360號</p>
                    <p class="mb-3"><i class="fas fa-phone mr-3 text-t-gold"></i> 04-8320436</p>
                </div>
                <div class="text-center">
                    <h3 class="text-xl font-black mb-6 text-t-blue">社群連動</h3>
                    <div class="flex justify-center space-x-6 text-4xl mb-4">
                        <a href="#" class="text-green-500"><i class="fab fa-line"></i></a>
                        <a href="#" class="text-blue-600"><i class="fab fa-facebook"></i></a>
                        <a href="#" class="text-pink-500"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="news-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] p-6 hidden items-center justify-center">
        <div class="bg-white rounded-[3rem] w-full max-w-lg p-10 shadow-2xl relative">
            <button onclick="closeNewsModal()" class="absolute top-6 right-6 text-slate-300 hover:text-t-red text-2xl">
                <i class="fas fa-times-circle"></i>
            </button>
            <div id="modal-content-area" class="text-left">
                <span class="text-t-red font-black text-xs uppercase tracking-widest border border-t-red px-3 py-1 rounded-full mb-4 inline-block">最新公告</span>
                <h2 id="modal-title" class="text-2xl font-black text-t-blue mb-6 mt-4">標題載入中</h2>
                <div id="modal-text" class="text-slate-600 leading-loose whitespace-pre-wrap max-h-[50vh] overflow-y-auto pr-4">內容載入中...</div>
                <button onclick="closeNewsModal()" class="w-full mt-10 bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg">確認並返回首頁</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // 切換關於本宮分頁
        function switchAbout(type) {
            document.querySelectorAll('.about-box').forEach(b => b.classList.add('hidden'));
            document.getElementById('about-' + type).classList.remove('hidden');
            // ... [按鈕變色邏輯與先前版本一致] ...
        }

        // --- 公告彈窗邏輯 ---
        function openNewsModal(title, content) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = content;
            document.getElementById('news-modal').classList.add('active');
            document.getElementById('news-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // 防止底層捲動
        }

        function closeNewsModal() {
            document.getElementById('news-modal').classList.add('hidden');
            document.getElementById('news-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // 即時監聽：公告標題 (顯示在首頁)
        db.collection("news").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const n = doc.data();
                // 這裡將標題與內容作為參數傳入點擊事件
                html += `
                    <div onclick="openNewsModal('${n.title}', \`${n.content}\` )" 
                         class="bg-white p-4 rounded-2xl border-l-4 border-t-red shadow-sm cursor-pointer hover:bg-red-50 transition flex justify-between items-center group">
                        <span class="font-bold text-slate-700 truncate mr-4">${n.title}</span>
                        <i class="fas fa-arrow-right text-[10px] text-slate-300 group-hover:text-t-red transition"></i>
                    </div>`;
            });
            document.getElementById('home-news-list').innerHTML = html || '<p class="text-slate-400 text-xs text-center py-4">目前尚無公告消息</p>';
        });

        // 其餘即時監聽 (照片、影音、祈福項目)
        db.collection("services").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { const s = doc.data(); html += `<div class="bg-white p-5 rounded-2xl border-t-4 border-t-gold flex justify-between items-center shadow-sm"><b>${s.name}</b> <span class="text-t-red font-black">$${s.price}</span></div>`; });
            document.getElementById('display-services').innerHTML = html;
        });

        db.collection("photos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { html += `<div class="rounded-3xl overflow-hidden shadow-lg border-4 border-white aspect-square"><img src="${doc.data().url}" class="w-full h-full object-cover"></div>`; });
            document.getElementById('display-photos').innerHTML = html;
        });

        db.collection("videos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { const v = doc.data(); html += `<div><div class="aspect-video bg-black rounded-2xl overflow-hidden mb-4"><iframe class="w-full h-full" src="https://www.youtube.com/embed/${v.ytid}"></iframe></div><b>${v.title}</b></div>`; });
            document.getElementById('display-videos').innerHTML = html;
        });
    </script>
</body>
</html>
