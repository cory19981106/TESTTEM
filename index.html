<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員林廣寧宮 | 官方網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFCF5; scroll-behavior: smooth; }
        .page-section { display: none; min-height: 80vh; }
        .page-section.active { display: block; animation: fadeInUp 0.8s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #news-modal.active { display: flex; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white/95 sticky top-0 z-50 border-b p-4 shadow-sm font-bold flex justify-between px-10">
        <div onclick="showPage('home')" class="cursor-pointer text-xl text-[#0A2540]">員林廣寧宮</div>
        <div class="space-x-6 text-sm">
            <a onclick="showPage('about')" class="cursor-pointer">關於本宮</a>
            <a onclick="showPage('gallery')" class="cursor-pointer">活動花絮</a>
            <a onclick="showPage('video')" class="cursor-pointer">影音專區</a>
            <button onclick="showPage('bless')" class="bg-[#D4AF37] text-white px-4 py-1 rounded-full">祈福點燈</button>
            <button onclick="showPage('donate')" class="bg-[#8B0000] text-white px-4 py-1 rounded-full">捐獻油香</button>
            <a onclick="showPage('contact')" class="cursor-pointer">聯絡我們</a>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <section id="home" class="page-section active">
            <div class="h-[50vh] bg-slate-900 rounded-[3rem] mb-12 flex items-center justify-center text-white text-4xl font-black shadow-2xl">三百年香火 · 守護員林</div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                <div class="md:col-span-1 bg-white p-6 rounded-3xl shadow-lg border-t-8 border-[#8B0000]">
                    <h3 class="font-black mb-4 flex justify-between">最新公告 <i class="fas fa-bullhorn text-red-600"></i></h3>
                    <div id="home-news-list" class="space-y-3"></div>
                </div>
                <div class="md:col-span-2">
                    <h3 class="font-black mb-4 border-l-4 border-[#D4AF37] pl-3">開放祈福項目</h3>
                    <div id="display-services" class="grid grid-cols-2 gap-4"></div>
                </div>
            </div>
        </section>

        <section id="about" class="page-section max-w-4xl mx-auto py-10">
            <div class="flex justify-center space-x-4 mb-10">
                <button onclick="switchAbout('h')" class="px-6 py-2 rounded-full bg-[#D4AF37] text-white font-bold shadow">歷史沿革</button>
                <button onclick="switchAbout('d')" class="px-6 py-2 rounded-full bg-white text-[#D4AF37] border border-[#D4AF37] font-bold">奉祀神祇</button>
            </div>
            <div id="a-h" class="bg-white p-10 rounded-[3rem] shadow-xl leading-loose">廣寧宮創立於乾隆四年... (文字寫死在此)</div>
            <div id="a-d" class="hidden grid grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-lg text-center"><b>三山國王</b><p class="text-xs text-slate-500 mt-2">保境安民、靈感無比</p></div>
            </div>
        </section>

        <section id="contact" class="page-section max-w-2xl mx-auto py-10 text-center">
            <div class="bg-white p-10 rounded-[3rem] shadow-xl">
                <h2 class="text-2xl font-black mb-6">聯絡資訊</h2>
                <p class="mb-4"><i class="fas fa-map-marker-alt mr-2 text-red-600"></i> 彰化縣員林市中正路360號</p>
                <div class="flex justify-center space-x-6 text-3xl mt-8">
                    <a href="#" class="text-green-500"><i class="fab fa-line"></i></a>
                    <a href="#" class="text-blue-600"><i class="fab fa-facebook"></i></a>
                    <a href="#" class="text-pink-500"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </section>

        </main>

    <div id="news-modal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-300 text-2xl">×</button>
            <h2 id="m-t" class="text-2xl font-black mb-4">標題</h2>
            <div id="m-c" class="text-slate-600 leading-relaxed whitespace-pre-wrap">內容</div>
            <button onclick="closeModal()" class="w-full mt-8 bg-slate-900 text-white py-3 rounded-xl font-bold">關閉視窗</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showPage(id){ document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
        function switchAbout(t){ document.getElementById('a-h').classList.toggle('hidden', t==='d'); document.getElementById('a-d').classList.toggle('hidden', t==='h'); }
        function closeModal(){ document.getElementById('news-modal').classList.add('hidden'); document.getElementById('news-modal').classList.remove('active'); }
        
        // 即時監聽消息並觸發彈窗
        db.collection("news").orderBy("createdAt","desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { const n = doc.data(); html += `<div onclick="openModal('${n.title}', \`${n.content}\` )" class="p-3 bg-slate-50 border rounded-xl cursor-pointer hover:bg-red-50 font-bold text-sm truncate">${n.title}</div>`; });
            document.getElementById('home-news-list').innerHTML = html;
        });
        function openModal(t, c){ document.getElementById('m-t').innerText=t; document.getElementById('m-c').innerText=c; document.getElementById('news-modal').classList.remove('hidden'); document.getElementById('news-modal').classList.add('active'); }

        // 即時監聽祈福項目
        db.collection("services").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { const s = doc.data(); html += `<div class="bg-white p-4 rounded-2xl border-t-4 border-[#D4AF37] shadow-sm flex justify-between"><b>${s.name}</b> <span class="text-red-600 font-black">$${s.price}</span></div>`; });
            document.getElementById('display-services').innerHTML = html;
        });
    </script>
</body>
</html>
