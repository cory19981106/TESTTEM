<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員林廣寧宮 | 三山國王官方網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { 't-red': '#8B0000', 't-gold': '#D4AF37', 't-blue': '#0A2540', 't-bg': '#FDFCF5' }, fontFamily: { 'serif': ['"Noto Serif TC"', 'serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'serif'; background-color: #FDFCF5; scroll-behavior: smooth; }
        .page-section { display: none; min-height: 80vh; }
        .page-section.active { display: block; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #payment-modal { display: none; }
        #payment-modal.active { display: flex; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white/95 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b border-t-gold/20 font-bold">
        <div class="container mx-auto flex justify-between items-center px-6 py-4">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="showPage('home')">
                <div class="w-10 h-10 bg-t-red rounded-full flex items-center justify-center text-white font-black shadow-lg">廣</div>
                <h1 class="text-xl font-black text-t-blue tracking-tighter">員林廣寧宮</h1>
            </div>
            <ul class="hidden lg:flex items-center space-x-6 text-sm">
                <li><a onclick="showPage('news')" class="cursor-pointer hover:text-t-gold">最新消息</a></li>
                <li><a onclick="showPage('gallery')" class="cursor-pointer hover:text-t-gold">活動照片</a></li>
                <li><a onclick="showPage('video')" class="cursor-pointer hover:text-t-red">影音專區</a></li>
                <li><button onclick="showPage('bless')" class="bg-t-gold text-white px-5 py-2 rounded-full shadow-md">祈福報名</button></li>
                <li><button onclick="showPage('donate')" class="bg-t-red text-white px-5 py-2 rounded-full shadow-md">香油錢捐獻</button></li>
            </ul>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <section id="home" class="page-section active">
            <div class="rounded-[2.5rem] overflow-hidden h-[55vh] bg-slate-900 relative shadow-2xl mb-12">
                <div class="absolute inset-0 bg-black/40 z-10 flex flex-col justify-center items-center text-white text-center p-6">
                    <h2 class="text-5xl font-black mb-4 tracking-widest">乾隆四年 · 員林王爺宮</h2>
                    <p class="text-xl italic opacity-90 italic">「香煙飄渺，心靈的永恆家園。」</p>
                </div>
                <div class="absolute inset-0 flex items-center justify-center text-gray-700 italic">【ZJ影像 專業視覺嵌入區】</div>
            </div>
            <h3 class="text-2xl font-black text-t-blue mb-8 border-l-4 border-t-gold pl-4">目前開放祈福項目</h3>
            <div id="service-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </section>

        <section id="news" class="page-section max-w-4xl mx-auto py-10">
            <h2 class="text-3xl font-black text-t-blue mb-8">最新公告</h2>
            <div id="news-list" class="space-y-6"></div>
        </section>

        <section id="gallery" class="page-section max-w-6xl mx-auto py-10">
            <h2 class="text-3xl font-black text-t-blue mb-8">活動花絮照片</h2>
            <div id="photo-wall" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="video" class="page-section max-w-6xl mx-auto py-10">
            <h2 class="text-3xl font-black text-t-blue mb-8 text-center">影音作品展示</h2>
            <div id="video-wall" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
        </section>

        <section id="bless" class="page-section max-w-2xl mx-auto py-10">
            <div class="bg-white p-12 rounded-[3rem] shadow-2xl border-t-8 border-t-gold">
                <h2 class="text-3xl font-black text-center text-t-gold mb-8">線上祈福登記</h2>
                <div class="space-y-4">
                    <input type="text" id="b_name" placeholder="姓名" class="w-full border p-4 rounded-xl outline-none">
                    <input type="tel" id="b_phone" placeholder="電話" class="w-full border p-4 rounded-xl outline-none">
                    <select id="service-select" class="w-full border p-4 rounded-xl font-bold"></select>
                    <button onclick="submitData('點燈')" class="w-full bg-t-gold text-white py-4 rounded-xl font-black">確認登記並前往付款</button>
                </div>
            </div>
        </section>

        <section id="donate" class="page-section max-w-2xl mx-auto py-10">
            <div class="bg-white p-12 rounded-[3rem] shadow-2xl border-t-8 border-t-red text-center">
                <h2 class="text-3xl font-black text-t-red mb-8">捐獻香油錢</h2>
                <div class="space-y-4 text-left">
                    <input type="number" id="d_amount" placeholder="金額 (TWD)" class="w-full border p-5 rounded-xl text-3xl font-black text-center outline-none">
                    <input type="text" id="d_name" placeholder="姓名" class="w-full border p-4 rounded-xl">
                    <input type="tel" id="d_phone" placeholder="電話" class="w-full border p-4 rounded-xl">
                    <button onclick="submitData('捐獻')" class="w-full bg-t-red text-white py-4 rounded-xl font-black">完成捐獻</button>
                </div>
            </div>
        </section>
    </main>

    <div id="payment-modal" class="fixed inset-0 bg-black/80 z-[60] items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full text-center">
            <h3 class="text-2xl font-black mb-6">登記成功</h3>
            <div class="bg-slate-50 p-6 rounded-2xl border mb-6 text-left">
                <p class="text-xs text-slate-400">銀行轉帳資訊</p>
                <p class="font-bold">員林市農會 (600)</p>
                <p class="text-xl font-black text-t-red tracking-widest underline">帳號：XXXX-XXXX-XXXX</p>
            </div>
            <button onclick="location.reload()" class="text-slate-400 underline">回到首頁</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70",
            authDomain: "testproject-fb870.firebaseapp.com",
            projectId: "testproject-fb870",
            storageBucket: "testproject-fb870.firebasestorage.app",
            messagingSenderId: "164908049871",
            appId: "1:164908049871:web:21e77c3bb591de85685eba"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0, 0);
        }

        // --- 同步邏輯 (即時監聽) ---
        db.collection("services").onSnapshot(snap => {
            let grid = ""; let opts = "";
            snap.forEach(doc => {
                const s = doc.data();
                grid += `<div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-t-gold"><b>${s.name}</b><br><span class="text-t-red font-black">$${s.price}</span></div>`;
                opts += `<option value="${s.name}">${s.name} ($${s.price})</option>`;
            });
            document.getElementById('service-grid').innerHTML = grid;
            document.getElementById('service-select').innerHTML = opts;
        });

        db.collection("photos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => { html += `<div class="rounded-3xl overflow-hidden shadow-lg border-4 border-white"><img src="${doc.data().url}" class="w-full h-64 object-cover"></div>`; });
            document.getElementById('photo-wall').innerHTML = html;
        });

        db.collection("videos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => { const v = doc.data(); html += `<div><div class="aspect-video bg-black rounded-2xl overflow-hidden mb-2"><iframe class="w-full h-full" src="https://www.youtube.com/embed/${v.ytid}"></iframe></div><b>${v.title}</b></div>`; });
            document.getElementById('video-wall').innerHTML = html;
        });

        db.collection("news").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => { const n = doc.data(); html += `<div class="bg-white p-6 rounded-2xl border-l-8 border-t-red shadow-sm"><h4 class="font-black text-xl mb-2">${n.title}</h4><p class="text-slate-600">${n.content}</p></div>`; });
            document.getElementById('news-list').innerHTML = html;
        });

        async function submitData(type) {
            let data = { category: type, status: "待核帳", year: "2026", createdAt: firebase.firestore.FieldValue.serverTimestamp() };
            if(type === '點燈') {
                data.name = document.getElementById('b_name').value;
                data.phone = document.getElementById('b_phone').value;
                data.item = document.getElementById('service-select').value;
            } else {
                data.name = document.getElementById('d_name').value;
                data.phone = document.getElementById('d_phone').value;
                data.amount = document.getElementById('d_amount').value;
                data.item = "油香捐款";
            }
            if(!data.name || !data.phone) return alert("請填寫姓名與電話");
            await db.collection("orders").add(data);
            document.getElementById('payment-modal').classList.add('active');
        }
    </script>
</body>
</html>
