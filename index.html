<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員林廣寧宮 | 三山國王官方網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 't-red': '#8B0000', 't-gold': '#D4AF37', 't-blue': '#0A2540' } } } }
    </script>
    <style>
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-[#FDFCF5] text-slate-800">

    <nav class="bg-white/95 sticky top-0 z-50 shadow-sm border-b border-t-gold/20 font-bold p-4">
        <div class="container mx-auto flex justify-between items-center px-6">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="showPage('home')">
                <div class="w-10 h-10 bg-t-red rounded-full flex items-center justify-center text-white font-black">廣</div>
                <h1 class="text-xl font-black text-t-blue tracking-tighter">員林廣寧宮</h1>
            </div>
            <ul class="hidden lg:flex space-x-6 text-sm">
                <li><a onclick="showPage('news')" class="cursor-pointer hover:text-t-gold">最新消息</a></li>
                <li><a onclick="showPage('gallery')" class="cursor-pointer hover:text-t-gold">活動照片</a></li>
                <li><a onclick="showPage('video')" class="cursor-pointer hover:text-t-red">影音專區</a></li>
                <li><button onclick="showPage('bless')" class="bg-t-gold text-white px-5 py-2 rounded-full">祈福報名</button></li>
                <li><button onclick="showPage('donate')" class="bg-t-red text-white px-5 py-2 rounded-full">捐獻油香</button></li>
            </ul>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <section id="home" class="page-section active">
            <h3 class="text-2xl font-black text-t-blue mb-8 border-l-4 border-t-gold pl-4 tracking-tighter italic">目前開放祈福項目</h3>
            <div id="service-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </section>

        <section id="gallery" class="page-section max-w-6xl mx-auto py-10">
            <h2 class="text-3xl font-black text-t-blue mb-10 text-center">活動花絮照片</h2>
            <div id="photo-wall" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="video" class="page-section max-w-6xl mx-auto py-10">
            <h2 class="text-3xl font-black text-t-blue mb-10 text-center">影音作品展示</h2>
            <div id="video-wall" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
        </section>

        <section id="news" class="page-section max-w-4xl mx-auto py-10">
            <h2 class="text-3xl font-black text-t-blue mb-10 text-center">最新消息公告</h2>
            <div id="news-list" class="space-y-6"></div>
        </section>
        
        </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70",
            authDomain: "testproject-fb870.firebaseapp.com",
            projectId: "testproject-fb870",
            storageBucket: "testproject-fb870.firebasestorage.app",
            messagingSenderId: "164908049871",
            appId: "1:164908049871:web:21e77c3bb591de85685eba"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0, 0);
        }

        // --- 全頻道即時監聽 ---
        
        // 1. 同步祈福項目
        db.collection("services").onSnapshot(snap => {
            let grid = ""; let opts = "";
            snap.forEach(doc => {
                const s = doc.data();
                grid += `<div class="bg-white p-8 rounded-3xl shadow-sm border-t-4 border-t-gold text-center">
                    <h4 class="font-bold text-xl mb-2">${s.name}</h4><p class="text-t-red font-black">$${s.price}</p>
                </div>`;
            });
            document.getElementById('service-grid').innerHTML = grid;
        });

        // 2. 同步照片牆
        db.collection("photos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                html += `<div class="rounded-3xl overflow-hidden shadow-lg border-4 border-white"><img src="${doc.data().url}" class="w-full h-64 object-cover"></div>`;
            });
            document.getElementById('photo-wall').innerHTML = html;
        });

        // 3. 同步影片
        db.collection("videos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const v = doc.data();
                html += `<div><div class="aspect-video bg-black rounded-2xl overflow-hidden mb-4"><iframe class="w-full h-full" src="https://www.youtube.com/embed/${v.ytid}"></iframe></div><b>${v.title}</b></div>`;
            });
            document.getElementById('video-wall').innerHTML = html;
        });

        // 4. 同步公告
        db.collection("news").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const n = doc.data();
                html += `<div class="bg-white p-8 rounded-3xl border-l-8 border-t-red shadow-sm"><h4 class="font-black text-xl mb-2">${n.title}</h4><p class="text-slate-600">${n.content}</p></div>`;
            });
            document.getElementById('news-list').innerHTML = html;
        });
    </script>
</body>
</html>
