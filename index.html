<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員林廣寧宮 | 三山國王官方網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'serif'; background-color: #FDFCF5; scroll-behavior: smooth; }
        .page-section { display: none; min-height: 85vh; }
        .page-section.active { display: block; animation: fadeIn 0.6s ease; }
        .dropdown:hover .dropdown-menu { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white/95 sticky top-0 z-50 border-b border-t-gold/20 shadow-sm p-4 font-bold flex flex-wrap justify-between px-6 md:px-12 items-center">
        <div onclick="showPage('home')" class="flex items-center space-x-2 cursor-pointer">
            <div class="w-10 h-10 bg-[#8B0000] rounded-full flex items-center justify-center text-white text-xl">廣</div>
            <span class="text-xl tracking-tighter text-[#0A2540]">員林廣寧宮</span>
        </div>

        <ul class="hidden lg:flex space-x-10 text-sm items-center">
            <li class="relative dropdown pb-1">
                <a class="cursor-pointer hover:text-[#D4AF37]">關於廣寧宮 <i class="fas fa-chevron-down text-[10px]"></i></a>
                <div class="dropdown-menu hidden absolute left-0 mt-2 w-48 bg-white shadow-2xl rounded-xl border p-2">
                    <a onclick="showPage('about','history')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">本宮歷史沿革</a>
                    <a onclick="showPage('about','kings')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">主祀三山國王</a>
                    <a onclick="showPage('about','deities')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">配祀神祉介紹</a>
                </div>
            </li>
            <li class="relative dropdown pb-1">
                <a class="cursor-pointer hover:text-[#D4AF37]">線上信眾服務 <i class="fas fa-chevron-down text-[10px]"></i></a>
                <div class="dropdown-menu hidden absolute left-0 mt-2 w-48 bg-white shadow-2xl rounded-xl border p-2">
                    <a onclick="showPage('service','bless')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">祈福點燈登記</a>
                    <a onclick="showPage('service','donate')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">香油錢捐獻</a>
                </div>
            </li>
            <li><a onclick="showPage('gallery')" class="cursor-pointer hover:text-[#D4AF37]">活動花絮</a></li>
            <li><a onclick="showPage('video')" class="cursor-pointer hover:text-[#D4AF37]">影音專區</a></li>
            <li><a onclick="showPage('contact')" class="cursor-pointer hover:text-[#D4AF37]">聯絡我們</a></li>
        </ul>
        <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="lg:hidden text-xl"><i class="fas fa-bars"></i></button>
        
        <div id="mobile-menu" class="hidden w-full lg:hidden bg-white mt-4 p-4 space-y-4 shadow-xl rounded-2xl">
            <a onclick="showPage('home')" class="block font-bold">首頁</a>
            <a onclick="showPage('about','history')" class="block font-bold">關於廣寧宮</a>
            <a onclick="showPage('service','bless')" class="block font-bold">祈福點燈</a>
            <a onclick="showPage('contact')" class="block font-bold">聯絡我們</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10">
        <section id="home" class="page-section active">
            <div class="h-[40vh] md:h-[50vh] bg-slate-900 rounded-[3rem] mb-12 flex items-center justify-center text-white text-center p-6 shadow-2xl relative overflow-hidden">
                <div class="z-10"><h2 class="text-4xl md:text-6xl font-black font-serif tracking-widest">三百年香火</h2><p class="mt-2 opacity-80 uppercase">乾隆四年創立 · 員林王爺宮</p></div>
                <div class="absolute inset-0 bg-black/40"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border-t-8 border-[#8B0000]">
                    <h3 class="font-black text-xl mb-6">最新消息 <i class="fas fa-bullhorn text-red-600"></i></h3>
                    <div id="home-news-list" class="space-y-3"></div>
                </div>
                <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6" id="home-services-display"></div>
            </div>
        </section>

        <section id="video" class="page-section max-w-6xl mx-auto py-10">
            <h2 class="text-4xl font-black text-center mb-16 font-serif">影音紀實</h2>
            <div id="display-videos" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
        </section>

        <section id="gallery" class="page-section max-w-7xl mx-auto py-10">
            <h2 class="text-4xl font-black text-center mb-16 font-serif">活動花絮照片</h2>
            <div id="display-photos" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="contact" class="page-section max-w-5xl mx-auto py-10">
            <div class="bg-white p-10 md:p-16 rounded-[4rem] shadow-2xl grid grid-cols-1 md:grid-cols-2 gap-12">
                <div>
                    <h3 class="text-2xl font-black mb-8 border-b pb-4 text-[#8B0000]">廣寧宮資訊</h3>
                    <div class="space-y-6 text-lg">
                        <p><i class="fas fa-map-marker-alt mr-4 text-[#D4AF37]"></i> 彰化縣員林市中正路360號</p>
                        <p><i class="fas fa-phone mr-4 text-[#D4AF37]"></i> 04-8320436</p>
                    </div>
                </div>
                <div class="text-center flex flex-col justify-center">
                    <h3 class="text-2xl font-black mb-10 text-[#0A2540]">社群追蹤</h3>
                    <div class="flex justify-center space-x-12 text-6xl">
                        <a href="#" class="text-green-500 hover:scale-110 transition"><i class="fab fa-line"></i></a>
                        <a href="#" class="text-blue-700 hover:scale-110 transition"><i class="fab fa-facebook"></i></a>
                        <a href="#" class="text-pink-500 hover:scale-110 transition"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
        </section>
        
        </main>

    <div id="bank-modal" class="fixed inset-0 bg-black/90 z-[200] hidden items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white rounded-[3rem] p-10 max-w-lg w-full text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-4">資料已送出</h2>
            <p class="text-slate-500 mb-8">感謝您的發心，請於匯款後告知本宮。</p>
            <div class="bg-slate-50 p-6 rounded-2xl text-left font-mono space-y-2 border-2 border-dashed border-slate-200">
                <p>銀行：員林市農會 (614)</p>
                <p>帳號：1234-5678-9012-3456</p>
                <p>戶名：員林廣寧宮</p>
            </div>
            <button onclick="document.getElementById('bank-modal').classList.add('hidden')" class="w-full mt-8 bg-[#0A2540] text-white py-4 rounded-xl font-bold">我已記下</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showPage(pageId, subId = null) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('page-' + pageId) || document.getElementById(pageId);
            target.classList.add('active');
            // ... 子分頁切換邏輯
            document.getElementById('mobile-menu').classList.add('hidden');
            window.scrollTo({top:0, behavior:'smooth'});
        }

        // 即時同步：照片、影音、消息、服務項目 (全頻道連動)
        db.collection("news").orderBy("createdAt","desc").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => { const n = doc.data(); h += `<div class="p-4 bg-slate-50 rounded-xl border-l-4 border-red-600 font-bold cursor-pointer hover:bg-red-50 truncate transition">${n.title}</div>`; });
            document.getElementById('home-news-list').innerHTML = h;
        });

        db.collection("services").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => { const s = doc.data(); h += `<div class="bg-white p-6 rounded-2xl border-t-4 border-yellow-500 shadow-md flex justify-between font-bold"><span>${s.name}</span><span class="text-red-600">$${s.price}</span></div>`; });
            document.getElementById('home-services-display').innerHTML = h;
        });

        db.collection("videos").orderBy("createdAt","desc").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => { const v = doc.data(); h += `<div class="bg-white p-4 rounded-3xl shadow-xl"><div class="aspect-video bg-black rounded-2xl overflow-hidden"><iframe class="w-full h-full" src="https://www.youtube.com/embed/${v.ytid}"></iframe></div><h4 class="mt-4 font-black text-lg text-t-blue">${v.title}</h4></div>`; });
            document.getElementById('display-videos').innerHTML = h;
        });

        db.collection("photos").orderBy("createdAt","desc").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => { h += `<div class="rounded-2xl overflow-hidden shadow-lg border-4 border-white aspect-square"><img src="${doc.data().url}" class="w-full h-full object-cover"></div>`; });
            document.getElementById('display-photos').innerHTML = h;
        });
    </script>
</body>
</html>
