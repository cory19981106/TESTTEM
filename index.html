<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員林廣寧宮 | 三山國王官方網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'serif'; background-color: #FDFCF5; scroll-behavior: smooth; }
        .page-section { display: none; min-height: 85vh; }
        .page-section.active { display: block; animation: fadeInUp 0.8s ease; }
        .dropdown:hover .dropdown-menu { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white/95 sticky top-0 z-50 border-b border-t-gold/20 shadow-sm p-4 font-bold flex justify-between px-6 md:px-12 items-center">
        <div onclick="showPage('home')" class="flex items-center space-x-2 cursor-pointer">
            <div class="w-10 h-10 bg-[#8B0000] rounded-full flex items-center justify-center text-white text-xl shadow-lg">廣</div>
            <h1 class="text-xl tracking-tighter text-[#0A2540] uppercase">員林廣寧宮</h1>
        </div>

        <ul class="hidden lg:flex space-x-10 text-sm items-center">
            <li class="relative dropdown">
                <a class="cursor-pointer hover:text-[#D4AF37] pb-4 block">關於廣寧宮 <i class="fas fa-chevron-down text-[10px]"></i></a>
                <div class="dropdown-menu hidden absolute left-0 mt-2 w-48 bg-white shadow-2xl rounded-xl border p-2">
                    <a onclick="showPage('about','history')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">本宮歷史沿革</a>
                    <a onclick="showPage('about','kings')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">主祀三山國王</a>
                    <a onclick="showPage('about','deities')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">本宮配祀神祉</a>
                </div>
            </li>
            <li class="relative dropdown">
                <a class="cursor-pointer hover:text-[#D4AF37] pb-4 block">線上信眾服務 <i class="fas fa-chevron-down text-[10px]"></i></a>
                <div class="dropdown-menu hidden absolute left-0 mt-2 w-48 bg-white shadow-2xl rounded-xl border p-2">
                    <a onclick="showPage('service','bless')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">祈福點燈登記</a>
                    <a onclick="showPage('service','donate')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">香油錢捐獻</a>
                </div>
            </li>
            <li><a onclick="showPage('products')" class="cursor-pointer hover:text-[#D4AF37]">文創商品</a></li>
            <li><a onclick="showPage('gallery')" class="cursor-pointer hover:text-[#D4AF37]">活動花絮</a></li>
            <li><a onclick="showPage('contact')" class="cursor-pointer hover:text-[#D4AF37]">聯絡我們</a></li>
        </ul>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <section id="home" class="page-section active">
            <div class="h-[55vh] bg-slate-900 rounded-[3rem] mb-12 flex items-center justify-center text-white text-center p-6 shadow-2xl relative overflow-hidden">
                <div class="z-10"><h2 class="text-5xl md:text-7xl font-black font-serif tracking-[0.2em] drop-shadow-2xl">三百年香火</h2><p class="text-xl mt-4 italic opacity-80 uppercase tracking-widest">乾隆四年創立 · 員林中正路三山國王祖廟</p></div>
                <div class="absolute inset-0 bg-black/40"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <div class="bg-white p-8 rounded-[3rem] shadow-xl border-t-8 border-[#8B0000]">
                    <h3 class="font-black text-2xl mb-6 flex justify-between items-center">最新消息 <i class="fas fa-bullhorn text-red-600"></i></h3>
                    <div id="home-news-list" class="space-y-4"></div>
                </div>
                <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-8" id="home-services-display"></div>
            </div>
        </section>

        <section id="page-about" class="page-section max-w-5xl mx-auto py-10">
            <div id="content-history" class="sub-content bg-white p-12 rounded-[3.5rem] shadow-xl leading-loose">
                <h2 class="text-4xl font-black mb-8 text-[#0A2540]">歷史沿革</h2>
                <p class="mb-6">廣寧宮創建於清乾隆四年（1739年），為員林最古老的廟宇...</p>
            </div>
            <div id="content-kings" class="sub-content hidden bg-white p-12 rounded-[3.5rem] shadow-xl text-center">
                <h2 class="text-3xl font-black mb-12">主祀：三山國王</h2>
                <div class="grid grid-cols-3 gap-8">
                    <div class="p-8 border-4 border-slate-50 rounded-[2.5rem] bg-slate-50 shadow-inner font-bold">巾山大國王</div>
                    <div class="p-8 border-4 border-slate-50 rounded-[2.5rem] bg-slate-50 shadow-inner font-bold">明山二國王</div>
                    <div class="p-8 border-4 border-slate-50 rounded-[2.5rem] bg-slate-50 shadow-inner font-bold">獨山三國王</div>
                </div>
            </div>
            <div id="content-deities" class="sub-content hidden grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="bg-white p-10 rounded-[3rem] shadow-xl border-t-8 border-yellow-500 text-center font-bold">文昌帝君</div>
                <div class="bg-white p-10 rounded-[3rem] shadow-xl border-t-8 border-blue-500 text-center font-bold">觀音佛祖</div>
                <div class="bg-white p-10 rounded-[3rem] shadow-xl border-t-8 border-pink-500 text-center font-bold">註生娘娘</div>
            </div>
        </section>

        <section id="page-products" class="page-section max-w-7xl mx-auto py-10">
            <h2 class="text-5xl font-black text-center mb-16 font-serif tracking-widest uppercase">文創商品展示</h2>
            <div id="display-products" class="grid grid-cols-1 md:grid-cols-4 gap-12"></div>
        </section>
        
        </main>

    <div id="news-modal" class="fixed inset-0 bg-black/80 z-[100] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white rounded-[4rem] p-12 max-w-md w-full relative shadow-2xl">
            <h2 id="m-title" class="text-3xl font-black mb-6 border-b pb-6"></h2>
            <div id="m-content" class="leading-loose text-slate-600 whitespace-pre-wrap max-h-[50vh] overflow-y-auto pr-4 font-serif"></div>
            <button onclick="closeModal()" class="w-full mt-10 bg-[#1e293b] text-white py-5 rounded-[2rem] font-black shadow-2xl tracking-widest">確認並關閉</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showPage(pageId, subId = null) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('page-' + pageId) || document.getElementById(pageId);
            target.classList.add('active');
            if(subId) {
                document.querySelectorAll('.sub-content').forEach(c => c.classList.add('hidden'));
                document.getElementById('content-' + subId).classList.remove('hidden');
            }
            window.scrollTo(0,0);
        }
        function closeModal() { document.getElementById('news-modal').classList.add('hidden'); }

        // --- 數據即時同步：文創商品 ---
        db.collection("products").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => {
                const p = doc.data();
                html += `<div class="bg-white p-6 rounded-[3rem] shadow-2xl border border-slate-50 hover:scale-105 transition duration-500">
                    <img src="${p.url}" class="w-full h-64 object-cover rounded-[2.5rem] mb-8 shadow-xl">
                    <h4 class="font-black text-2xl mb-3 text-[#0A2540]">${p.name}</h4>
                    <p class="text-red-600 font-black text-3xl">$${p.price}</p>
                </div>`;
            });
            document.getElementById('display-products').innerHTML = html || '<p class="col-span-4 text-center text-slate-400">目前尚無商品上架</p>';
        });

        // --- 公告彈窗邏輯 ---
        db.collection("news").orderBy("createdAt","desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { const n = doc.data(); html += `<div onclick="openModal('${n.title}', \`${n.content}\` )" class="p-5 bg-slate-50 border-l-[10px] border-red-600 rounded-2xl cursor-pointer hover:bg-red-50 font-black text-lg truncate transition-all shadow-sm">${n.title}</div>`; });
            document.getElementById('home-news-list').innerHTML = html;
        });
        function openModal(t,c) { document.getElementById('m-title').innerText=t; document.getElementById('m-content').innerText=c; document.getElementById('news-modal').classList.remove('hidden'); }

        // --- 其餘服務監聽與訂單提交略過，結構完全對齊前版 ---
    </script>
</body>
</html>
