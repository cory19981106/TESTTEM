<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員林廣寧宮 | 三山國王官方網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 't-red': '#8B0000', 't-gold': '#D4AF37', 't-blue': '#0A2540' }, fontFamily: { 'serif': ['"Noto Serif TC"', 'serif'] } } } }
    </script>
    <style>
        body { font-family: 'serif'; background-color: #FDFCF5; scroll-behavior: smooth; }
        .page-section { display: none; min-height: 85vh; }
        .page-section.active { display: block; animation: fadeInUp 0.8s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white/95 sticky top-0 z-50 border-b border-t-gold/20 shadow-sm p-4 font-bold">
        <div class="container mx-auto flex justify-between items-center px-6">
            <div onclick="showPage('home')" class="flex items-center space-x-3 cursor-pointer">
                <div class="w-10 h-10 bg-t-red rounded-full flex items-center justify-center text-white font-black shadow-lg text-xl">廣</div>
                <h1 class="text-xl font-black text-t-blue tracking-tighter">員林廣寧宮</h1>
            </div>
            <ul class="hidden lg:flex space-x-6 text-sm">
                <li><a onclick="showPage('news')" class="cursor-pointer hover:text-t-gold">最新公告</a></li>
                <li><a onclick="showPage('history')" class="cursor-pointer hover:text-t-gold">歷史沿革</a></li>
                <li><a onclick="showPage('deity')" class="cursor-pointer hover:text-t-gold">奉祀神祇</a></li>
                <li><a onclick="showPage('gallery')" class="cursor-pointer hover:text-t-gold">活動花絮</a></li>
                <li><a onclick="showPage('video')" class="cursor-pointer hover:text-t-gold">影音專區</a></li>
                <li><button onclick="showPage('bless')" class="bg-t-gold text-white px-5 py-2 rounded-full shadow-md ml-4">祈福報名</button></li>
            </ul>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <section id="home" class="page-section active">
            <div class="rounded-[3rem] overflow-hidden h-[55vh] bg-slate-900 relative shadow-2xl mb-16">
                <div class="absolute inset-0 bg-black/40 z-10 flex flex-col justify-center items-center text-white text-center p-6">
                    <p class="text-t-gold tracking-[0.4em] mb-4 text-sm font-bold uppercase">員林王爺宮</p>
                    <h2 class="text-5xl md:text-7xl font-black mb-6 tracking-widest font-serif drop-shadow-2xl">三百年香火 · 守護員林</h2>
                </div>
            </div>
            <h3 class="text-2xl font-black text-t-blue mb-8 border-l-4 border-t-gold pl-4 italic">開放祈福項目</h3>
            <div id="display-services" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </section>

        <section id="news" class="page-section max-w-4xl mx-auto py-10">
            <h2 class="text-4xl font-black text-t-blue mb-10 border-l-8 border-t-red pl-6 font-serif">最新消息公告</h2>
            <div id="display-news" class="space-y-6"></div>
        </section>

        <section id="video" class="page-section max-w-6xl mx-auto py-10 text-center">
            <h2 class="text-4xl font-black text-t-blue mb-10 font-serif">影音紀實</h2>
            <div id="display-videos" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
        </section>

        <section id="history" class="page-section max-w-4xl mx-auto py-10 leading-loose">
            <h2 class="text-4xl font-black text-t-blue mb-10 border-l-8 border-t-red pl-6 font-serif">歷史沿革</h2>
            <div class="bg-white p-10 rounded-[3rem] shadow-xl text-lg text-slate-700">員林廣寧宮創立於乾隆四年... (歷史內容填寫處)</div>
        </section>

        <section id="deity" class="page-section max-w-6xl mx-auto py-10 text-center">
             <h2 class="text-4xl font-black text-t-blue mb-16 font-serif">奉祀神祇</h2>
             <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                <div class="bg-white p-8 rounded-[3rem] shadow-xl border-t-8 border-t-red">
                    <h4 class="text-2xl font-black text-t-blue mb-4">主祀：三山國王</h4>
                    <p class="text-slate-500 text-sm">保境安民、守護員林百年的心靈原鄉。</p>
                </div>
             </div>
        </section>

        <section id="gallery" class="page-section max-w-6xl mx-auto py-10 text-center">
            <h2 class="text-4xl font-black text-t-blue mb-10 font-serif">活動花絮</h2>
            <div id="display-photos" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70",
            authDomain: "testproject-fb870.firebaseapp.com",
            projectId: "testproject-fb870",
            storageBucket: "testproject-fb870.firebasestorage.app",
            messagingSenderId: "164908049871",
            appId: "1:164908049871:web:21e77c3bb591de85685eba"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0, 0);
        }

        // 即時監聽：最新消息
        db.collection("news").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const n = doc.data();
                html += `<div class="bg-white p-8 rounded-[2.5rem] shadow-sm border-l-8 border-t-red">
                    <h4 class="font-bold text-xl mb-3 text-t-blue">${n.title}</h4>
                    <p class="text-slate-600 leading-relaxed">${n.content}</p>
                </div>`;
            });
            document.getElementById('display-news').innerHTML = html || '<p class="text-center text-slate-400">目前尚無公告</p>';
        });

        // 即時監聽：影音 YouTube
        db.collection("videos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const v = doc.data();
                html += `<div>
                    <div class="aspect-video bg-black rounded-2xl overflow-hidden shadow-xl mb-4">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/${v.ytid}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <h4 class="font-bold text-lg">${v.title}</h4>
                </div>`;
            });
            document.getElementById('display-videos').innerHTML = html || '<p class="text-center text-slate-400">尚無影音作品</p>';
        });

        // 監聽照片牆
        db.collection("photos").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                html += `<div class="rounded-3xl overflow-hidden shadow-lg border-4 border-white aspect-square"><img src="${doc.data().url}" class="w-full h-full object-cover"></div>`;
            });
            document.getElementById('display-photos').innerHTML = html;
        });

        // 監聽祈福項目
        db.collection("services").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const s = doc.data();
                html += `<div class="bg-white p-8 rounded-3xl shadow-sm border-t-4 border-t-gold text-center font-bold text-xl">${s.name}<br><span class="text-t-red font-black">$${s.price}</span></div>`;
            });
            document.getElementById('display-services').innerHTML = html;
        });
    </script>
</body>
</html>
