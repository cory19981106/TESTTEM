<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: { extend: { colors: { 't-red': '#8B0000', 't-gold': '#D4AF37', 't-blue': '#0A2540' }, fontFamily: { 'serif': ['"Noto Serif TC"', 'serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'serif'; background-color: #FDFCF5; scroll-behavior: smooth; }
        .page-section { display: none; min-height: 85vh; }
        .page-section.active { display: block; animation: fadeIn 0.6s ease; }
        
        /* 下拉選單優化 */
        .dropdown { position: relative; }
        .dropdown-menu { display: none; position: absolute; left: 0; top: 90%; padding-top: 20px; width: 14rem; z-index: 50; }
        .dropdown-menu::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 20px; background: transparent; }
        .dropdown:hover .dropdown-menu { display: block; }
        
        /* 手機選單全屏抽屜樣式 */
        #mobile-drawer { 
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.98); z-index: 200; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow-y: auto;
        }
        #mobile-drawer.active { right: 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white/95 sticky top-0 z-[100] border-b border-t-gold/20 shadow-sm p-4 font-bold">
        <div class="container mx-auto flex justify-between items-center px-4 md:px-10">
            <div onclick="showPage('home')" class="flex items-center space-x-2 cursor-pointer group">
                <div class="w-10 h-10 bg-t-red rounded-full flex items-center justify-center text-white text-xl shadow-lg">廣</div>
                <h1 class="text-xl tracking-tighter text-t-blue uppercase">員林廣寧宮</h1>
            </div>

            <ul class="hidden lg:flex space-x-10 text-sm items-center">
                <li class="dropdown">
                    <a class="cursor-pointer hover:text-t-gold pb-4 block">關於廣寧宮 <i class="fas fa-chevron-down text-[10px] ml-1"></i></a>
                    <div class="dropdown-menu">
                        <div class="bg-white shadow-2xl rounded-2xl border p-2">
                            <a onclick="showPage('about','history')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">本宮歷史沿革</a>
                            <a onclick="showPage('about','kings')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">主祀三山國王</a>
                            <a onclick="showPage('about','deities')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg">配祀神祉介紹</a>
                        </div>
                    </div>
                </li>
                <li class="dropdown">
                    <a class="cursor-pointer hover:text-t-gold pb-4 block">線上信眾服務 <i class="fas fa-chevron-down text-[10px] ml-1"></i></a>
                    <div class="dropdown-menu">
                        <div class="bg-white shadow-2xl rounded-2xl border p-2">
                            <a onclick="showPage('service','bless')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg text-t-gold">祈福點燈登記</a>
                            <a onclick="showPage('service','donate')" class="block px-4 py-3 hover:bg-slate-50 rounded-lg text-t-red">香油錢捐獻</a>
                        </div>
                    </div>
                </li>
                <li><a onclick="showPage('products')" class="cursor-pointer hover:text-t-gold">文創商品</a></li>
                <li><a onclick="showPage('gallery')" class="cursor-pointer hover:text-t-gold">活動花絮</a></li>
                <li><a onclick="showPage('video')" class="cursor-pointer hover:text-t-gold">影音專區</a></li>
                <li><a onclick="showPage('contact')" class="cursor-pointer hover:text-t-gold">聯絡我們</a></li>
            </ul>

            <button onclick="toggleMobileDrawer()" class="lg:hidden text-2xl text-t-blue p-2">
                <i class="fas fa-bars-staggered"></i>
            </button>
        </div>
    </nav>

    <div id="mobile-drawer">
        <div class="p-6 flex justify-between items-center border-b">
            <span class="font-black text-t-blue">選單 MENU</span>
            <button onclick="toggleMobileDrawer()" class="text-3xl text-slate-400">×</button>
        </div>
        <div class="p-8 space-y-8">
            <a onclick="showPage('home')" class="flex items-center space-x-4 text-2xl font-black text-t-blue border-b pb-4">
                <i class="fas fa-home text-t-gold"></i> <span>返回首頁</span>
            </a>

            <div class="space-y-4">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">關於廣寧宮</p>
                <div class="grid grid-cols-1 gap-2 text-lg font-bold">
                    <a onclick="showPage('about','history')" class="p-4 bg-slate-50 rounded-2xl flex justify-between"><span>📖 歷史沿革</span> <i class="fas fa-chevron-right text-xs opacity-20"></i></a>
                    <a onclick="showPage('about','kings')" class="p-4 bg-slate-50 rounded-2xl flex justify-between"><span>👑 三山國王</span> <i class="fas fa-chevron-right text-xs opacity-20"></i></a>
                    <a onclick="showPage('about','deities')" class="p-4 bg-slate-50 rounded-2xl flex justify-between"><span>🙏 配祀神祉</span> <i class="fas fa-chevron-right text-xs opacity-20"></i></a>
                </div>
            </div>

            <div class="space-y-4">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">線上信眾服務</p>
                <div class="grid grid-cols-2 gap-4">
                    <a onclick="showPage('service','bless')" class="p-6 bg-t-gold text-white rounded-3xl text-center shadow-lg font-black italic">祈福<br>點燈</a>
                    <a onclick="showPage('service','donate')" class="p-6 bg-t-red text-white rounded-3xl text-center shadow-lg font-black italic">捐獻<br>油香</a>
                </div>
            </div>

            <div class="space-y-4">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">宮務資訊</p>
                <div class="grid grid-cols-2 gap-2 text-sm font-bold">
                    <a onclick="showPage('products')" class="p-4 border rounded-2xl text-center">文創商品</a>
                    <a onclick="showPage('gallery')" class="p-4 border rounded-2xl text-center">活動花絮</a>
                    <a onclick="showPage('video')" class="p-4 border rounded-2xl text-center">影音專區</a>
                    <a onclick="showPage('contact')" class="p-4 border rounded-2xl text-center">聯絡我們</a>
                </div>
            </div>

            <div class="pt-10 text-center opacity-30 text-xs">
                © 2026 員林廣寧宮 · ZJ AD FILM 系統維護
            </div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-10">
        <section id="home" class="page-section active">
            <div class="h-[45vh] md:h-[55vh] bg-slate-900 rounded-[3rem] mb-12 flex items-center justify-center text-white text-center p-6 shadow-2xl relative overflow-hidden">
                <div class="z-10"><h2 class="text-4xl md:text-7xl font-black font-serif tracking-[0.1em] drop-shadow-2xl">三百年香火</h2><p class="mt-4 italic opacity-90 uppercase tracking-widest text-lg text-t-gold font-bold">員林中正路 · 三山國王祖廟</p></div>
                <div class="absolute inset-0 bg-black/40"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1 bg-white p-8 rounded-[2.5rem] shadow-xl border-t-8 border-t-red">
                    <h3 class="font-black text-2xl mb-6">最新公告 <i class="fas fa-bullhorn text-red-600"></i></h3>
                    <div id="home-news-list" class="space-y-4"></div>
                </div>
                <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-8" id="home-services-display"></div>
            </div>
        </section>

        <section id="page-service" class="page-section max-w-2xl mx-auto py-10">
            <div id="content-bless" class="sub-content bg-white p-10 md:p-16 rounded-[3.5rem] shadow-2xl border-t-8 border-t-gold">
                <h2 class="text-3xl font-black text-center text-t-gold mb-8 italic">祈福點燈登記</h2>
                <div class="space-y-5">
                    <input type="text" id="b_name" placeholder="信眾姓名" class="w-full border-2 p-4 rounded-2xl outline-none focus:border-t-gold">
                    <input type="tel" id="b_phone" placeholder="連絡電話" class="w-full border-2 p-4 rounded-2xl outline-none focus:border-t-gold">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="date" id="b_birth_date" class="w-full border-2 p-4 rounded-2xl outline-none">
                        <select id="b_birth_hour" class="w-full border-2 p-4 rounded-2xl bg-slate-50">
                            <option value="吉時">吉時 (時辰不詳)</option>
                            <option value="子時 (23-01)">子時 (23-01)</option>
                            <option value="丑時 (01-03)">丑時 (01-03)</option>
                            <option value="寅時 (03-05)">寅時 (03-05)</option>
                            <option value="卯時 (05-07)">卯時 (05-07)</option>
                            <option value="辰時 (07-09)">辰時 (07-09)</option>
                            <option value="巳時 (09-11)">巳時 (09-11)</option>
                            <option value="午時 (11-13)">午時 (11-13)</option>
                            <option value="未時 (13-15)">未時 (13-15)</option>
                            <option value="申時 (15-17)">申時 (15-17)</option>
                            <option value="酉時 (17-19)">酉時 (17-19)</option>
                            <option value="戌時 (19-21)">戌時 (19-21)</option>
                            <option value="亥時 (21-23)">亥時 (21-23)</option>
                        </select>
                    </div>
                    <select id="service-select" class="w-full border-2 p-4 rounded-2xl font-bold"></select>
                    <button onclick="submitOrder('點燈')" id="btn-bless" class="w-full bg-t-gold text-white py-5 rounded-3xl font-black shadow-xl text-xl mt-6">確認登記資料</button>
                </div>
            </div>
            </section>

        <section id="page-video" class="page-section max-w-6xl mx-auto py-10"><h2 class="text-4xl font-black text-center mb-16 font-serif">影音紀實作品</h2><div id="display-videos" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div></section>
        <section id="page-gallery" class="page-section max-w-7xl mx-auto py-10"><h2 class="text-4xl font-black text-center mb-16 font-serif">活動花絮照片</h2><div id="display-photos" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div></section>
        <section id="products" class="page-section max-w-7xl mx-auto py-10"><h2 class="text-4xl font-black text-center mb-16 font-serif uppercase tracking-widest text-t-blue">文創商品展示</h2><div id="display-products" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div></section>

    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 核心：抽屜選單切換
        function toggleMobileDrawer() {
            const dr = document.getElementById('mobile-drawer');
            dr.classList.toggle('active');
            document.body.style.overflow = dr.classList.contains('active') ? 'hidden' : 'auto';
        }

        function showPage(pageId, subId = null) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('page-' + pageId) || document.getElementById(pageId);
            if(target) target.classList.add('active');
            if(subId) {
                document.querySelectorAll('.sub-content').forEach(c => c.classList.add('hidden'));
                const subContent = document.getElementById('content-' + subId);
                if(subContent) subContent.classList.remove('hidden');
            }
            // 關閉手機抽屜
            document.getElementById('mobile-drawer').classList.remove('active');
            document.body.style.overflow = 'auto';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // --- 全頻道監聽渲染 (商品/影片/照片/消息/服務) ---
        // (此處保留原有的 db.onSnapshot 邏輯，確保所有內容都有抓到)
        db.collection("products").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => { const p = doc.data(); h += `<div class="bg-white p-6 rounded-[2.5rem] shadow-xl text-center border hover:scale-105 transition"><img src="${p.url}" class="w-full h-52 object-cover rounded-2xl mb-4 shadow-md"><h4 class="font-bold text-xl mb-2 text-t-blue">${p.name}</h4><p class="text-t-red font-black text-2xl">$${p.price}</p></div>`; });
            document.getElementById('display-products').innerHTML = h;
        });

        db.collection("videos").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => { const v = doc.data(); h += `<div class="bg-white p-4 rounded-[2.5rem] shadow-2xl"><div class="aspect-video bg-black rounded-[2rem] overflow-hidden"><iframe class="w-full h-full" src="https://www.youtube.com/embed/${v.ytid}" frameborder="0" allowfullscreen></iframe></div><h4 class="mt-6 px-4 font-black text-xl text-t-blue">${v.title}</h4></div>`; });
            document.getElementById('display-videos').innerHTML = h;
        });

        // --- 提交訂單 (含 reCAPTCHA 與 生辰八字) ---
        async function submitOrder(type) {
            const btn = type === '點燈' ? document.getElementById('btn-bless') : document.getElementById('btn-donate');
            const name = type === '點燈' ? document.getElementById('b_name').value : document.getElementById('d_name').value;
            const phone = type === '點燈' ? document.getElementById('b_phone').value : document.getElementById('d_phone').value;

            if(!name || !phone) return alert("請填寫姓名與電話");

            btn.disabled = true;
            btn.innerText = "驗證中...";

            grecaptcha.ready(function() {
                grecaptcha.execute('6LcznbYsAAAAAByFa1KFc-664MZwKlv5l8tPKJyt', {action: 'submit_order'}).then(async function(token) {
                    let data = { 
                        category: type, status: "待查帳", year: "2026", captchaToken: token,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        name: name, phone: phone
                    };
                    if(type === '點燈') {
                        data.birthday = document.getElementById('b_birth_date').value;
                        data.birthHour = document.getElementById('b_birth_hour').value;
                        data.item = document.getElementById('service-select').value;
                        const opt = document.getElementById('service-select').selectedOptions[0];
                        data.amount = opt ? opt.getAttribute('data-price') : 0;
                    } else {
                        data.amount = document.getElementById('d_amount').value;
                        data.item = "油香功德";
                    }
                    try {
                        await db.collection("orders").add(data);
                        document.getElementById('bank-modal').classList.remove('hidden');
                        btn.disabled = false; btn.innerText = "確認登記";
                    } catch (e) {
                        alert("提交失敗"); btn.disabled = false;
                    }
                });
            });
        }
    </script>
</body>
</html>
