<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員林廣寧宮 | 三山國王官方網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'serif'; background-color: #FDFCF5; scroll-behavior: smooth; }
        .page-section { display: none; min-height: 85vh; }
        .page-section.active { display: block; animation: fadeInUp 0.8s ease; }
        .dropdown:hover .dropdown-menu { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white/95 sticky top-0 z-50 border-b border-t-gold/20 shadow-sm p-4 font-bold flex justify-between px-6 md:px-12 items-center">
        <div onclick="showPage('home')" class="flex items-center space-x-2 cursor-pointer">
            <div class="w-10 h-10 bg-[#8B0000] rounded-full flex items-center justify-center text-white text-xl">廣</div>
            <span class="text-xl tracking-tighter text-[#0A2540]">員林廣寧宮</span>
        </div>

        <ul class="hidden lg:flex space-x-8 text-sm items-center">
            <li class="relative dropdown">
                <a class="cursor-pointer hover:text-[#D4AF37] pb-4">關於廣寧宮 <i class="fas fa-chevron-down text-[10px]"></i></a>
                <div class="dropdown-menu hidden absolute left-0 mt-2 w-40 bg-white shadow-xl rounded-xl border p-2">
                    <a onclick="showPage('about','history')" class="block px-4 py-2 hover:bg-slate-50 rounded-lg">本宮歷史</a>
                    <a onclick="showPage('about','kings')" class="block px-4 py-2 hover:bg-slate-50 rounded-lg">三山國王</a>
                    <a onclick="showPage('about','deities')" class="block px-4 py-2 hover:bg-slate-50 rounded-lg">配祀神祉</a>
                </div>
            </li>
            <li class="relative dropdown">
                <a class="cursor-pointer hover:text-[#D4AF37] pb-4">線上信眾服務 <i class="fas fa-chevron-down text-[10px]"></i></a>
                <div class="dropdown-menu hidden absolute left-0 mt-2 w-40 bg-white shadow-xl rounded-xl border p-2">
                    <a onclick="showPage('service','bless')" class="block px-4 py-2 hover:bg-slate-50 rounded-lg">祈福點燈</a>
                    <a onclick="showPage('service','donate')" class="block px-4 py-2 hover:bg-slate-50 rounded-lg">香油錢捐獻</a>
                </div>
            </li>
            <li><a onclick="showPage('products')" class="cursor-pointer hover:text-[#D4AF37]">文創商品</a></li>
            <li><a onclick="showPage('gallery')" class="cursor-pointer hover:text-[#D4AF37]">活動花絮</a></li>
            <li><a onclick="showPage('video')" class="cursor-pointer hover:text-[#D4AF37]">影音專區</a></li>
            <li><a onclick="showPage('contact')" class="cursor-pointer hover:text-[#D4AF37]">聯絡我們</a></li>
        </ul>
    </nav>

    <main class="container mx-auto px-6 py-10">
        
        <section id="home" class="page-section active">
            <div class="h-[50vh] bg-slate-900 rounded-[3rem] mb-12 flex items-center justify-center text-white text-center p-6 shadow-2xl">
                <h2 class="text-5xl font-black font-serif tracking-widest">三百年香火 · 守護員林</h2>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border-t-8 border-[#8B0000]">
                    <h3 class="font-black text-xl mb-6">最新消息 <i class="fas fa-bullhorn text-red-600"></i></h3>
                    <div id="home-news-list" class="space-y-3"></div>
                </div>
                <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6" id="home-services-display"></div>
            </div>
        </section>

        <section id="page-about" class="page-section max-w-5xl mx-auto">
            <div id="content-history" class="sub-content bg-white p-12 rounded-[3rem] shadow-xl leading-loose">
                <h2 class="text-3xl font-black mb-6 text-[#0A2540]">本宮歷史</h2>
                <p>廣寧宮創建於清乾隆四年（1739年），是員林地區歷史最悠久的宮廟...</p>
            </div>
            <div id="content-kings" class="sub-content hidden bg-white p-12 rounded-[3rem] shadow-xl text-center">
                <h2 class="text-3xl font-black mb-10">主祀：三山國王</h2>
                <div class="grid grid-cols-3 gap-6"><div class="p-6 border rounded-3xl">巾山大國王</div><div class="p-6 border rounded-3xl">明山二國王</div><div class="p-6 border rounded-3xl">獨山三國王</div></div>
            </div>
            <div id="content-deities" class="sub-content hidden grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-yellow-500 text-center"><b>文昌帝君</b></div>
                <div class="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-blue-500 text-center"><b>觀音佛祖</b></div>
                <div class="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-pink-500 text-center"><b>註生娘娘</b></div>
            </div>
        </section>

        <section id="page-service" class="page-section max-w-2xl mx-auto">
            <div id="content-bless" class="sub-content bg-white p-12 rounded-[3rem] shadow-2xl border-t-8 border-[#D4AF37]">
                <h2 class="text-3xl font-black text-center text-[#D4AF37] mb-8">祈福點燈登記</h2>
                <input type="text" id="b_name" placeholder="信眾姓名" class="w-full border p-4 rounded-2xl mb-4">
                <input type="tel" id="b_phone" placeholder="電話" class="w-full border p-4 rounded-2xl mb-4">
                <select id="service-select" class="w-full border p-4 rounded-2xl mb-6 font-bold"></select>
                <button onclick="submitOrder('點燈')" class="w-full bg-[#D4AF37] text-white py-4 rounded-2xl font-black shadow-lg">確認登記</button>
            </div>
            <div id="content-donate" class="sub-content hidden bg-white p-12 rounded-[3rem] shadow-2xl border-t-8 border-[#8B0000]">
                <h2 class="text-3xl font-black text-center text-[#8B0000] mb-8">香油錢捐獻</h2>
                <input type="number" id="d_amount" placeholder="捐獻金額" class="w-full border p-4 rounded-2xl mb-4 text-2xl text-center">
                <input type="text" id="d_name" placeholder="姓名" class="w-full border p-4 rounded-2xl mb-4">
                <button onclick="submitOrder('捐獻')" class="w-full bg-[#8B0000] text-white py-4 rounded-2xl font-black shadow-lg">確認捐獻</button>
            </div>
        </section>

        <section id="page-products" class="page-section max-w-6xl mx-auto">
            <h2 class="text-4xl font-black text-center mb-12">文創商品展示</h2>
            <div id="display-products" class="grid grid-cols-1 md:grid-cols-4 gap-8"></div>
        </section>

        </main>

    <div id="news-modal" class="fixed inset-0 bg-black/80 z-[100] hidden items-center justify-center p-6"><div class="bg-white rounded-[3rem] p-10 max-w-md w-full relative"><h2 id="m-title" class="text-2xl font-black mb-4"></h2><div id="m-content" class="leading-relaxed"></div><button onclick="closeModal()" class="w-full mt-8 bg-slate-900 text-white py-3 rounded-xl">關閉</button></div></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2PuFt4epkjrkEByoSEqcw88eAVuxjB70", authDomain: "testproject-fb870.firebaseapp.com", projectId: "testproject-fb870", storageBucket: "testproject-fb870.firebasestorage.app", messagingSenderId: "164908049871", appId: "1:164908049871:web:21e77c3bb591de85685eba" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showPage(pageId, subId = null) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('page-' + pageId) || document.getElementById(pageId);
            target.classList.add('active');
            if(subId) {
                document.querySelectorAll('.sub-content').forEach(c => c.classList.add('hidden'));
                document.getElementById('content-' + subId).classList.remove('hidden');
            }
            window.scrollTo(0,0);
        }

        function closeModal() { document.getElementById('news-modal').classList.add('hidden'); }

        // --- 數據監聽：文創商品 ---
        db.collection("products").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const p = doc.data();
                html += `<div class="bg-white p-4 rounded-[2rem] shadow-lg border hover:scale-105 transition">
                    <img src="${p.url}" class="w-full h-48 object-cover rounded-2xl mb-4">
                    <h4 class="font-bold text-lg">${p.name}</h4>
                    <p class="text-red-600 font-black">$${p.price}</p>
                </div>`;
            });
            document.getElementById('display-products').innerHTML = html || '<p class="col-span-4 text-center text-slate-400">尚無商品展示</p>';
        });

        // --- 其餘服務與消息監聽 ---
        db.collection("services").onSnapshot(snap => {
            let grid = ""; let opts = "";
            snap.forEach(doc => {
                const s = doc.data();
                grid += `<div class="bg-white p-6 rounded-[2rem] shadow-md border-t-4 border-[#D4AF37] flex justify-between items-center font-bold"><span>${s.name}</span><span class="text-red-600">$${s.price}</span></div>`;
                opts += `<option value="${s.name}" data-price="${s.price}">${s.name} ($${s.price})</option>`;
            });
            document.getElementById('home-services-display').innerHTML = grid;
            document.getElementById('service-select').innerHTML = opts;
        });

        db.collection("news").orderBy("createdAt","desc").onSnapshot(snap => {
            let html = ""; snap.forEach(doc => { const n = doc.data(); html += `<div onclick="openModal('${n.title}', \`${n.content}\` )" class="p-3 bg-slate-50 border-l-4 border-red-500 rounded-xl cursor-pointer hover:bg-red-50 font-bold truncate transition">${n.title}</div>`; });
            document.getElementById('home-news-list').innerHTML = html;
        });

        function openModal(t,c) { document.getElementById('m-title').innerText=t; document.getElementById('m-content').innerText=c; document.getElementById('news-modal').classList.remove('hidden'); }

        async function submitOrder(type) {
            const data = { category: type, status: "待查帳", year: "2026", createdAt: firebase.firestore.FieldValue.serverTimestamp() };
            if(type === '點燈') {
                data.name = document.getElementById('b_name').value;
                data.phone = document.getElementById('b_phone').value;
                data.item = document.getElementById('service-select').value;
                data.amount = document.getElementById('service-select').selectedOptions[0].getAttribute('data-price');
            } else {
                data.name = document.getElementById('d_name').value;
                data.amount = document.getElementById('d_amount').value;
                data.item = "油香功德";
            }
            if(!data.name) return alert("請填寫姓名");
            await db.collection("orders").add(data);
            alert("登記完成"); location.reload();
        }
    </script>
</body>
</html>
